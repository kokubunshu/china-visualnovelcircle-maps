<script src="js/page-i18n.js"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };

  // ── State ──
  var StarState = {
    submode: 'personal',
    user: null,
    memberships: [],
    personalClubs: [],
    unions: [],
    selectedUnion: null,
    hoveredStar: null,
    hoveredUnion: null,
    clubLookup: {},
    editingUnionId: null,
    pendingClubTags: [],
    boundClub: null,
    searchMode: 'club',
    searchQuery: '',
    searchResults: [],
    searchTarget: null,
    searchHighlightKey: '',
    zoom: 1,
    panX: 0,
    panY: 0,
    animationTime: 0,
    _lastStarRender: 0,
    targetZoom: 1,
    targetPanX: 0,
    targetPanY: 0,
    isDragging: false,
    dragStartX: 0,
    dragStartY: 0,
    dragStartPanX: 0,
    dragStartPanY: 0,
    hasDragged: false,
    _allUnionMemberPositions: null,
    _renderLoopId: 0,
    _lastRenderTime: 0,
    _lastEffectFrame: 0,
    _dragVelX: 0,
    _dragVelY: 0,
    _dragLastX: 0,
    _dragLastY: 0,
    _dragLastTime: 0,
    _lastWheelTime: 0,
    _touchMode: null,
    _touchStartDistance: 0,
    _touchStartZoom: 1,
    _touchStartPanX: 0,
    _touchStartPanY: 0,
    _touchCenterX: 0,
    _touchCenterY: 0,
    _draggedUnionOffsets: {},
    _draggingUnionId: null,
    _draggingUnionStartWorldX: 0,
    _draggingUnionStartWorldY: 0,
    _draggingUnionBaseOffsetX: 0,
    _draggingUnionBaseOffsetY: 0,
    _unionLayoutCacheKey: '',
    _unionLayoutCache: null,
    _unionConnectionCacheKey: '',
    _unionConnectionCache: null,
    _sharedUnionMembers: {},
    _lastUnionHoverTime: 0,
    _submodeTransition: null,
    _transitionFromMode: '',
    _transitionToMode: '',
    _activeBurst: null,
    _lineFlowBudget: 0,
    _parallaxX: 0,
    _parallaxY: 0,
    _didAutoFocusUnion: false,
    _viewportW: 0,
    _viewportH: 0,
    _initialPaintAt: 0,
    _deferHeavyPaint: true,
    _mobileLowPower: true,
    _mobileInteractionActive: false,
    _mobileInteractionTimer: 0,
    _mobileRenderFrameId: 0
  };

  var canvas, ctx, particles = [], animId, particleTimer, canvasW, canvasH, lastParticleFrame = 0;
  var starCanvas, starCtx;
  var STAR_MAP_ENABLE_PULSE = false;

  function isMobileStarMap() {
    return window.innerWidth <= 768;
  }

  function shouldUseLightweightStarRender() {
    if (!isMobileStarMap()) return false;
    if (StarState.submode === 'union') return false;
    if (StarState._mobileInteractionActive || StarState.isDragging || StarState._touchMode) return true;
    return StarState._deferHeavyPaint || (StarState._initialPaintAt && performance.now() - StarState._initialPaintAt < 760);
  }

  function shouldUseMobileEnhancedUnionRender() {
    return isMobileStarMap() && StarState.submode === 'union' && !shouldUseLightweightStarRender();
  }

  function completeInitialStarPaintSoon() {
    scheduleStarIdleTask(function () {
      if (isMobileStarMap()) {
        StarState._mobileLowPower = false;
        StarState._deferHeavyPaint = false;
        StarState._lastRenderKey = '';
        requestMobileStarFrame();
        return;
      }
      StarState._deferHeavyPaint = false;
      StarState._lastRenderKey = '';
      renderFrame();
    }, isMobileStarMap() ? 900 : 450);
  }

  function requestMobileStarFrame() {
    if (!isMobileStarMap()) {
      renderFrame();
      return;
    }
    StarState._lastRenderKey = '';
    if (StarState._mobileRenderFrameId) return;
    StarState._mobileRenderFrameId = requestAnimationFrame(function () {
      StarState._mobileRenderFrameId = 0;
      StarState.animationTime = performance.now();
      renderFrame();
    });
  }

  function markMobileStarInteraction() {
    if (!isMobileStarMap()) return;
    StarState._mobileInteractionActive = true;
    StarState._mobileLowPower = true;
    StarState._deferHeavyPaint = true;
    if (StarState._mobileInteractionTimer) clearTimeout(StarState._mobileInteractionTimer);
    StarState._mobileInteractionTimer = setTimeout(function () {
      StarState._mobileInteractionTimer = 0;
      StarState._mobileInteractionActive = false;
      StarState._mobileLowPower = false;
      StarState._deferHeavyPaint = false;
      StarState._lastRenderKey = '';
      requestMobileStarFrame();
    }, 220);
  }

  function resetStarTransientState() {
    StarState.selectedUnion = null;
    StarState.hoveredStar = null;
    StarState.hoveredUnion = null;
    StarState.selectedStar = null;
    StarState.searchHighlightKey = '';
    StarState.searchTarget = null;
    StarState._touchMode = null;
    StarState.isDragging = false;
    StarState.hasDragged = false;
    StarState._draggingUnionId = null;
    StarState._dragVelX = 0;
    StarState._dragVelY = 0;
    StarState._activeBurst = null;
    if (StarState._mobileInteractionTimer) clearTimeout(StarState._mobileInteractionTimer);
    StarState._mobileInteractionTimer = 0;
    StarState._mobileInteractionActive = false;
    StarState._mobileLowPower = isMobileStarMap();
    StarState._deferHeavyPaint = isMobileStarMap();
    if (StarState._mobileRenderFrameId) {
      cancelAnimationFrame(StarState._mobileRenderFrameId);
      StarState._mobileRenderFrameId = 0;
    }
    StarState._lastRenderKey = '';
  }

  function canvasDpr() {
    var cap = isMobileStarMap() ? 1.1 : 1.65;
    return Math.max(1, Math.min(window.devicePixelRatio || 1, cap));
  }

  function starViewportWidth() {
    return StarState._viewportW || (starCanvas ? (starCanvas.clientWidth || window.innerWidth) : window.innerWidth);
  }

  function starViewportHeight() {
    return StarState._viewportH || (starCanvas ? (starCanvas.clientHeight || window.innerHeight) : window.innerHeight);
  }

  function safeSetText(id, value) {
    var el = $(id);
    if (window.PageI18n && typeof window.PageI18n.t === 'function') value = window.PageI18n.t(value);
    if (el && el.textContent !== value) el.textContent = value;
  }

  function resetView() {
    var nextZoom = 1;
    var nextPanX = 0;
    var nextPanY = 0;
    if (StarState.submode === 'union') {
      var W = starViewportWidth();
      var H = starViewportHeight();
      var world = getUnionWorldSize(StarState.unions.length);
      var minUnionZoom = window.innerWidth <= 768 ? 0.28 : 0.34;
      nextZoom = Math.min(1, Math.max(minUnionZoom, Math.min(W / (world.width * 0.92), H / (world.height * 0.88))));
      nextPanX = W / 2 - (world.width / 2) * nextZoom;
      nextPanY = H / 2 - (world.height / 2) * nextZoom;
    }
    StarState.zoom = nextZoom;
    StarState.panX = nextPanX;
    StarState.panY = nextPanY;
    StarState.targetZoom = nextZoom;
    StarState.targetPanX = nextPanX;
    StarState.targetPanY = nextPanY;
    StarState._dragVelX = 0;
    StarState._dragVelY = 0;
    renderFrame();
    updateObservatoryHud();
  }

  function zoomBy(factor) {
    var W = starViewportWidth();
    var H = starViewportHeight();
    var mx = W / 2;
    var my = H / 2;
    var worldX = (mx - StarState.targetPanX) / StarState.targetZoom;
    var worldY = (my - StarState.targetPanY) / StarState.targetZoom;
    var nextZoom = Math.max(0.4, Math.min(3.0, StarState.targetZoom * factor));
    StarState.targetZoom = nextZoom;
    StarState.targetPanX = mx - worldX * nextZoom;
    StarState.targetPanY = my - worldY * nextZoom;
    updateObservatoryHud();
    startStarRenderLoop();
  }

  function focusWorldPoint(x, y, zoom) {
    var W = starViewportWidth();
    var H = starViewportHeight();
    var nextZoom = Math.max(0.4, Math.min(3.2, zoom || StarState.targetZoom));
    var panelOffset = StarState.submode === 'union' && window.innerWidth > 900 ? 150 : 0;
    StarState.targetZoom = nextZoom;
    StarState.targetPanX = (W / 2 - panelOffset) - x * nextZoom;
    StarState.targetPanY = H / 2 - y * nextZoom;
    updateObservatoryHud();
    startStarRenderLoop();
  }

  function focusSelectedTarget() {
    if (StarState.submode === 'union' && StarState.selectedUnion && StarState._unionPositions) {
      for (var i = 0; i < StarState._unionPositions.length; i++) {
        var p = StarState._unionPositions[i];
        if (p.union && p.union.id === StarState.selectedUnion.id) {
          focusWorldPoint(p.x, p.y, Math.max(StarState.targetZoom, 1.04));
          return;
        }
      }
    }
    if (StarState.hoveredStar && StarState._positions) {
      for (var j = 0; j < StarState._positions.length; j++) {
        var s = StarState._positions[j];
        if (s.club && s.club.club_id === StarState.hoveredStar.club_id && s.club.country === StarState.hoveredStar.country) {
          focusWorldPoint(s.x, s.y, Math.max(StarState.targetZoom, 1.18));
          return;
        }
      }
    }
    resetView();
  }

  function getUnionWorldSize(unionCount) {
    var count = unionCount || 0;
    var baseW = Math.max(starViewportWidth(), 1880);
    var baseH = Math.max(starViewportHeight(), 1080);
    if (count > 0) {
      var remaining = Math.max(0, count - 1);
      var ring = 0;
      while (remaining > 0) {
        remaining -= 6 + ring * 4;
        ring++;
      }
      var radius = ring ? (420 + (ring - 1) * 440) : 0;
      baseW = Math.max(baseW, radius * 2 + 760);
      baseH = Math.max(baseH, radius * 1.8 + 680);
    }
    return {
      width: baseW,
      height: baseH
    };
  }

  function unionThemePalette() {
    var light = currentTheme() === 'light';
    return light ? {
      screenEdge: 'rgba(112,76,40,0.10)',
      galaxyA: 'rgba(40,124,154,0.075)',
      galaxyB: 'rgba(183,121,37,0.07)',
      galaxyCoreA: 'rgba(40,124,154,0.10)',
      galaxyCoreB: 'rgba(231,76,60,0.045)',
      labelBg: 'rgba(255,252,246,0.82)',
      labelBgStrong: 'rgba(255,250,240,0.94)',
      labelBorder: 'rgba(96,62,36,0.16)',
      labelText: 'rgba(42,31,24,0.88)',
      mutedText: 'rgba(82,64,52,0.66)',
      hubBg: 'rgba(255,244,220,0.88)',
      hubBorder: 'rgba(183,121,37,0.28)',
      hubText: 'rgba(118,76,24,0.92)',
      member: '#2f7890',
      memberSoft: 'rgba(47,120,144,0.28)',
      memberGlow: 'rgba(47,120,144,0.18)',
      linkA: 'rgba(183,121,37,0.34)',
      linkB: 'rgba(40,124,154,0.24)',
      linkC: 'rgba(80,55,35,0.15)',
      coreText: 'rgba(42,31,24,0.86)'
    } : {
      screenEdge: 'rgba(1,6,18,0.34)',
      galaxyA: 'rgba(95,183,215,0.038)',
      galaxyB: 'rgba(240,192,96,0.035)',
      galaxyCoreA: 'rgba(95,183,215,0.12)',
      galaxyCoreB: 'rgba(231,76,60,0.045)',
      labelBg: 'rgba(8,12,22,0.48)',
      labelBgStrong: 'rgba(12,18,30,0.78)',
      labelBorder: 'rgba(255,255,255,0.10)',
      labelText: 'rgba(255,255,255,0.86)',
      mutedText: 'rgba(190,220,255,0.48)',
      hubBg: 'rgba(56,38,14,0.48)',
      hubBorder: 'rgba(240,192,96,0.24)',
      hubText: 'rgba(255,220,150,0.88)',
      member: '#dceaff',
      memberSoft: 'rgba(220,234,255,0.28)',
      memberGlow: 'rgba(220,234,255,0.13)',
      linkA: 'rgba(240,192,96,0.22)',
      linkB: 'rgba(95,183,215,0.16)',
      linkC: 'rgba(220,234,255,0.13)',
      coreText: 'rgba(255,255,255,0.86)'
    };
  }

  function resolveClubName(clubId, country, fallback) {
    var full = StarState.clubLookup[(country || 'china') + '_' + clubId];
    return (full && (full.name || full.display_name)) || fallback || ('同好会#' + clubId);
  }

  function switchSubmode(mode) {
    if (mode !== 'personal' && mode !== 'union') return;
    if (mode === StarState.submode && !StarState._submodeTransition) return;
    if (isMobileStarMap()) {
      StarState._submodeTransition = null;
      applySubmode(mode);
      return;
    }
    beginSubmodeTransition(mode);
  }

  function applySubmode(mode) {
    document.querySelectorAll('.submode-tab').forEach(function (x) {
      var active = x.dataset.submode === mode;
      x.classList.toggle('active', active);
      x.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    resetStarTransientState();
    StarState.submode = mode;
    hideTooltip();
    resetView();
    $('detailPanel').classList.remove('open');
    $('createUnionBtn').style.display = StarState.submode === 'union' ? '' : 'none';
    renderFrame();
    if (isMobileStarMap()) completeInitialStarPaintSoon();
    if (mode === 'union') setTimeout(focusPreferredUnionIfNeeded, 60);
    updateEmptyState();
    updateObservatoryHud();
  }

  function beginSubmodeTransition(mode) {
    if (mode === StarState.submode || prefersReducedMotion()) {
      applySubmode(mode);
      return;
    }
    var now = performance.now();
    StarState._transitionFromMode = StarState.submode;
    StarState._transitionToMode = mode;
    StarState._submodeTransition = { start: now, duration: 360, switched: false };
    StarState._lastRenderKey = '';
    hideTooltip();
    $('detailPanel').classList.remove('open');
  }

  function updateSubmodeTransition() {
    var t = StarState._submodeTransition;
    if (!t) return;
    var elapsed = performance.now() - t.start;
    if (!t.switched && elapsed >= t.duration * 0.42) {
      t.switched = true;
      applySubmode(StarState._transitionToMode);
      StarState._submodeTransition = t;
    }
    if (elapsed >= t.duration) {
      StarState._submodeTransition = null;
      StarState._transitionFromMode = '';
      StarState._transitionToMode = '';
      StarState._lastRenderKey = '';
    }
  }

  function updateObservatoryHud() {
    var isPersonal = StarState.submode === 'personal';
    var starCount = isPersonal ? StarState.personalClubs.length : StarState.unions.reduce(function (sum, u) {
      return sum + 1 + ((u._members && u._members.length) || 0);
    }, 0);
    var linkCount = isPersonal ? Math.max(0, StarState.personalClubs.length - 1) : StarState.unions.reduce(function (sum, u) {
      return sum + ((u._members && u._members.length) || 0);
    }, 0);
    var selectedName = StarState.selectedUnion ? (StarState.selectedUnion.name || '联合') :
      (StarState.hoveredUnion ? (StarState.hoveredUnion.name || '联合') :
      (StarState.hoveredStar ? (StarState.hoveredStar.name || StarState.hoveredStar.display_name || '同好会') : '未选中'));
    safeSetText('brandTitle', isPersonal ? '个人星图观测台' : '联合星图观测台');
    safeSetText('brandDesc', isPersonal
      ? '这里把你加入的同好会组织成个人星域。点选星点查看社团详情，拖拽与缩放可探索不同密度。'
      : '这里展示地区高校联合与成员同好会的关系。创建联合、绑定群组、添加成员都从这张星域完成。');
    safeSetText('metricStars', String(starCount));
    safeSetText('metricLinks', String(linkCount));
    safeSetText('metricZoom', Math.round(StarState.targetZoom * 100) + '%');
    safeSetText('dockZoom', Math.round(StarState.targetZoom * 100) + '%');
    safeSetText('hudMode', isPersonal ? '个人星图' : '联合星图');
    safeSetText('hudTargets', starCount + ' 个');
    safeSetText('hudSelection', selectedName);
  }

  // ── API Helpers ──
  var sameOrigin = { credentials: 'same-origin' };
  function apiGet(url) { return fetch(url, sameOrigin).then(function (r) { return r.json(); }); }
  function apiPost(url, body) {
    return fetch(url, { method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined }).then(function (r) { return r.json(); });
  }

  // ── Theme ──
  function currentTheme() { return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark'; }
  function systemThemePreference() {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  function syncThemeMeta(theme) {
    var color = theme === 'light' ? '#f4f1ec' : '#090909';
    var metas = document.querySelectorAll('meta[name="theme-color"]');
    for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', color);
  }
  function setTheme(theme, persist) {
    theme = theme === 'light' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    syncThemeMeta(theme);
    if (persist) {
      try { localStorage.setItem('themePreference', theme); } catch (e) {}
    }
    StarState._lastRenderKey = '';
    updateThemeBtn();
  }
  function applyTheme(theme) { setTheme(theme, true); }
  function initThemePreference() {
    var saved = null;
    try { saved = localStorage.getItem('themePreference'); } catch (e) {}
    setTheme(saved === 'light' || saved === 'dark' ? saved : systemThemePreference(), false);
  }
  function bindSystemThemePreference() {
    if (!window.matchMedia) return;
    var mq = window.matchMedia('(prefers-color-scheme: light)');
    var onSystemThemeChange = function () {
      var saved = null;
      try { saved = localStorage.getItem('themePreference'); } catch (e) {}
      if (saved === 'light' || saved === 'dark') return;
      setTheme(systemThemePreference(), false);
      renderFrame();
    };
    if (mq.addEventListener) mq.addEventListener('change', onSystemThemeChange);
    else if (mq.addListener) mq.addListener(onSystemThemeChange);
  }
  function updateThemeBtn() { $('themeBtn').textContent = currentTheme() === 'dark' ? '夜' : '昼'; }

  // ── Particle System (cosmic) ──
  function initParticles() {
    var c = $('particleCanvas');
    canvas = c; ctx = c.getContext('2d');
    if (prefersReducedMotion() || isMobileStarMap()) {
      c.style.display = 'none';
      return;
    }
    resizeParticles();
    var colors = [
      '#f0c060','#e8e0f0','#88bbee','#c8a0e0','#f8d8a0',
      '#a0c8f0','#e0d0f8','#90c8e8','#f0a0b0','#a0e8c0',
      '#d0b8f0','#f8c8a0','#80d0d0','#f0d0e0','#b0d8f0',
      '#e8c0a0','#c0d0f0','#f0e0c0','#a0d0e0','#e0b8d0'
    ];
    var particleCount = STAR_MAP_ENABLE_PULSE ? 200 : (window.innerWidth <= 768 ? 30 : 48);
    for (var i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * canvasW, y: Math.random() * canvasH,
        vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
        r: Math.random() * 1.8 + 0.3,
        color: colors[Math.floor(Math.random() * colors.length)],
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: Math.random() * 0.008 + 0.003,
        opacity: Math.random() * 0.6 + 0.3,
        isShooting: false, shootingLife: 0,
        shootingVx: 0, shootingVy: 0,
        _savedVx: 0, _savedVy: 0, _savedR: 0, _savedColor: ''
      });
    }
    queueParticleFrame(0);
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        if (animId) cancelAnimationFrame(animId);
        if (particleTimer) clearTimeout(particleTimer);
        animId = 0;
        particleTimer = 0;
      } else if (!animId && !particleTimer && !prefersReducedMotion()) {
        queueParticleFrame(0);
      }
    });
  }

  function resizeParticles() {
    canvasW = window.innerWidth; canvasH = window.innerHeight;
    var dpr = canvasDpr();
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
    canvas.width = Math.round(canvasW * dpr);
    canvas.height = Math.round(canvasH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function queueParticleFrame(delay) {
    if (document.hidden || animId || particleTimer) return;
    particleTimer = setTimeout(function () {
      particleTimer = 0;
      animId = requestAnimationFrame(drawParticles);
    }, delay || 0);
  }

  function drawParticles() {
    animId = 0;
    if (document.hidden) { animId = 0; return; }
    var frameNow = performance.now();
    var minParticleInterval = STAR_MAP_ENABLE_PULSE ? 16 : (window.innerWidth <= 768 ? 72 : 56);
    if (frameNow - lastParticleFrame < minParticleInterval) {
      queueParticleFrame(minParticleInterval - (frameNow - lastParticleFrame));
      return;
    }
    lastParticleFrame = frameNow;
    var reduced = prefersReducedMotion();
    ctx.clearRect(0, 0, canvasW, canvasH);
    var px = (StarState._parallaxX || 0) * 0.018;
    var py = (StarState._parallaxY || 0) * 0.018;

    // Spawn shooting stars (rarely)
    if (!reduced && Math.random() < 0.005) {
      var idx = Math.floor(Math.random() * particles.length);
      var sp = particles[idx];
      if (!sp.isShooting) {
        sp.isShooting = true;
        sp.shootingLife = 1;
        sp.shootingVx = (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1);
        sp.shootingVy = (Math.random() * 1 + 0.3) * (Math.random() > 0.5 ? 1 : -1);
        sp._savedVx = sp.vx; sp._savedVy = sp.vy;
        sp._savedR = sp.r; sp._savedColor = sp.color;
      }
    }

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Shooting star animation
      if (p.isShooting) {
        p.shootingLife -= 0.015;
        p.vx = p.shootingVx * p.shootingLife * 3;
        p.vy = p.shootingVy * p.shootingLife * 3;
        p.r = p._savedR * 2.5 * p.shootingLife;
        p.color = '#ffffff';
        if (p.shootingLife <= 0) {
          p.isShooting = false;
          p.vx = p._savedVx; p.vy = p._savedVy;
          p.r = p._savedR; p.color = p._savedColor;
        }
      }

      if (!reduced) {
        p.x += p.vx; p.y += p.vy;
        p.wobble += p.wobbleSpeed;
      }
      if (p.x < -20) p.x = canvasW + 20; if (p.x > canvasW + 20) p.x = -20;
      if (p.y < -20) p.y = canvasH + 20; if (p.y > canvasH + 20) p.y = -20;
      var twinkle = STAR_MAP_ENABLE_PULSE ? (Math.sin(p.wobble * 3) * 0.3 + 0.7) : 0.78;
      var alpha = p.opacity * twinkle;
      ctx.beginPath();
      ctx.arc(p.x + px * (0.8 + (p.r || 1) * 0.18), p.y + py * (0.8 + (p.r || 1) * 0.18), p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (STAR_MAP_ENABLE_PULSE) {
      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 150) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'rgba(240,220,180,' + (0.025 * (1 - dist / 150)) + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }
    if (!reduced) {
      queueParticleFrame(minParticleInterval);
    } else {
      animId = 0;
    }
  }

  // ── Star Canvas Setup ──
  function initStarCanvas() {
    starCanvas = $('starCanvas');
    starCtx = starCanvas.getContext('2d');
    resizeStarCanvas();
  }

  function resizeStarCanvas() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var dpr = canvasDpr();
    StarState._viewportW = w;
    StarState._viewportH = h;
    starCanvas.style.width = w + 'px';
    starCanvas.style.height = h + 'px';
    starCanvas.width = Math.round(w * dpr);
    starCanvas.height = Math.round(h * dpr);
    starCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    StarState._lastRenderKey = '';
    invalidateUnionLayoutCache();
  }

  function invalidateUnionLayoutCache() {
    StarState._unionLayoutCacheKey = '';
    StarState._unionLayoutCache = null;
    StarState._unionConnectionCacheKey = '';
    StarState._unionConnectionCache = null;
    StarState._sharedUnionMembers = {};
  }

  function scheduleStarIdleTask(callback, timeout) {
    if ('requestIdleCallback' in window) {
      window.requestIdleCallback(callback, { timeout: timeout || 1000 });
    } else {
      setTimeout(callback, Math.min(timeout || 1000, 500));
    }
  }

  // ── Club Data Loading ──
  function loadClubData() {
    var cached = null;
    try { cached = sessionStorage.getItem('star_club_data'); } catch (e) {}
    if (cached) return Promise.resolve(JSON.parse(cached));
    return Promise.all([
      fetch('./api/clubs.php').then(function (r) { return r.json(); }),
      fetch('./api/clubs_japan.php').then(function (r) { return r.json(); })
    ]).then(function (results) {
      var all = [];
      var china = results[0]; var japan = results[1];
      if (china && china.data) all = all.concat(china.data.map(function (c) { c._country = 'china'; return c; }));
      if (japan && japan.data) all = all.concat(japan.data.map(function (c) { c._country = 'japan'; return c; }));
      try { sessionStorage.setItem('star_club_data', JSON.stringify(all)); } catch (e) {}
      return all;
    });
  }

  function buildClubLookup(clubs) {
    var map = {};
    for (var i = 0; i < clubs.length; i++) {
      var c = clubs[i];
      map[c._country + '_' + c.id] = c;
    }
    return map;
  }

  // ── Personal Star Map ──
  function resolvePersonalClubs() {
    var active = StarState.memberships.filter(function (m) { return m.status === 'active'; });
    var list = [];
    for (var i = 0; i < active.length; i++) {
      var m = active[i];
      var key = (m.country || 'china') + '_' + m.club_id;
      var club = StarState.clubLookup[key];
      if (club) {
        list.push({ club_id: m.club_id, country: m.country || 'china', name: club.name || club.display_name, school: club.school || '', province: club.province || club.prefecture || '', role: m.role });
      }
    }
    StarState.personalClubs = list;
  }

  function prefersReducedMotion() {
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }

  function drawObservatoryBackdrop(W, H, intensity) {
    var light = currentTheme() === 'light';
    if (shouldUseLightweightStarRender()) {
      starCtx.fillStyle = light ? 'rgba(250,245,236,0.96)' : 'rgba(4,9,22,0.98)';
      starCtx.fillRect(0, 0, W, H);
      return;
    }
    var glow = starCtx.createRadialGradient(W * 0.5, H * 0.42, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.78);
    glow.addColorStop(0, light ? 'rgba(40,124,154,' + (0.10 * intensity) + ')' : 'rgba(95,183,215,' + (0.11 * intensity) + ')');
    glow.addColorStop(0.46, light ? 'rgba(183,121,37,' + (0.040 * intensity) + ')' : 'rgba(240,192,96,' + (0.035 * intensity) + ')');
    glow.addColorStop(1, light ? 'rgba(112,76,40,0.10)' : 'rgba(1,6,18,0.36)');
    starCtx.fillStyle = glow;
    starCtx.fillRect(0, 0, W, H);
  }

  function drawStarGlow(x, y, color, radius, strength) {
    if (shouldUseLightweightStarRender()) {
      starCtx.beginPath();
      starCtx.arc(x, y, Math.max(2, radius * 0.34), 0, Math.PI * 2);
      starCtx.fillStyle = hexToRgba(color, Math.min(0.16, (strength || 0.12) * 0.65));
      starCtx.fill();
      return;
    }
    var glow = starCtx.createRadialGradient(x, y, 0, x, y, radius);
    glow.addColorStop(0, hexToRgba(color, strength));
    glow.addColorStop(0.45, hexToRgba(color, strength * 0.32));
    glow.addColorStop(1, 'transparent');
    starCtx.beginPath();
    starCtx.arc(x, y, radius, 0, Math.PI * 2);
    starCtx.fillStyle = glow;
    starCtx.fill();
  }

  function drawFocusRing(x, y, radius, color, active) {
    var time = (!STAR_MAP_ENABLE_PULSE || prefersReducedMotion()) ? 0 : (StarState.animationTime || 0);
    var pulse = (STAR_MAP_ENABLE_PULSE && active) ? 1 + Math.sin(time * 0.004) * 0.055 : 1;
    starCtx.save();
    starCtx.translate(x, y);
    starCtx.rotate(STAR_MAP_ENABLE_PULSE ? time * 0.00026 : 0.18);
    starCtx.beginPath();
    starCtx.ellipse(0, 0, radius * pulse, radius * 0.42 * pulse, 0, 0, Math.PI * 2);
    starCtx.strokeStyle = hexToRgba(color || '#f0c060', active ? 0.46 : 0.22);
    starCtx.lineWidth = active ? 1.8 : 1.1;
    starCtx.shadowColor = hexToRgba(color || '#f0c060', active ? 0.28 : 0.12);
    starCtx.shadowBlur = active ? 14 : 7;
    starCtx.stroke();
    starCtx.restore();
  }

  function targetKeyForClub(club) {
    return 'club:' + (club && (club.country || club._country || 'china')) + ':' + (club && (club.club_id || club.id));
  }

  function targetKeyForUnion(union) {
    return 'union:' + (union && union.id);
  }

  function triggerStarBurst(target) {
    if (!target || prefersReducedMotion()) return;
    StarState._activeBurst = {
      x: target.x,
      y: target.y,
      color: target.color || '#f0c060',
      start: performance.now(),
      radius: target.radius || 28
    };
    StarState._lastRenderKey = '';
    startStarRenderLoop();
  }

  function drawStarBurst(x, y, color, startedAt, radius) {
    if (prefersReducedMotion()) return false;
    var elapsed = performance.now() - startedAt;
    var duration = 280;
    if (elapsed > duration) return false;
    var t = Math.max(0, Math.min(1, elapsed / duration));
    var ease = 1 - Math.pow(1 - t, 3);
    var r = (radius || 28) * (1 + ease * 1.55);
    var alpha = (1 - t) * 0.52;
    drawStarGlow(x, y, color, r * 1.55, alpha * 0.34);
    starCtx.save();
    starCtx.beginPath();
    starCtx.arc(x, y, r, 0, Math.PI * 2);
    starCtx.strokeStyle = hexToRgba(color, alpha);
    starCtx.lineWidth = 2.4 - t;
    starCtx.shadowColor = hexToRgba(color, alpha * 0.7);
    starCtx.shadowBlur = 18;
    starCtx.stroke();
    starCtx.restore();
    return true;
  }

  function drawLineFlowParticle(x1, y1, x2, y2, options) {
    if (prefersReducedMotion()) return;
    var maxBudget = window.innerWidth <= 768 ? 18 : 34;
    if (StarState._lineFlowBudget >= maxBudget) return;
    StarState._lineFlowBudget++;
    options = options || {};
    var light = currentTheme() === 'light';
    var index = options.index || 0;
    var speed = options.speed || 0.00018;
    var t = ((StarState.animationTime || performance.now()) * speed + index * 0.173) % 1;
    var px = x1 + (x2 - x1) * t;
    var py = y1 + (y2 - y1) * t;
    var size = options.sparkSize || 6;
    var spark = starCtx.createRadialGradient(px, py, 0, px, py, size);
    spark.addColorStop(0, light ? 'rgba(255,247,224,0.76)' : 'rgba(255,255,255,0.82)');
    spark.addColorStop(0.44, light ? 'rgba(40,124,154,0.26)' : 'rgba(95,183,215,0.30)');
    spark.addColorStop(1, 'transparent');
    starCtx.beginPath();
    starCtx.arc(px, py, size, 0, Math.PI * 2);
    starCtx.fillStyle = spark;
    starCtx.fill();
  }

  function drawConstellationLine(x1, y1, x2, y2, options) {
    options = options || {};
    var light = currentTheme() === 'light';
    var time = (!STAR_MAP_ENABLE_PULSE || prefersReducedMotion()) ? 0 : (StarState.animationTime || 0);
    var alpha = Math.max(0.07, Math.min(options.strength || 0.18, 0.72));
    var index = options.index || 0;
    if (shouldUseLightweightStarRender()) {
      starCtx.save();
      starCtx.beginPath();
      starCtx.moveTo(x1, y1);
      starCtx.lineTo(x2, y2);
      starCtx.strokeStyle = light ? 'rgba(92,76,56,0.10)' : 'rgba(180,205,230,0.10)';
      starCtx.lineWidth = options.width || 0.7;
      starCtx.stroke();
      starCtx.restore();
      return;
    }
    var grad = starCtx.createLinearGradient(x1, y1, x2, y2);
    grad.addColorStop(0, light ? 'rgba(183,121,37,' + alpha + ')' : 'rgba(240,192,96,' + alpha + ')');
    grad.addColorStop(0.52, light ? 'rgba(40,124,154,' + (alpha * 0.86) + ')' : 'rgba(95,183,215,' + (alpha * 0.90) + ')');
    grad.addColorStop(1, light ? 'rgba(64,48,34,' + (alpha * 0.46) + ')' : 'rgba(220,234,255,' + (alpha * 0.55) + ')');

    starCtx.save();
    starCtx.strokeStyle = grad;
    starCtx.lineWidth = options.width || (0.72 + alpha * 2.1);
    starCtx.shadowColor = light ? 'rgba(40,124,154,0.13)' : 'rgba(136,187,238,0.20)';
    starCtx.shadowBlur = options.glow === false ? 0 : 7;
    starCtx.beginPath();
    starCtx.moveTo(x1, y1);
    if (options.curved) {
      var mx = (x1 + x2) / 2;
      var my = (y1 + y2) / 2 - (options.curveOffset || 18);
      starCtx.quadraticCurveTo(mx, my, x2, y2);
    } else {
      starCtx.lineTo(x2, y2);
    }
    starCtx.stroke();
    starCtx.restore();

    if (options.flow && options.spark !== false) {
      drawLineFlowParticle(x1, y1, x2, y2, options);
    }

    if (STAR_MAP_ENABLE_PULSE && options.spark !== false && !prefersReducedMotion()) {
      var t = (time * 0.00008 + index * 0.137) % 1;
      var px = x1 + (x2 - x1) * t;
      var py = y1 + (y2 - y1) * t;
      var spark = starCtx.createRadialGradient(px, py, 0, px, py, options.sparkSize || 9);
      spark.addColorStop(0, light ? 'rgba(255,246,226,0.56)' : 'rgba(255,255,255,0.70)');
      spark.addColorStop(0.45, light ? 'rgba(40,124,154,0.18)' : 'rgba(95,183,215,0.24)');
      spark.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(px, py, options.sparkSize || 9, 0, Math.PI * 2);
      starCtx.fillStyle = spark;
      starCtx.fill();
    }
  }

  function renderPersonalStarMap() {
    var W = starViewportWidth(), H = starViewportHeight();
    starCtx.clearRect(0, 0, W, H);
    drawObservatoryBackdrop(W, H, 0.7);

    starCtx.save();
    starCtx.translate(StarState.panX, StarState.panY);
    starCtx.scale(StarState.zoom, StarState.zoom);

    // Center in world coords (canvas center mapped back through transform)
    var isMobileView = W <= 768;
    var cx = (W / 2 - StarState.panX) / StarState.zoom;
    var cy = ((isMobileView ? H * 0.56 : H / 2) - StarState.panY) / StarState.zoom;

    if (!shouldUseLightweightStarRender()) {
      // Draw subtle nebula gradient behind center
      var grad = starCtx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.45);
      grad.addColorStop(0, 'rgba(200,160,80,0.04)');
      grad.addColorStop(0.5, 'rgba(100,80,180,0.02)');
      grad.addColorStop(1, 'transparent');
      starCtx.fillStyle = grad;
      starCtx.fillRect(0, 0, W, H);
    }

    // Draw user avatar / center
    drawUserCenter(cx, cy);

    var clubs = StarState.personalClubs;
    if (!clubs.length) return;

    // Sort clubs by role priority: representative > manager > member
    var roleOrder = { representative: 3, manager: 2, member: 1 };
    clubs.sort(function (a, b) {
      return (roleOrder[b.role] || 0) - (roleOrder[a.role] || 0);
    });

    // Distribute clubs on concentric elliptical orbits
    var goldenAngle = Math.PI * (3 - Math.sqrt(5));
    var shortSide = Math.min(W, H);
    var baseRadius = isMobileView ? Math.max(86, shortSide * 0.22) : shortSide * 0.11;
    var ringSpacing = isMobileView ? Math.max(72, shortSide * 0.16) : shortSide * 0.095;
    var firstRingCapacity = isMobileView ? 3 : 4;
    var orbitXScale = isMobileView ? 0.82 : 0.68;
    var orbitYScale = isMobileView ? 0.95 : 1;

    var positions = [];
    var idx = 0;
    var ring = 0;
    var remaining = clubs.length;
    while (idx < clubs.length && ring < 8) {
      var capacity = ring === 0 ? firstRingCapacity : Math.floor(firstRingCapacity * Math.pow(isMobileView ? 1.45 : 1.35, ring));
      var count = Math.min(capacity, remaining);
      var radius = baseRadius + ring * ringSpacing;
      var rotOffset = ring * goldenAngle;
      for (var j = 0; j < count; j++) {
        var angle = (2 * Math.PI * j / count) + rotOffset;
        var x = cx + Math.cos(angle) * radius * orbitXScale;
        var y = cy + Math.sin(angle) * radius * orbitYScale;
        positions.push({ x: x, y: y, club: clubs[idx], ring: ring });
        idx++;
      }
      remaining -= count;
      ring++;
    }

    // Draw constellation lines from center
    for (var i = 0; i < positions.length; i++) {
      var lineKey = targetKeyForClub(positions[i].club);
      var lineActive = StarState.searchHighlightKey === lineKey || (StarState.hoveredStar && targetKeyForClub(StarState.hoveredStar) === lineKey);
      drawConstellationLine(cx, cy, positions[i].x, positions[i].y, { strength: lineActive ? 0.27 : 0.17, index: i, spark: false, flow: lineActive || i % 3 === 0 });
    }

    // Draw same-province connections
    var byProvince = {};
    for (var i = 0; i < positions.length; i++) {
      var prov = positions[i].club.province || '__unknown__';
      if (!byProvince[prov]) byProvince[prov] = [];
      byProvince[prov].push(positions[i]);
    }
    for (var prov in byProvince) {
      var group = byProvince[prov];
      if (group.length < 2) continue;
      group.sort(function (a, b) {
        return Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx);
      });
      for (var a = 0; a < group.length - 1; a++) {
        drawConstellationLine(group[a].x, group[a].y, group[a + 1].x, group[a + 1].y, { strength: 0.09, index: a, spark: false, width: 0.75, flow: StarState.searchHighlightKey && (targetKeyForClub(group[a].club) === StarState.searchHighlightKey || targetKeyForClub(group[a + 1].club) === StarState.searchHighlightKey) });
      }
    }

    // Draw stars
    for (var i = 0; i < positions.length; i++) {
      var p = positions[i];
      var isHovered = StarState.hoveredStar && StarState.hoveredStar.club_id === p.club.club_id && StarState.hoveredStar.country === p.club.country;
      var isSearchHit = StarState.searchHighlightKey === targetKeyForClub(p.club);
      drawClubStar(p.x, p.y, p.club, isHovered, p.ring, p.club.role, StarState.animationTime);
      if (isSearchHit) drawFocusRing(p.x, p.y, 28, '#5fb7d7', true);
    }

    if (StarState._activeBurst) {
      if (!drawStarBurst(StarState._activeBurst.x, StarState._activeBurst.y, StarState._activeBurst.color, StarState._activeBurst.start, StarState._activeBurst.radius)) {
        StarState._activeBurst = null;
      }
    }

    // Store positions for hit testing
    StarState._positions = positions;
    StarState._cx = cx;
    StarState._cy = cy;

    starCtx.restore();
  }

  function drawUserCenter(cx, cy) {
    var light = currentTheme() === 'light';
    drawStarGlow(cx, cy, '#f0c060', 72, light ? 0.17 : 0.24);
    drawFocusRing(cx, cy, 42, '#f0c060', true);

    // Avatar circle
    starCtx.beginPath();
    starCtx.arc(cx, cy, 22, 0, Math.PI * 2);
    starCtx.fillStyle = light ? 'rgba(255,244,220,0.86)' : 'rgba(231,76,60,0.18)';
    starCtx.fill();
    starCtx.strokeStyle = light ? 'rgba(183,121,37,0.54)' : 'rgba(240,200,100,0.62)';
    starCtx.lineWidth = 2;
    starCtx.stroke();

    // Initial letter
    var initial = 'U';
    if (StarState.user) {
      initial = (StarState.user.nickname || StarState.user.username || 'U').charAt(0).toUpperCase();
    }
    starCtx.fillStyle = light ? 'rgba(42,31,24,0.82)' : 'rgba(255,255,255,0.88)';
    starCtx.font = '700 18px "Noto Sans SC", sans-serif';
    starCtx.textAlign = 'center';
    starCtx.textBaseline = 'middle';
    starCtx.fillText(initial, cx, cy + 1);

    // Label
    starCtx.fillStyle = light ? 'rgba(82,64,52,0.62)' : 'rgba(255,255,255,0.50)';
    starCtx.font = '10px "Noto Sans SC", sans-serif';
    starCtx.fillText('我', cx, cy + 38);
  }

  function drawClubStar(x, y, club, isHovered, ring, role, time) {
    var light = currentTheme() === 'light';
    var memberPalette = [
      '#f0c060', '#88bbee', '#c8a0e0', '#7ec8a0',
      '#e8a0a0', '#a0d8e8', '#d8a0c0', '#90c8c0'
    ];

    var roleSize = 0;
    var roleColor = '';
    var roleLabel = '';
    var isSpecial = false;

    if (role === 'representative') {
      roleSize = 4; roleColor = '#f0c060'; roleLabel = '负责人'; isSpecial = true;
    } else if (role === 'manager') {
      roleSize = 2; roleColor = '#5fb7d7'; roleLabel = '管理'; isSpecial = true;
    } else {
      var colorIdx = ((ring || 0) * 3 + ((club.club_id || 0) % 3)) % memberPalette.length;
      roleColor = memberPalette[colorIdx];
    }

    var baseSize = 5;
    var hoverPulse = 1;
    var size = isHovered ? ((baseSize + 4 + roleSize) * hoverPulse) : (baseSize + ring * 0.4 + roleSize);
    drawStarGlow(x, y, roleColor, size * (isHovered ? 4.8 : 3.0), isHovered ? 0.24 : 0.13);
    if (isHovered) drawFocusRing(x, y, size + 9, roleColor, true);

    if (isSpecial) {
      var t = time || 0;
      for (var g = 3; g >= 1; g--) {
        var pulseScale = 1;
        if (STAR_MAP_ENABLE_PULSE && t) {
          pulseScale = 1 + Math.sin(t * 0.003 + (club.club_id || 0) * 0.7) * 0.08;
        }
        var glowRadius = size * (2.5 + g * 1.3) * pulseScale;
        var alpha = 0.2 - g * 0.05;
        var glow = starCtx.createRadialGradient(x, y, size * 0.4, x, y, glowRadius);
        glow.addColorStop(0, hexToRgba(roleColor, alpha + 0.08));
        glow.addColorStop(0.5, hexToRgba(roleColor, alpha * 0.6));
        glow.addColorStop(1, 'transparent');
        starCtx.beginPath();
        starCtx.arc(x, y, glowRadius, 0, Math.PI * 2);
        starCtx.fillStyle = glow;
        starCtx.fill();
      }

      // Outer ring
      var ringAlpha = (STAR_MAP_ENABLE_PULSE && t) ? (0.4 + Math.sin(t * 0.004 + (club.club_id || 0)) * 0.08) : 0.4;
      starCtx.beginPath();
      starCtx.arc(x, y, size + 4, 0, Math.PI * 2);
      starCtx.strokeStyle = hexToRgba(roleColor, ringAlpha);
      starCtx.lineWidth = 2;
      starCtx.stroke();

      // Sparkle particles for representative
      if (STAR_MAP_ENABLE_PULSE && role === 'representative' && t) {
        var sparkCount = 6;
        for (var s = 0; s < sparkCount; s++) {
          var sparkAngle = t * 0.001 + (s * Math.PI * 2) / sparkCount;
          var sparkDist = size + 7 + Math.sin(t * 0.005 + s) * 3;
          var sx = x + Math.cos(sparkAngle) * sparkDist;
          var sy = y + Math.sin(sparkAngle) * sparkDist;
          var sparkAlpha = 0.25 + Math.sin(t * 0.008 + s * 1.5) * 0.15;
          starCtx.beginPath();
          starCtx.arc(sx, sy, 1.4, 0, Math.PI * 2);
          starCtx.fillStyle = 'rgba(240,220,160,' + Math.max(0, Math.min(1, sparkAlpha)) + ')';
          starCtx.fill();
        }
      }
    } else {
      // Simple glow for regular members
      var glow = starCtx.createRadialGradient(x, y, 0, x, y, size * 2.5);
      glow.addColorStop(0, hexToRgba(roleColor, 0.18));
      glow.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(x, y, size * 2.5, 0, Math.PI * 2);
      starCtx.fillStyle = glow;
      starCtx.fill();
    }

    // Star body
    starCtx.beginPath();
    starCtx.arc(x, y, size, 0, Math.PI * 2);
    starCtx.fillStyle = roleColor;
    starCtx.fill();

    // Bright center highlight
    starCtx.beginPath();
    starCtx.arc(x, y, size * 0.35, 0, Math.PI * 2);
    starCtx.fillStyle = 'rgba(255,255,255,0.22)';
    starCtx.fill();

    // Stroke
    if (isHovered || isSpecial) {
      starCtx.strokeStyle = light
        ? 'rgba(66,42,28,' + (isSpecial ? '0.30' : '0.24') + ')'
        : 'rgba(255,255,255,' + (isSpecial ? '0.55' : '0.5') + ')';
      starCtx.lineWidth = isSpecial ? 2 : 1.5;
      starCtx.stroke();
    }

    // Name label
    var label = club.name || '';
    if (label.length > 10) label = label.substring(0, 9) + '...';
    starCtx.fillStyle = light
      ? 'rgba(44,31,24,' + (isHovered ? '0.86' : '0.58') + ')'
      : 'rgba(255,255,255,' + (isHovered ? '0.85' : '0.45') + ')';
    starCtx.font = (isHovered ? '11' : '9') + 'px "Noto Sans SC", sans-serif';
    starCtx.textAlign = 'center';
    starCtx.fillText(label, x, y + size + 12);

    // Role label
    if (roleLabel) {
      starCtx.fillStyle = roleColor;
      starCtx.font = 'bold 9px "Noto Sans SC", sans-serif';
      starCtx.fillText(roleLabel, x, y + size + 23);
    }
  }

  // ── Union Star Map ──
  function renderUnionStarMapLegacyA() {
    var W = starViewportWidth(), H = starViewportHeight();
    starCtx.clearRect(0, 0, W, H);

    // Reset union member positions for hit testing
    StarState._allUnionMemberPositions = [];

    // Vignette (screen space)
    (function() {
      var vignette = starCtx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.75);
      vignette.addColorStop(0, 'transparent');
      vignette.addColorStop(0.5, 'rgba(20,10,40,0.03)');
      vignette.addColorStop(1, 'rgba(5,2,10,0.18)');
      starCtx.fillStyle = vignette;
      starCtx.fillRect(0, 0, W, H);
    })();

    starCtx.save();
    starCtx.translate(StarState.panX, StarState.panY);
    starCtx.scale(StarState.zoom, StarState.zoom);

    // Canvas dimensions in world coords
    var wW = (W - StarState.panX) / StarState.zoom;
    var wH = (H - StarState.panY) / StarState.zoom;

    var unions = StarState.unions;
    if (!unions.length) { starCtx.restore(); return; }

    // Separate large (>=6 members) and small (<6 members) unions
    var largeUnions = [];
    var smallUnions = [];
    for (var i = 0; i < unions.length; i++) {
      var mc = unions[i].member_count || 0;
      if (mc >= 6) { largeUnions.push(unions[i]); }
      else { smallUnions.push(unions[i]); }
    }

    var marginX = wW * 0.06, marginY = wH * 0.08;
    var centerX = wW / 2, centerY = wH * 0.42;
    var clusterPositions = [];
    var gag = Math.PI * (3 - Math.sqrt(5));

    // Large unions: golden spiral centered
    for (var i = 0; i < largeUnions.length; i++) {
      var u = largeUnions[i];
      var mc = u.member_count || 0;
      var weight = Math.min(mc, 20);
      var clusterRadius = 40 + weight * 3.2;
      var angle = i * gag;
      var dist = i === 0 ? 0 : (Math.min(wW, wH) * 0.05 + i * 55);

      var cx = centerX + Math.cos(angle) * dist;
      var cy = centerY + Math.sin(angle) * dist * 0.65;

      cx = Math.max(marginX + clusterRadius, Math.min(wW - marginX - clusterRadius, cx));
      cy = Math.max(marginY + clusterRadius, Math.min(wH - marginY - clusterRadius, cy));

      drawUnionCluster(cx, cy, u, i, clusterRadius);
      drawUnionMembers(cx, cy, u, clusterRadius);
      clusterPositions.push({ x: cx, y: cy, union: u, index: i, clusterRadius: clusterRadius });
    }

    // Small unions: compact grid in bottom-right quadrant
    if (smallUnions.length > 0) {
      var gridCols = Math.min(smallUnions.length, Math.max(2, Math.ceil(Math.sqrt(smallUnions.length * 2))));
      var gridStartX = wW * 0.48;
      var gridStartY = wH * 0.36;
      var gridCellW = (wW * 0.44) / gridCols;
      var gridRows = Math.ceil(smallUnions.length / gridCols);
      var gridCellH = Math.min(88, (wH * 0.44) / Math.max(gridRows, 1));

      for (var i = 0; i < smallUnions.length; i++) {
        var u = smallUnions[i];
        var row = Math.floor(i / gridCols);
        var col = i % gridCols;
        var cx = gridStartX + col * gridCellW + gridCellW / 2;
        var cy = gridStartY + row * gridCellH + gridCellH / 2;
        var clusterRadius = 45;

        drawUnionCluster(cx, cy, u, largeUnions.length + i, clusterRadius);
        drawUnionMembers(cx, cy, u, clusterRadius);
        clusterPositions.push({ x: cx, y: cy, union: u, index: largeUnions.length + i, clusterRadius: clusterRadius });
      }
    }

    // Draw region connections between unions
    var connections = buildUnionConnections(clusterPositions);
    starCtx.strokeStyle = 'rgba(240,200,160,0.12)';
    starCtx.lineWidth = 0.8;
    for (var i = 0; i < connections.length; i++) {
      var conn = connections[i];
      starCtx.beginPath();
      starCtx.moveTo(conn.from.x, conn.from.y);
      starCtx.lineTo(conn.to.x, conn.to.y);
      starCtx.stroke();
    }

    StarState._unionPositions = clusterPositions;

    starCtx.restore();
  }

  function drawUnionMembersLegacyA(cx, cy, union, clusterRadius) {
    var members = union._members || [];
    if (!members.length) return;
    var cr = clusterRadius || 40;
    var count = members.length;
    var orbitR = Math.max(cr * 0.9, 35);

    for (var j = 0; j < count; j++) {
      var angle = (2 * Math.PI * j / count) - Math.PI / 2;
      var sx = cx + Math.cos(angle) * orbitR;
      var sy = cy + Math.sin(angle) * orbitR * 0.7;

      // Core → member connection line
      starCtx.beginPath();
      starCtx.moveTo(cx, cy);
      starCtx.lineTo(sx, sy);
      starCtx.strokeStyle = 'rgba(200,180,220,0.25)';
      starCtx.setLineDash([3, 4]);
      starCtx.lineWidth = 0.8;
      starCtx.stroke();
      starCtx.setLineDash([]);

      // Star glow
      var sg = starCtx.createRadialGradient(sx, sy, 0, sx, sy, 8);
      sg.addColorStop(0, 'rgba(200,200,240,0.4)');
      sg.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(sx, sy, 8, 0, Math.PI * 2);
      starCtx.fillStyle = sg;
      starCtx.fill();

      // Star body
      starCtx.beginPath();
      starCtx.arc(sx, sy, 3, 0, Math.PI * 2);
      starCtx.fillStyle = 'rgba(240,220,200,0.85)';
      starCtx.fill();

      // Center highlight
      starCtx.beginPath();
      starCtx.arc(sx, sy, 1.2, 0, Math.PI * 2);
      starCtx.fillStyle = 'rgba(255,255,255,0.4)';
      starCtx.fill();

      // Name label
      var label = members[j].club_name || ('同好会#' + members[j].club_id);
      if (label.length > 10) label = label.substring(0, 9) + '...';
      var labelOffX = Math.cos(angle) * 12;
      var labelOffY = Math.sin(angle) * 12 + 4;
      starCtx.fillStyle = 'rgba(255,255,255,0.55)';
      starCtx.font = '8px "Noto Sans SC", sans-serif';
      starCtx.textAlign = 'center';
      starCtx.fillText(label, sx + labelOffX, sy + labelOffY);

      // Store position for hit testing
      if (!StarState._allUnionMemberPositions) StarState._allUnionMemberPositions = [];
      StarState._allUnionMemberPositions.push({ x: sx, y: sy, club: {
        club_id: members[j].club_id,
        country: members[j].club_country || 'china',
        name: members[j].club_name || ('同好会#' + members[j].club_id)
      }, unionId: union.id });
    }
  }

  function hitTestUnionMember(mx, my) {
    var allPos = StarState._allUnionMemberPositions;
    if (!allPos) return null;
    var w = screenToWorld(mx, my);
    for (var i = 0; i < allPos.length; i++) {
      var dx = w.x - allPos[i].x, dy = w.y - allPos[i].y;
      if (Math.sqrt(dx * dx + dy * dy) < 12) return allPos[i].club;
    }
    return null;
  }

  function drawUnionClusterLegacyA(cx, cy, union, index, clusterRadius) {
    var cr = clusterRadius || 40;
    // Nebula background
    var nebula = starCtx.createRadialGradient(cx, cy, 0, cx, cy, cr * 1.6);
    nebula.addColorStop(0, 'rgba(120,100,200,0.06)');
    nebula.addColorStop(0.5, 'rgba(200,160,80,0.03)');
    nebula.addColorStop(1, 'transparent');
    starCtx.beginPath();
    starCtx.arc(cx, cy, cr * 1.6, 0, Math.PI * 2);
    starCtx.fillStyle = nebula;
    starCtx.fill();

    // Faint ring
    starCtx.beginPath();
    starCtx.arc(cx, cy, cr, 0, Math.PI * 2);
    starCtx.strokeStyle = 'rgba(255,255,255,0.04)';
    starCtx.lineWidth = 1;
    starCtx.stroke();

    // Central union star
    var count = union.member_count || 0;
    var isSelected = StarState.selectedUnion && StarState.selectedUnion.id === union.id;
    var centerSize = isSelected ? 16 : 12;
    var starColor = union.star_color || '#f0c060';
    // Glow
    for (var r = 2; r >= 1; r--) {
      var glow = starCtx.createRadialGradient(cx, cy, 0, cx, cy, centerSize + r * 8);
      var glowColor = hexToRgba(starColor, 0.4 - r * 0.12);
      glow.addColorStop(0, glowColor);
      glow.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(cx, cy, centerSize + r * 8, 0, Math.PI * 2);
      starCtx.fillStyle = glow;
      starCtx.fill();
    }
    starCtx.beginPath();
    starCtx.arc(cx, cy, centerSize, 0, Math.PI * 2);
    starCtx.fillStyle = starColor;
    starCtx.fill();
    if (isSelected) {
      starCtx.strokeStyle = 'rgba(255,255,255,0.6)';
      starCtx.lineWidth = 2;
      starCtx.stroke();
    }

    // Name / labels
    {
      var name = union.name || '';
      if (name.length > 14) name = name.substring(0, 13) + '...';
      starCtx.fillStyle = 'rgba(255,255,255,0.7)';
      starCtx.font = '11px "Noto Sans SC", sans-serif';
      starCtx.textAlign = 'center';
      starCtx.fillText(name, cx, cy + centerSize + 16);

      // Member count
      starCtx.fillStyle = 'rgba(255,255,255,0.35)';
      starCtx.font = '9px "Noto Sans SC", sans-serif';
      starCtx.fillText(count + ' 个同好会', cx, cy + centerSize + 30);

      // Bound club name
      if (union.bound_club_id) {
        var boundName = union.bound_club_name || ('同好会#' + union.bound_club_id);
        if (boundName.length > 10) boundName = boundName.substring(0, 9) + '...';
        starCtx.fillStyle = 'rgba(240,192,96,0.55)';
        starCtx.font = '8px "Noto Sans SC", sans-serif';
        starCtx.fillText('群: ' + boundName, cx, cy + centerSize + 41);
      }
    }

    // Manageable indicator dot
    if (union.can_manage) {
      var indX = cx + centerSize + 6, indY = cy - centerSize - 6;
      var indGlow = starCtx.createRadialGradient(indX, indY, 0, indX, indY, 6);
      indGlow.addColorStop(0, 'rgba(240,192,96,0.3)');
      indGlow.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(indX, indY, 6, 0, Math.PI * 2);
      starCtx.fillStyle = indGlow;
      starCtx.fill();
      starCtx.beginPath();
      starCtx.arc(indX, indY, 3.5, 0, Math.PI * 2);
      starCtx.fillStyle = 'rgba(240,192,96,0.85)';
      starCtx.fill();
    }
  }

  // ── Hit Testing ──
  function screenToWorld(mx, my) {
    return {
      x: (mx - StarState.panX) / StarState.zoom,
      y: (my - StarState.panY) / StarState.zoom
    };
  }

  function hitTestPersonal(mx, my) {
    var positions = StarState._positions;
    if (!positions) return null;
    var w = screenToWorld(mx, my);
    var best = null, bestDist = 22 / StarState.zoom;
    for (var i = 0; i < positions.length; i++) {
      var p = positions[i];
      var dx = w.x - p.x, dy = w.y - p.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < bestDist) { bestDist = dist; best = p; }
    }
    return best ? best.club : null;
  }

  function hitTestUnion(mx, my) {
    var positions = StarState._unionPositions;
    if (!positions) return null;
    var w = screenToWorld(mx, my);
    for (var i = 0; i < positions.length; i++) {
      var p = positions[i];
      var dx = w.x - p.x, dy = w.y - p.y;
      var hitRadius = p.clusterRadius ? p.clusterRadius * 0.9 : 30;
      if (Math.sqrt(dx * dx + dy * dy) < hitRadius) return p.union;
    }
    return null;
  }

  function buildUnionConnections(positions) {
    var byRegion = {};
    for (var i = 0; i < positions.length; i++) {
      var region = positions[i].union.region || '__unknown__';
      if (!byRegion[region]) byRegion[region] = [];
      byRegion[region].push(positions[i]);
    }
    var connections = [];
    for (var region in byRegion) {
      var group = byRegion[region];
      if (group.length < 2) continue;
      for (var a = 0; a < group.length; a++) {
        for (var b = a + 1; b < group.length; b++) {
          connections.push({ from: group[a], to: group[b] });
        }
      }
    }
    return connections;
  }

  // ── Rendering Frame ──
  function drawCanvasLabel(text, x, y, options) {
    options = options || {};
    text = String(text || '');
    if (!text) return;
    var font = options.font || '10px "Noto Sans SC", sans-serif';
    var padX = options.padX || 8;
    var padY = options.padY || 4;
    starCtx.save();
    starCtx.font = font;
    var palette = unionThemePalette();
    var width = starCtx.measureText(text).width + padX * 2;
    var height = (options.height || 20);
    var rx = x - width / 2;
    var ry = y - height / 2;
    starCtx.beginPath();
    if (starCtx.roundRect) {
      starCtx.roundRect(rx, ry, width, height, options.radius || 6);
    } else {
      var r = options.radius || 6;
      starCtx.moveTo(rx + r, ry);
      starCtx.lineTo(rx + width - r, ry);
      starCtx.quadraticCurveTo(rx + width, ry, rx + width, ry + r);
      starCtx.lineTo(rx + width, ry + height - r);
      starCtx.quadraticCurveTo(rx + width, ry + height, rx + width - r, ry + height);
      starCtx.lineTo(rx + r, ry + height);
      starCtx.quadraticCurveTo(rx, ry + height, rx, ry + height - r);
      starCtx.lineTo(rx, ry + r);
      starCtx.quadraticCurveTo(rx, ry, rx + r, ry);
    }
    starCtx.fillStyle = options.bg || palette.labelBg;
    starCtx.fill();
    starCtx.strokeStyle = options.border || palette.labelBorder;
    starCtx.lineWidth = 1;
    starCtx.stroke();
    starCtx.fillStyle = options.color || palette.labelText;
    starCtx.textAlign = 'center';
    starCtx.textBaseline = 'middle';
    starCtx.fillText(text, x, y + 0.5);
    starCtx.restore();
  }

  function drawUnionGalaxyFieldV2(cx, cy, width, height) {
    if (shouldUseLightweightStarRender()) return;
    var time = STAR_MAP_ENABLE_PULSE ? (StarState.animationTime || 0) : 0;
    var palette = unionThemePalette();
    var ringCount = shouldUseMobileEnhancedUnionRender() ? 2 : 4;
    for (var r = 0; r < ringCount; r++) {
      starCtx.save();
      starCtx.translate(cx, cy);
      starCtx.rotate(r * 0.55 + (STAR_MAP_ENABLE_PULSE ? time * 0.000026 : 0));
      starCtx.beginPath();
      starCtx.ellipse(0, 0, width * (0.18 + r * 0.062), height * (0.075 + r * 0.028), 0, 0, Math.PI * 2);
      starCtx.strokeStyle = r % 2 ? palette.galaxyA : palette.galaxyB;
      starCtx.lineWidth = 1;
      starCtx.stroke();
      starCtx.restore();
    }
    var core = starCtx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(width, height) * 0.36);
    core.addColorStop(0, palette.galaxyCoreA);
    core.addColorStop(0.44, palette.galaxyCoreB);
    core.addColorStop(1, 'transparent');
    starCtx.fillStyle = core;
    starCtx.fillRect(0, 0, width, height);
  }

  function getUnionLayoutCacheKey(unions) {
    var parts = [
      starViewportWidth(),
      starViewportHeight(),
      unions.length,
      JSON.stringify(StarState._draggedUnionOffsets || {})
    ];
    for (var i = 0; i < unions.length; i++) {
      var u = unions[i];
      parts.push([
        u.id,
        u.member_count || 0,
        (u._members && u._members.length) || 0,
        u.region || '',
        u.bound_club_id || ''
      ].join(':'));
    }
    return parts.join('|');
  }

  function buildUnionConstellationLayout(unions) {
    var lightLayout = shouldUseLightweightStarRender();
    var mobileEnhancedLayout = shouldUseMobileEnhancedUnionRender();
    var cacheKey = getUnionLayoutCacheKey(unions) + (lightLayout ? '|mobile-lite' : (mobileEnhancedLayout ? '|mobile-enhanced' : '|full'));
    if (StarState._unionLayoutCache && StarState._unionLayoutCacheKey === cacheKey) {
      return StarState._unionLayoutCache;
    }
    var sorted = unions.slice().sort(function (a, b) {
      return ((b.member_count || 0) - (a.member_count || 0)) || String(a.name || '').localeCompare(String(b.name || ''));
    });
    var world = getUnionWorldSize(sorted.length);
    var centerX = world.width / 2;
    var centerY = world.height / 2;
    var positions = [];

    for (var i = 0; i < sorted.length; i++) {
      var union = sorted[i];
      var memberCount = Math.max((union._members && union._members.length) || union.member_count || 0, 0);
      var memberRings = Math.max(1, Math.ceil(Math.max(memberCount, 1) / 7));
      var clusterRadius = Math.min(156, 92 + (memberRings - 1) * 30 + Math.sqrt(Math.max(memberCount, 1)) * 2.2);
      var x = centerX;
      var y = centerY;
      if (i > 0) {
        var remaining = i - 1;
        var ring = 0;
        var cap = 6;
        while (remaining >= cap) {
          remaining -= cap;
          ring++;
          cap = 6 + ring * 4;
        }
        var angle = (remaining / cap) * Math.PI * 2 + ring * 0.21 - Math.PI / 2;
        var radius = 420 + ring * 440;
        var oval = 0.82;
        var jitter = ((union.id || i) % 7 - 3) * 16;
        x = centerX + Math.cos(angle) * (radius + jitter);
        y = centerY + Math.sin(angle) * (radius * oval + jitter * 0.5);
      }
      var margin = clusterRadius + 160;

      x = Math.max(margin, Math.min(world.width - margin, x));
      y = Math.max(margin, Math.min(world.height - margin, y));
      var manualOffset = StarState._draggedUnionOffsets && StarState._draggedUnionOffsets[union.id];
      if (manualOffset) {
        x += manualOffset.x || 0;
        y += manualOffset.y || 0;
        x = Math.max(margin, Math.min(world.width - margin, x));
        y = Math.max(margin, Math.min(world.height - margin, y));
      }
      positions.push({
        x: x,
        y: y,
        union: union,
        index: i,
        layoutRing: i === 0 ? 0 : ring + 1,
        clusterRadius: clusterRadius,
        hitRadius: Math.max(28, Math.min(48, 24 + Math.sqrt(Math.max(memberCount, 1)) * 4)),
        memberCount: memberCount
      });
    }
    relaxUnionClusterSpacing(positions, world, centerX, centerY, lightLayout ? 1 : (mobileEnhancedLayout ? 2 : 5));
    for (var p = 0; p < positions.length; p++) {
      var pos = positions[p];
      var membersForLayout = pos.union._members || [];
      if (lightLayout) {
        var lightMemberLimit = p < 8 ? 10 : (p < 24 ? 4 : 0);
        membersForLayout = membersForLayout.slice(0, lightMemberLimit);
      } else if (mobileEnhancedLayout) {
        var enhancedMemberLimit = p < 10 ? 18 : (p < 28 ? 8 : 0);
        membersForLayout = membersForLayout.slice(0, enhancedMemberLimit);
      }
      pos.memberPositions = buildUnionMemberPositions(pos.x, pos.y, membersForLayout, pos.clusterRadius, p);
      for (var mp = 0; mp < pos.memberPositions.length; mp++) {
        pos.memberPositions[mp].club._unionId = pos.union.id;
        pos.memberPositions[mp].club._unionName = pos.union.name || '';
      }
    }
    var layout = { positions: positions, world: world, centerX: centerX, centerY: centerY };
    layout.sharedMembers = (lightLayout || mobileEnhancedLayout) ? {} : buildSharedUnionMembershipIndex(positions);
    StarState._sharedUnionMembers = layout.sharedMembers;
    StarState._unionLayoutCacheKey = cacheKey;
    StarState._unionLayoutCache = layout;

  function buildSharedUnionMembershipIndex(positions) {
    var map = {};
    for (var i = 0; i < positions.length; i++) {
      var p = positions[i];
      var members = p.memberPositions || [];
      for (var j = 0; j < members.length; j++) {
        var key = targetKeyForClub(members[j].club);
        if (!map[key]) map[key] = [];
        map[key].push({ x: members[j].x, y: members[j].y, club: members[j].club, union: p.union, cluster: p });
      }
    }
    for (var key in map) {
      if (map[key].length < 2) {
        delete map[key];
        continue;
      }
      var names = [];
      for (var n = 0; n < map[key].length; n++) {
        if (map[key][n].union && map[key][n].union.name) names.push(map[key][n].union.name);
      }
      for (var e = 0; e < map[key].length; e++) {
        map[key][e].club._sharedUnionCount = map[key].length;
        map[key][e].club._sharedUnionNames = names;
      }
    }
    return map;
  }

  function relaxUnionClusterSpacing(positions, world, centerX, centerY, passCount) {
    if (!positions || positions.length < 2) return;
    passCount = passCount == null ? 5 : passCount;
    for (var pass = 0; pass < passCount; pass++) {
      for (var i = 0; i < positions.length; i++) {
        for (var j = i + 1; j < positions.length; j++) {
          var a = positions[i], b = positions[j];
          var dx = b.x - a.x;
          var dy = b.y - a.y;
          var dist = Math.sqrt(dx * dx + dy * dy) || 1;
          var desired = Math.max(360, (a.clusterRadius || 100) + (b.clusterRadius || 100) + 190);
          if (dist >= desired) continue;
          var push = (desired - dist) * 0.5;
          var ux = dx / dist;
          var uy = dy / dist;
          if (i === 0) {
            b.x += ux * push * 1.8;
            b.y += uy * push * 1.8;
          } else {
            a.x -= ux * push;
            a.y -= uy * push;
            b.x += ux * push;
            b.y += uy * push;
          }
        }
      }
      var centerWasDragged = positions[0] && StarState._draggedUnionOffsets && StarState._draggedUnionOffsets[positions[0].union.id];
      if (!centerWasDragged) {
        positions[0].x = centerX;
        positions[0].y = centerY;
      }
      for (var k = 1; k < positions.length; k++) {
        var p = positions[k];
        if (StarState._draggedUnionOffsets && StarState._draggedUnionOffsets[p.union.id]) continue;
        var margin = (p.clusterRadius || 100) + 180;
        p.x = Math.max(margin, Math.min(world.width - margin, p.x));
        p.y = Math.max(margin, Math.min(world.height - margin, p.y));
      }
    }
  }

  function getUserMembershipMap() {
    var map = {};

    for (var i = 0; i < memberships.length; i++) {

      map[(m.country || 'china') + '_' + m.club_id] = m;

    return map;

  function scoreUnionForCurrentUser(union, membershipMap) {
    if (!union || !membershipMap) return 0;
    var score = 0;
    var roleWeight = { representative: 80, manager: 52, member: 24 };
    var boundKey = (union.bound_club_country || 'china') + '_' + union.bound_club_id;
    if (union.bound_club_id && membershipMap[boundKey]) {
      var boundRole = membershipMap[boundKey].role || 'member';
      score += 140 + (roleWeight[boundRole] || 18);
    }
    var members = union._members || [];
    for (var i = 0; i < members.length; i++) {
      var key = (members[i].club_country || 'china') + '_' + members[i].club_id;
      if (!membershipMap[key]) continue;
      var role = membershipMap[key].role || members[i].role || 'member';
      score += roleWeight[role] || 18;
    }
    score += Math.min((union.member_count || members.length || 0), 30) * 0.4;
    return score;
  }

  function findPreferredUnionForCurrentUser() {
    var unions = StarState.unions || [];
    if (!unions.length) return null;
    var membershipMap = getUserMembershipMap();
    var best = null;
    var bestScore = 0;
    for (var i = 0; i < unions.length; i++) {
      var score = scoreUnionForCurrentUser(unions[i], membershipMap);
      if (score > bestScore) {
        bestScore = score;
        best = unions[i];

    return bestScore > 0 ? best : null;

  function buildUnionConnections(positions) {
    var cacheKey = StarState._unionLayoutCacheKey || '';
    if (StarState._unionConnectionCache && StarState._unionConnectionCacheKey === cacheKey) {
      return StarState._unionConnectionCache;
    }
    var byRegion = {};
    for (var i = 0; i < positions.length; i++) {
      var region = positions[i].union.region || '';
      if (!region) continue;
      if (!byRegion[region]) byRegion[region] = [];
      byRegion[region].push(positions[i]);
    }
    var connections = [];
    for (var region in byRegion) {
      var group = byRegion[region].slice().sort(function (a, b) { return (b.memberCount || 0) - (a.memberCount || 0); });
      if (group.length < 2) continue;
      for (var a = 1; a < group.length; a++) {
        connections.push({ from: group[0], to: group[a] });
      }
    }
    StarState._unionConnectionCacheKey = cacheKey;
    StarState._unionConnectionCache = connections;
    return connections;
  }

  function getUnionMemberClub(member) {
    var country = member.club_country || 'china';
    var full = StarState.clubLookup[country + '_' + member.club_id];
    return {
      club_id: member.club_id,
      country: country,
      name: (full && (full.name || full.display_name)) || member.club_name || ('同好会#' + member.club_id),
      school: (full && full.school) || member.club_school || '',
      province: (full && (full.province || full.prefecture)) || member.club_province || '',
      role: member.role || 'member'
    };

  function buildUnionMemberPositions(cx, cy, members, clusterRadius, unionIndex) {
    var clubs = members.map(getUnionMemberClub);
    var roleOrder = { representative: 3, manager: 2, member: 1 };
    clubs.sort(function (a, b) {
      return (roleOrder[b.role] || 0) - (roleOrder[a.role] || 0);
    });
    var positions = [];
    var goldenAngle = Math.PI * (3 - Math.sqrt(5));
    var baseRadius = Math.max(102, Math.min(132, clusterRadius * 0.82));
    var ringSpacing = Math.max(46, Math.min(58, clusterRadius * 0.34));
    var ringCaps = [6, 10, 14, 18, 22, 26];
    var idx = 0;
    var ring = 0;
    var remaining = clubs.length;

    while (idx < clubs.length && ring < 6) {
      var capacity = ringCaps[ring] || 26;
      var count = Math.min(capacity, remaining);
      var radius = baseRadius + ring * ringSpacing;
      var rotOffset = ring * goldenAngle + unionIndex * 0.19 - Math.PI / 2;
      for (var j = 0; j < count; j++) {
        var angle = (2 * Math.PI * j / count) + rotOffset;
        var fineOffset = ((clubs[idx].club_id || idx) % 5 - 2) * 0.018;
        positions.push({
          x: cx + Math.cos(angle + fineOffset) * radius * 0.9,
          y: cy + Math.sin(angle + fineOffset) * radius * 0.82,
          club: clubs[idx],
          ring: ring
        });
        idx++;
      }
      remaining -= count;
      ring++;
    }
    return positions;
  }
