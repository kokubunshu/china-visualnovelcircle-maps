      glow.addColorStop(0.55, light ? 'rgba(183,121,37,0.035)' : 'rgba(200,160,80,0.055)');
      glow.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(cx, cy, 30 + r * 10, 0, Math.PI * 2);
      starCtx.fillStyle = glow;
      starCtx.fill();
    }

    starCtx.save();
    starCtx.translate(cx, cy);
    starCtx.rotate(STAR_MAP_ENABLE_PULSE ? (StarState.animationTime || 0) * 0.00022 : 0.18);
    starCtx.beginPath();
    starCtx.ellipse(0, 0, 38, 15, 0, 0, Math.PI * 2);
    starCtx.strokeStyle = hexToRgba(starColor, isSelected || isHovered ? 0.46 : 0.24);
    starCtx.lineWidth = isSelected ? 2 : 1.2;
    starCtx.stroke();
    starCtx.restore();

    starCtx.beginPath();
    starCtx.arc(cx, cy, coreSize, 0, Math.PI * 2);
    var core = starCtx.createRadialGradient(cx - coreSize * 0.35, cy - coreSize * 0.35, 0, cx, cy, coreSize);
    core.addColorStop(0, '#fff');
    core.addColorStop(0.34, starColor);
    core.addColorStop(1, hexToRgba(starColor, light ? 0.72 : 0.58));
    starCtx.fillStyle = core;
    starCtx.fill();
    starCtx.strokeStyle = isSelected ? 'rgba(255,255,255,0.78)' : (light ? 'rgba(84,54,28,0.26)' : 'rgba(255,255,255,0.32)');
    starCtx.lineWidth = isSelected ? 2 : 1.3;
    starCtx.stroke();

    var initial = (union.bound_club_name || union.name || 'U').charAt(0).toUpperCase();
    starCtx.fillStyle = light ? 'rgba(46,31,20,0.78)' : 'rgba(255,255,255,0.84)';
    starCtx.font = '800 13px "Noto Sans SC", sans-serif';
    starCtx.textAlign = 'center';
    starCtx.textBaseline = 'middle';
    starCtx.fillText(initial, cx, cy + 1);

    var name = union.name || '联合';
    if (name.length > 14) name = name.substring(0, 13) + '...';
    starCtx.fillStyle = palette.coreText;
    starCtx.font = '700 11px "Noto Sans SC", sans-serif';
    starCtx.fillText(name, cx, cy + 38);

    var hub = union.bound_club_id ? resolveClubName(union.bound_club_id, union.bound_club_country || 'china', union.bound_club_name) : '未绑定联合群';
    if (hub.length > 13) hub = hub.substring(0, 12) + '...';
    starCtx.fillStyle = union.bound_club_id ? palette.hubText : palette.mutedText;
    starCtx.font = '9px "Noto Sans SC", sans-serif';
    starCtx.fillText(hub, cx, cy + 53);
  }

  function drawUnionMemberStar(x, y, club, isHovered, ring, time, sharedCount) {
    var palette = unionThemePalette();
    var light = currentTheme() === 'light';
    var lightweight = shouldUseLightweightStarRender();
    var memberPalette = light
      ? ['#b77925', '#287c9a', '#8060a8', '#3d8a66', '#b85f5b', '#2d8ca3']
      : ['#f0c060', '#88bbee', '#c8a0e0', '#7ec8a0', '#e8a0a0', '#a0d8e8'];
    var colorIdx = ((ring || 0) * 3 + ((club.club_id || 0) % 3)) % memberPalette.length;
    var roleColor = memberPalette[colorIdx];
    var baseSize = 6.8;
    var hoverPulse = 1;
    var size = isHovered ? 10.2 * hoverPulse : baseSize + Math.min(1.4, (ring || 0) * 0.28);
    if (lightweight && !isHovered) {
      starCtx.beginPath();
      starCtx.arc(x, y, 4.6, 0, Math.PI * 2);
      starCtx.fillStyle = roleColor;
      starCtx.fill();
      return;
    }
    drawStarGlow(x, y, roleColor, size * (isHovered ? 4.1 : 2.8), isHovered ? 0.22 : 0.12);
    if (isHovered || sharedCount > 1) drawFocusRing(x, y, size + (isHovered ? 8 : 5), sharedCount > 1 ? '#5fb7d7' : roleColor, !!isHovered);

    if (!lightweight) {
      var glow = starCtx.createRadialGradient(x, y, 0, x, y, size * (isHovered ? 3.5 : 2.4));
      glow.addColorStop(0, hexToRgba(roleColor, isHovered ? 0.28 : 0.18));
      glow.addColorStop(1, 'transparent');
      starCtx.beginPath();
      starCtx.arc(x, y, size * (isHovered ? 3.5 : 2.4), 0, Math.PI * 2);
      starCtx.fillStyle = glow;
      starCtx.fill();
    }

    starCtx.beginPath();
    starCtx.arc(x, y, size, 0, Math.PI * 2);
    starCtx.fillStyle = roleColor;
    starCtx.fill();

    starCtx.beginPath();
    starCtx.arc(x, y, size * 0.38, 0, Math.PI * 2);
    starCtx.fillStyle = 'rgba(255,255,255,0.30)';
    starCtx.fill();

    if (isHovered) {
      starCtx.strokeStyle = light ? 'rgba(66,42,28,0.32)' : 'rgba(255,255,255,0.55)';
      starCtx.lineWidth = 1.6;
      starCtx.stroke();
    }

    if (!lightweight && sharedCount > 1) {
      starCtx.save();
      starCtx.beginPath();
      starCtx.arc(x + size * 0.82, y - size * 0.82, Math.max(4.2, size * 0.42), 0, Math.PI * 2);
      starCtx.fillStyle = light ? 'rgba(255,252,246,0.92)' : 'rgba(10,18,32,0.92)';
      starCtx.strokeStyle = light ? 'rgba(40,124,154,0.42)' : 'rgba(95,183,215,0.58)';
      starCtx.lineWidth = 1;
      starCtx.fill();
      starCtx.stroke();
      starCtx.fillStyle = light ? 'rgba(24,83,104,0.90)' : 'rgba(190,235,255,0.92)';
      starCtx.font = '800 7px "Noto Sans SC", sans-serif';
      starCtx.textAlign = 'center';
      starCtx.textBaseline = 'middle';
      starCtx.fillText(String(Math.min(sharedCount, 9)), x + size * 0.82, y - size * 0.82 + 0.3);
      starCtx.restore();
    }

    if (!lightweight || isHovered) {
      var label = club.name || '';
      if (label.length > 10) label = label.substring(0, 9) + '...';
      starCtx.fillStyle = light
        ? 'rgba(44,31,24,' + (isHovered ? '0.88' : '0.62') + ')'
        : 'rgba(255,255,255,' + (isHovered ? '0.86' : '0.50') + ')';
      starCtx.font = (isHovered ? '11' : '9') + 'px "Noto Sans SC", sans-serif';
      starCtx.textAlign = 'center';
      starCtx.textBaseline = 'alphabetic';
      starCtx.fillText(label, x, y + size + 12);
    }
  }

  function getWorldViewportBounds(pad) {
    pad = pad || 0;
    var z = Math.max(StarState.zoom || 1, 0.001);
    var W = starViewportWidth();
    var H = starViewportHeight();
    return {
      left: (-StarState.panX / z) - pad,
      top: (-StarState.panY / z) - pad,
      right: ((W - StarState.panX) / z) + pad,
      bottom: ((H - StarState.panY) / z) + pad
    };
  }

  function isPointNearWorldBounds(x, y, radius, bounds) {
    return x + radius >= bounds.left && x - radius <= bounds.right && y + radius >= bounds.top && y - radius <= bounds.bottom;
  }

  function drawSharedUnionMembershipLinks(sharedMembers, bounds) {
    if (!sharedMembers) return;
    var drawCount = 0;
    var maxLinks = window.innerWidth <= 768 ? 18 : 36;
    for (var key in sharedMembers) {
      var entries = sharedMembers[key];
      if (!entries || entries.length < 2) continue;
      var active = StarState.searchHighlightKey === key || (StarState.hoveredStar && targetKeyForClub(StarState.hoveredStar) === key);
      if (!active && drawCount > maxLinks * 0.55) continue;
      for (var i = 0; i < entries.length - 1; i++) {
        var a = entries[i], b = entries[i + 1];
        var minX = Math.min(a.x, b.x), maxX = Math.max(a.x, b.x);
        var minY = Math.min(a.y, b.y), maxY = Math.max(a.y, b.y);
        if (maxX < bounds.left || minX > bounds.right || maxY < bounds.top || minY > bounds.bottom) continue;
        drawConstellationLine(a.x, a.y, b.x, b.y, {
          strength: active ? 0.22 : 0.075,
          index: 700 + drawCount,
          width: active ? 1.2 : 0.7,
          curved: true,
          curveOffset: active ? 34 : 24,
          spark: false,
          flow: active
        });
        drawCount++;
        if (drawCount >= maxLinks) return;
      }
    }
  }

  function renderUnionStarMap() {
    var W = starViewportWidth(), H = starViewportHeight();
    starCtx.clearRect(0, 0, W, H);
    StarState._allUnionMemberPositions = [];
    StarState._unionPositions = [];
    var lightweight = shouldUseLightweightStarRender();
    var mobileEnhanced = shouldUseMobileEnhancedUnionRender();

    drawObservatoryBackdrop(W, H, 0.86);

    starCtx.save();
    starCtx.translate(StarState.panX, StarState.panY);
    starCtx.scale(StarState.zoom, StarState.zoom);

    var unions = StarState.unions;
    if (!unions.length) { starCtx.restore(); return; }
    var layout = buildUnionConstellationLayout(unions);
    drawUnionGalaxyFieldV2(layout.centerX, layout.centerY, layout.world.width, layout.world.height);

    var positions = layout.positions;
    var bounds = getWorldViewportBounds(260);
    StarState._unionPositions = positions;
    if (!lightweight) {
      var regionConnections = buildUnionConnections(positions);
      var mobileConnectionCount = 0;
      for (var rc = 0; rc < regionConnections.length; rc++) {
        var conn = regionConnections[rc];
        var minX = Math.min(conn.from.x, conn.to.x), maxX = Math.max(conn.from.x, conn.to.x);
        var minY = Math.min(conn.from.y, conn.to.y), maxY = Math.max(conn.from.y, conn.to.y);
        if (maxX < bounds.left || minX > bounds.right || maxY < bounds.top || minY > bounds.bottom) continue;
        var regionActive = (StarState.selectedUnion && (StarState.selectedUnion.id === conn.from.union.id || StarState.selectedUnion.id === conn.to.union.id)) ||
          (StarState.hoveredUnion && (StarState.hoveredUnion.id === conn.from.union.id || StarState.hoveredUnion.id === conn.to.union.id)) ||
          (StarState.searchHighlightKey && (StarState.searchHighlightKey === targetKeyForUnion(conn.from.union) || StarState.searchHighlightKey === targetKeyForUnion(conn.to.union)));
        if (mobileEnhanced && !regionActive && mobileConnectionCount >= 16) continue;
        drawUnionConstellationLine(conn.from.x, conn.from.y, conn.to.x, conn.to.y, regionActive ? 0.22 : 0.10, rc, true, regionActive);
        mobileConnectionCount++;
      }
      if (!mobileEnhanced) drawSharedUnionMembershipLinks(layout.sharedMembers, bounds);
    }

    var maxLightweightClusters = isMobileStarMap() ? (mobileEnhanced ? 34 : 24) : positions.length;
    var lightweightClustersDrawn = 0;
    for (var i = 0; i < positions.length; i++) {
      var p = positions[i];
      if (!isPointNearWorldBounds(p.x, p.y, (p.clusterRadius || 120) + 130, bounds)) continue;
      var union = p.union;
      var memberPositions = p.memberPositions || [];
      var clusterActive = (StarState.selectedUnion && StarState.selectedUnion.id === union.id) ||
        (StarState.hoveredUnion && StarState.hoveredUnion.id === union.id);
      var clusterSearchActive = StarState.searchHighlightKey === targetKeyForUnion(union);
      if ((lightweight || mobileEnhanced) && lightweightClustersDrawn >= maxLightweightClusters && !clusterActive && !clusterSearchActive) continue;
      lightweightClustersDrawn++;

      drawUnionNebula(p.x, p.y, p.clusterRadius + 86, i);

      if (!lightweight || clusterActive || clusterSearchActive) {
        var orbitRadius = p.clusterRadius + 42;
        starCtx.save();
        starCtx.translate(p.x, p.y);
        starCtx.rotate((STAR_MAP_ENABLE_PULSE ? ((StarState.animationTime || 0) * 0.00009) : 0) + i * 0.12);
        starCtx.beginPath();
        starCtx.ellipse(0, 0, orbitRadius * 0.92, orbitRadius * 0.76, 0, 0, Math.PI * 2);
        starCtx.strokeStyle = clusterActive
          ? (currentTheme() === 'light' ? 'rgba(183,121,37,0.28)' : 'rgba(240,192,96,0.24)')
          : (currentTheme() === 'light' ? 'rgba(40,124,154,0.12)' : 'rgba(136,187,238,0.10)');
        starCtx.lineWidth = clusterActive ? 1.2 : 0.8;
        starCtx.stroke();
        starCtx.restore();
      }

      var memberLineBudget = lightweight ? 0 : (mobileEnhanced ? Math.min(8, memberPositions.length) : memberPositions.length);
      for (var a = 0; a < memberPositions.length && a < memberLineBudget; a++) {
        if (!isPointNearWorldBounds(memberPositions[a].x, memberPositions[a].y, 44, bounds)) continue;
        var memberActive = StarState.hoveredStar &&
          StarState.hoveredStar.club_id === memberPositions[a].club.club_id &&
          StarState.hoveredStar.country === memberPositions[a].club.country;
        var memberSearchActive = StarState.searchHighlightKey === targetKeyForClub(memberPositions[a].club);
        drawUnionConstellationLine(p.x, p.y, memberPositions[a].x, memberPositions[a].y, clusterActive || memberActive || memberSearchActive ? 0.28 : 0.15, i * 31 + a, false, clusterActive || memberActive || memberSearchActive);
      }

      if (lightweight || mobileEnhanced) continue;
      var byProvince = {};
      for (var b = 0; b < memberPositions.length; b++) {
        if (!isPointNearWorldBounds(memberPositions[b].x, memberPositions[b].y, 36, bounds)) continue;
        var prov = memberPositions[b].club.province || '__unknown__';
        if (!byProvince[prov]) byProvince[prov] = [];
        byProvince[prov].push(memberPositions[b]);
      }
      for (var provKey in byProvince) {
        var group = byProvince[provKey];
        if (group.length < 2) continue;
        group.sort(function (a, b) {
          return Math.atan2(a.y - p.y, a.x - p.x) - Math.atan2(b.y - p.y, b.x - p.x);
        });
        for (var g1 = 0; g1 < group.length - 1; g1++) {
          drawUnionConstellationLine(group[g1].x, group[g1].y, group[g1 + 1].x, group[g1 + 1].y, clusterActive ? 0.14 : 0.08, i * 47 + g1, false);
        }
      }
    }

    var drawnMembers = 0;
    var maxLightweightMembers = isMobileStarMap() ? (mobileEnhanced ? 96 : 36) : Infinity;
    for (var j = 0; j < positions.length; j++) {
      var cluster = positions[j];
      if (!isPointNearWorldBounds(cluster.x, cluster.y, (cluster.clusterRadius || 120) + 130, bounds)) continue;
      var mp = cluster.memberPositions || [];
      for (var k = 0; k < mp.length; k++) {
        if ((lightweight || mobileEnhanced) && drawnMembers >= maxLightweightMembers) break;
        if (!isPointNearWorldBounds(mp[k].x, mp[k].y, 40, bounds)) continue;
        var isMemberHovered = StarState.hoveredStar &&
          StarState.hoveredStar.club_id === mp[k].club.club_id &&
          StarState.hoveredStar.country === mp[k].club.country;
        var memberIsSearchHit = StarState.searchHighlightKey === targetKeyForClub(mp[k].club);
        var sharedCount = (layout.sharedMembers && layout.sharedMembers[targetKeyForClub(mp[k].club)] || []).length;
        drawUnionMemberStar(mp[k].x, mp[k].y, mp[k].club, isMemberHovered || memberIsSearchHit, mp[k].ring, StarState.animationTime, sharedCount);
        if (memberIsSearchHit) drawFocusRing(mp[k].x, mp[k].y, 22, '#5fb7d7', true);
        StarState._allUnionMemberPositions.push({ x: mp[k].x, y: mp[k].y, club: mp[k].club, unionId: cluster.union.id });
        drawnMembers++;
      }
    }
    var lightweightHubsDrawn = 0;
    for (var h = 0; h < positions.length; h++) {
      var hubCluster = positions[h];
      if (!isPointNearWorldBounds(hubCluster.x, hubCluster.y, (hubCluster.clusterRadius || 120) + 150, bounds)) continue;
      var isSelected = StarState.selectedUnion && StarState.selectedUnion.id === hubCluster.union.id;
      var isHovered = StarState.hoveredUnion && StarState.hoveredUnion.id === hubCluster.union.id;
      var isSearchHit = StarState.searchHighlightKey === targetKeyForUnion(hubCluster.union);
      if ((lightweight || mobileEnhanced) && lightweightHubsDrawn >= maxLightweightClusters && !isSelected && !isHovered && !isSearchHit) continue;
      lightweightHubsDrawn++;
      drawUnionHubCenter(hubCluster.x, hubCluster.y, hubCluster.union, isSelected, isHovered);
      if (isSearchHit) drawFocusRing(hubCluster.x, hubCluster.y, 56, '#5fb7d7', true);
    }

    if (StarState._activeBurst) {
      if (!drawStarBurst(StarState._activeBurst.x, StarState._activeBurst.y, StarState._activeBurst.color, StarState._activeBurst.start, StarState._activeBurst.radius)) {
        StarState._activeBurst = null;
      }
    }

    starCtx.restore();
  }

  function hitTestUnionMember(mx, my) {
    var allPos = StarState._allUnionMemberPositions;
    if (!allPos) return null;
    var w = screenToWorld(mx, my);
    var best = null;
    var bestDist = Math.max(18 / Math.max(StarState.zoom, 0.55), 12);
    for (var i = 0; i < allPos.length; i++) {
      var dx = w.x - allPos[i].x, dy = w.y - allPos[i].y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < bestDist) { bestDist = dist; best = allPos[i].club; }
    }
    return best;
  }

  function hitTestUnion(mx, my) {
    var positions = StarState._unionPositions;
    if (!positions) return null;
    var w = screenToWorld(mx, my);
    var best = null;
    var bestDist = Math.max(36 / Math.max(StarState.zoom, 0.55), 28);
    for (var i = 0; i < positions.length; i++) {
      var dx = w.x - positions[i].x, dy = w.y - positions[i].y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < bestDist) { bestDist = dist; best = positions[i].union; }
    }
    return best;
  }

  function getStarRenderKey() {
    var hoverStar = StarState.hoveredStar ? ((StarState.hoveredStar.country || 'china') + '_' + StarState.hoveredStar.club_id) : '';
    var hoverUnion = StarState.hoveredUnion ? StarState.hoveredUnion.id : '';
    var selectedUnion = StarState.selectedUnion ? StarState.selectedUnion.id : '';
    var dataKey = StarState.submode === 'union'
      ? StarState.unions.length + ':' + StarState.unions.reduce(function (sum, u) { return sum + ((u._members && u._members.length) || 0); }, 0)
      : StarState.personalClubs.length;
    return [
      currentTheme(),
      StarState.submode,
      starViewportWidth(),
      starViewportHeight(),
      Math.round(StarState.zoom * 1000),
      Math.round(StarState.panX),
      Math.round(StarState.panY),
      Math.round(StarState.targetZoom * 1000),
      Math.round(StarState.targetPanX),
      Math.round(StarState.targetPanY),
      hoverStar,
      hoverUnion,
      selectedUnion,
      StarState.searchHighlightKey || '',
      shouldUseLightweightStarRender() ? 'mobile-lite' : 'full',
      StarState._draggingUnionId || '',
      JSON.stringify(StarState._draggedUnionOffsets || {}),
      dataKey
    ].join('|');
  }

  function drawSceneTransitionOverlay(W, H) {
    var t = StarState._submodeTransition;
    if (!t || prefersReducedMotion()) return;
    var elapsed = performance.now() - t.start;
    var p = Math.max(0, Math.min(1, elapsed / t.duration));
    var alpha = p < 0.5 ? p * 2 : (1 - p) * 2;
    var light = currentTheme() === 'light';
    starCtx.save();
    starCtx.setTransform(1, 0, 0, 1, 0, 0);
    var grad = starCtx.createRadialGradient(W * 0.5, H * 0.48, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.82);
    grad.addColorStop(0, light ? 'rgba(255,248,236,' + (alpha * 0.20) + ')' : 'rgba(95,183,215,' + (alpha * 0.16) + ')');
    grad.addColorStop(0.56, light ? 'rgba(183,121,37,' + (alpha * 0.10) + ')' : 'rgba(8,16,34,' + (alpha * 0.32) + ')');
    grad.addColorStop(1, light ? 'rgba(246,238,224,' + (alpha * 0.50) + ')' : 'rgba(0,0,0,' + (alpha * 0.62) + ')');
    starCtx.fillStyle = grad;
    starCtx.fillRect(0, 0, W, H);
    starCtx.restore();
  }

  function hasActiveStarEffects() {
    return !!(
      StarState.selectedUnion ||
      StarState.hoveredUnion ||
      StarState.hoveredStar ||
      StarState.searchHighlightKey ||
      StarState.selectedStar ||
      StarState._focusPulse
    );
  }

  function needsStarRenderLoop() {
    return !!(
      StarState.isDragging ||
      StarState._submodeTransition ||
      StarState._activeBurst ||
      Math.abs(StarState.targetZoom - StarState.zoom) > 0.001 ||
      Math.abs(StarState.targetPanX - StarState.panX) > 0.6 ||
      Math.abs(StarState.targetPanY - StarState.panY) > 0.6
    );
  }

  function renderFrame() {
    // Frame skip guard
    var now = performance.now();
    if (now - (StarState._lastRenderTime || 0) < 5) return;
    StarState._lastRenderTime = now;
    var hasViewportMotion =
      StarState.isDragging ||
      Math.abs(StarState.targetZoom - StarState.zoom) > 0.001 ||
      Math.abs(StarState.targetPanX - StarState.panX) > 0.6 ||
      Math.abs(StarState.targetPanY - StarState.panY) > 0.6;
    updateSubmodeTransition();
    var hasTransientMotion = !!StarState._submodeTransition ||
      !!StarState._activeBurst ||
      (!prefersReducedMotion() && hasActiveStarEffects() && now - (StarState._lastEffectFrame || 0) >= 48);
    var nextRenderKey = getStarRenderKey();
    if (!STAR_MAP_ENABLE_PULSE && !hasViewportMotion && !hasTransientMotion && StarState._lastRenderKey === nextRenderKey) return;
    if (!hasViewportMotion && !StarState._submodeTransition && !StarState._activeBurst) StarState._lastEffectFrame = now;

    // Smooth zoom/pan interpolation
    var lerp = 0.18;
    StarState.zoom += (StarState.targetZoom - StarState.zoom) * lerp;
    StarState.panX += (StarState.targetPanX - StarState.panX) * lerp;
    StarState.panY += (StarState.targetPanY - StarState.panY) * lerp;
    if (Math.abs(StarState.targetZoom - StarState.zoom) < 0.001) {
      StarState.zoom = StarState.targetZoom;
      StarState.panX = StarState.targetPanX;
      StarState.panY = StarState.targetPanY;
    }
    StarState._parallaxX += (StarState.panX - StarState._parallaxX) * 0.08;
    StarState._parallaxY += (StarState.panY - StarState._parallaxY) * 0.08;
    StarState._lineFlowBudget = 0;
    if (StarState.submode === 'personal') {
      renderPersonalStarMap();
    } else {
      renderUnionStarMap();
    }
    drawSceneTransitionOverlay(starViewportWidth(), starViewportHeight());
    if (!(isMobileStarMap() && StarState._mobileInteractionActive)) updateObservatoryHud();
    StarState._lastRenderKey = getStarRenderKey();
  }

  function startStarRenderLoop() {
    if (StarState._renderLoopId) return;
    var idleFrames = 0;
    function loop() {
      StarState._renderLoopId = 0;
      StarState.animationTime = performance.now();
      renderFrame();
      var keepRunning = !document.hidden && needsStarRenderLoop();
      if (!keepRunning) idleFrames += 1;
      if (keepRunning || idleFrames < 3) {
        StarState._renderLoopId = requestAnimationFrame(loop);
      }
    }
    StarState._renderLoopId = requestAnimationFrame(loop);
  }

  function stopStarRenderLoop() {
    if (StarState._renderLoopId) {
      cancelAnimationFrame(StarState._renderLoopId);
      StarState._renderLoopId = 0;
    }
  }

  // ── Club Detail Modal ──
  function openClubDetail(club) {
    var full = StarState.clubLookup[(club.country || 'china') + '_' + club.club_id];
    if (!full) return;

    var name = full.name || full.display_name || '未命名';
    var school = full.school || '';
    var province = full.province || full.prefecture || '';
    var info = full.info || '';
    var remark = full.remark || '';

  function saveUnion() {
    var btn = $('edSaveBtn');
    if (btn.disabled) return;
    var name = $('edName').value.trim();
    if (!name) { alert('请输入联合名称'); return; }
    var activeSwatch = document.querySelector('.color-swatch.active');
    var data = {
      name: name,
      description: $('edDesc').value.trim(),
      region: $('edRegion').value.trim(),
      country: $('edCountry').value,
      star_color: activeSwatch ? activeSwatch.dataset.color : '#f0c060'
    };
    if (StarState.boundClub) {
      data.bound_club_id = StarState.boundClub.club_id;
      data.bound_club_country = StarState.boundClub.country;
    } else {
      data.bound_club_id = null;
    }

    btn.disabled = true;
    btn.textContent = '保存中...';

    function done() {
      btn.disabled = false;
      btn.textContent = '保存';
    }

    function handleError(err) {
      console.error('saveUnion error:', err);
      alert('保存失败，请检查网络连接或重试');
      done();
    }

    if (StarState.editingUnionId) {
      data.id = StarState.editingUnionId;
      apiPost('./api/star_unions.php?action=update', data).then(function (res) {
        if (res.success) {
          syncUnionClubs(StarState.editingUnionId).then(function () {
            closeEditor();
            loadUnions();
            done();
          }).catch(handleError);
        } else { alert(res.message || '更新失败'); done(); }
      }).catch(handleError);
    } else {
      apiPost('./api/star_unions.php?action=create', data).then(function (res) {
        if (res.success) {
          var newId = res.union.id;
          StarState.editingUnionId = newId;
          syncUnionClubs(newId).then(function () {
            closeEditor();
            loadUnions();
            done();
          }).catch(handleError);
        } else { alert(res.message || '创建失败'); done(); }
      }).catch(handleError);
    }
  }

  function syncUnionClubs(unionId) {
    // Get current members
    return apiGet('./api/star_unions.php?action=get&id=' + unionId).then(function (res) {
      var current = res.members || [];
      var wanted = StarState.pendingClubTags;
      // Remove clubs not in wanted list
      var removals = [];
      for (var i = 0; i < current.length; i++) {
        var found = false;
        for (var j = 0; j < wanted.length; j++) {
          if (wanted[j].club_id === current[i].club_id && wanted[j].country === current[i].club_country) { found = true; break; }
        }
        if (!found) removals.push(current[i]);
      }
      // Add clubs not in current list
      var additions = [];
      for (var j = 0; j < wanted.length; j++) {
        var found = false;
        for (var i = 0; i < current.length; i++) {
          if (current[i].club_id === wanted[j].club_id && current[i].club_country === wanted[j].country) { found = true; break; }
        }
        if (!found) additions.push(wanted[j]);
      }

      var promises = [];
      for (var i = 0; i < removals.length; i++) {
        promises.push(apiPost('./api/star_unions.php?action=remove_club', { union_id: unionId, club_id: removals[i].club_id, club_country: removals[i].club_country }));
      }
      for (var j = 0; j < additions.length; j++) {
        promises.push(apiPost('./api/star_unions.php?action=add_club', { union_id: unionId, club_id: additions[j].club_id, club_country: additions[j].country }));
      }
      return Promise.all(promises);
    });
  }

  function deleteUnion(id) {
    apiPost('./api/star_unions.php?action=delete', { id: id }).then(function (res) {
      if (res.success) {
        closeDetailPanel();
        closeEditor();
        loadUnions();
      } else { alert(res.message || '删除失败'); }
    });
  }

  function removeClubFromUnion(unionId, clubId, country) {
    apiPost('./api/star_unions.php?action=remove_club', { union_id: unionId, club_id: clubId, club_country: country }).then(function (res) {
      if (res.success) {
        openDetailPanel(StarState.selectedUnion);
        loadUnions();
      } else { alert(res.message || '移除失败'); }
    });
  }

  // ── Club/School Search ──
  var searchTimeout = null;

  function getClubList() {
    var all = [];
    for (var key in StarState.clubLookup) { all.push(StarState.clubLookup[key]); }
    return all;
  }

  function normalizeSearchText(value) {
    return String(value || '').trim().toLowerCase();
  }

  function findStarSearchTargets(query) {
    var q = normalizeSearchText(query);
    if (!q) return [];
    var results = [];
    if (StarState.submode === 'personal') {
      var clubs = StarState.personalClubs || [];
      for (var i = 0; i < clubs.length; i++) {
        var c = clubs[i];
        var hay = [c.name, c.display_name, c.school, c.province].map(normalizeSearchText).join(' ');
        if (hay.indexOf(q) < 0) continue;
        results.push({ type: 'club', mode: 'personal', club: c, key: targetKeyForClub(c), title: c.name || c.display_name || '同好会', meta: [c.school, c.province].filter(Boolean).join(' · ') || '个人星图' });
      }
      return results.slice(0, 8);
    }
    var unions = StarState.unions || [];
    for (var u = 0; u < unions.length; u++) {
      var union = unions[u];
      var unionHay = [union.name, union.region, union.description, union.bound_club_name].map(normalizeSearchText).join(' ');
      if (unionHay.indexOf(q) >= 0) {
        results.push({ type: 'union', mode: 'union', union: union, key: targetKeyForUnion(union), title: union.name || '联合', meta: (union.bound_club_name || union.region || '联合星团') });
      }
      var members = union._members || [];
      for (var m = 0; m < members.length; m++) {
        var club = getUnionMemberClub(members[m]);
        var memberHay = [club.name, club.school, club.province, union.name, union.region].map(normalizeSearchText).join(' ');
        if (memberHay.indexOf(q) < 0) continue;
        var shared = StarState._sharedUnionMembers && StarState._sharedUnionMembers[targetKeyForClub(club)];
        var sharedMeta = shared && shared.length > 1 ? ('加入 ' + shared.length + ' 个联合') : (union.name || '联合星图');
        results.push({ type: 'club', mode: 'union', union: union, club: club, key: targetKeyForClub(club), title: club.name || '同好会', meta: [club.school, sharedMeta].filter(Boolean).join(' · ') });
        if (results.length >= 8) return results;
      }
      if (results.length >= 8) return results.slice(0, 8);
    }
    return results.slice(0, 8);
  }

  function renderStarSearchResults() {
    var wrap = $('starSearchWrap');
    var resultsEl = $('starSearchResults');
    var q = $('starSearchInput').value.trim();
    StarState.searchQuery = q;
    wrap.classList.toggle('has-value', !!q);
    if (!q) {
      StarState.searchResults = [];
      StarState.searchHighlightKey = '';
      resultsEl.classList.remove('visible');
      resultsEl.innerHTML = '';
      renderFrame();
      return;
    }
    var results = findStarSearchTargets(q);
    StarState.searchResults = results;
    if (!results.length) {
      resultsEl.innerHTML = '<div class="star-search-empty">未找到匹配的星点</div>';
      resultsEl.classList.add('visible');
      return;
    }
    var html = '';
    for (var i = 0; i < results.length; i++) {
      html += '<button class="star-search-result" type="button" data-index="' + i + '" role="option"><strong>' + esc(results[i].title) + '</strong><span>' + esc(results[i].meta || '') + '</span></button>';
    }
    resultsEl.innerHTML = html;
    resultsEl.classList.add('visible');
    resultsEl.querySelectorAll('.star-search-result').forEach(function (btn) {
      btn.addEventListener('click', function () { focusSearchResult(StarState.searchResults[parseInt(btn.dataset.index, 10)]); });
    });
  }

  function focusSearchResult(result) {
    if (!result) return;
    $('starSearchResults').classList.remove('visible');
    StarState.searchTarget = result;
    StarState.searchHighlightKey = result.key;
    if (result.mode && result.mode !== StarState.submode) applySubmode(result.mode);
    renderFrame();
    var target = locateSearchResult(result);
    if (!target) return;
    focusWorldPoint(target.x, target.y, Math.max(StarState.targetZoom, result.type === 'union' ? 0.98 : 1.16));
    triggerStarBurst({ x: target.x, y: target.y, color: target.color || '#5fb7d7', radius: result.type === 'union' ? 40 : 22 });
    if (result.type === 'union' && result.union) StarState.selectedUnion = result.union;
    if (result.type === 'club' && result.club) StarState.hoveredStar = result.club;
    updateObservatoryHud();
  }

  function locateSearchResult(result) {
    if (!result) return null;
    if (result.mode === 'personal') {
      var personal = StarState._positions || [];
      for (var i = 0; i < personal.length; i++) {
        if (targetKeyForClub(personal[i].club) === result.key) return { x: personal[i].x, y: personal[i].y, color: '#5fb7d7' };
      }
      return null;
    }
    var layout = buildUnionConstellationLayout(StarState.unions || []);
    var positions = layout.positions || [];
    for (var u = 0; u < positions.length; u++) {
      var p = positions[u];
      if (result.type === 'union' && targetKeyForUnion(p.union) === result.key) return { x: p.x, y: p.y, color: p.union.star_color || '#f0c060' };
      var members = p.memberPositions || [];
      for (var m = 0; m < members.length; m++) {
        if (targetKeyForClub(members[m].club) === result.key) return { x: members[m].x, y: members[m].y, color: '#5fb7d7' };
      }
    }
    return null;
  }

  function clearStarSearch() {
    $('starSearchInput').value = '';
    StarState.searchQuery = '';
    StarState.searchResults = [];
    StarState.searchTarget = null;
    StarState.searchHighlightKey = '';
    $('starSearchWrap').classList.remove('has-value');
    $('starSearchResults').classList.remove('visible');
    $('starSearchResults').innerHTML = '';
    renderFrame();
  }

  function setupStarSearch() {
    var input = $('starSearchInput');
    var results = $('starSearchResults');
    var clearBtn = $('starSearchClear');
    var timer = null;
    input.addEventListener('input', function () {
      clearTimeout(timer);
      timer = setTimeout(renderStarSearchResults, 80);
    });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (StarState.searchResults && StarState.searchResults[0]) focusSearchResult(StarState.searchResults[0]);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        clearStarSearch();
      }
    });
    clearBtn.addEventListener('click', clearStarSearch);
    document.addEventListener('click', function (e) {
      if (!input.contains(e.target) && !results.contains(e.target) && !clearBtn.contains(e.target)) results.classList.remove('visible');
    });
  }

  function setupClubSearch() {
    var input = $('edClubSearch');
    var results = $('edClubResults');

    // Search mode toggle buttons
    $('edSearchModeClub').addEventListener('click', function () {
      StarState.searchMode = 'club';
      document.querySelectorAll('.search-mode-btn').forEach(function (b) { b.classList.toggle('active', b.dataset.mode === 'club'); });

        if (StarState.searchMode === 'school') {

                for (var t = 0; t < StarState.pendingClubTags.length; t++) {
                  if (StarState.pendingClubTags[t].club_id === clubList[k].club_id && StarState.pendingClubTags[t].country === clubList[k].country) { already = true; break; }

        } else {
          // Club search (original)
          var allClubs2 = getClubList();
          var matches = allClubs2.filter(function (c) {
            var name = (c.name || c.display_name || '').toLowerCase();

          }).slice(0, 15);
          var html2 = '';
          for (var i2 = 0; i2 < matches.length; i2++) {
            var m = matches[i2];
            html2 += '<div class="club-search-item" data-club-id="' + m.id + '" data-country="' + (m._country || 'china') + '" data-name="' + esc(m.name || m.display_name || '') + '">';
            html2 += '<div>' + esc(m.name || m.display_name || '') + '</div>';
            html2 += '<div class="cs-school">' + esc(m.school || '') + ' &middot; ' + esc(m.province || m.prefecture || '') + '</div>';
            html2 += '</div>';
          }
          if (!matches.length) html2 = '<div class="club-search-item" style="color:var(--muted);">未找到匹配的同好会</div>';
          results.innerHTML = html2;
          results.classList.add('visible');
          var items = results.querySelectorAll('.club-search-item[data-club-id]');
          for (var i3 = 0; i3 < items.length; i3++) {
            items[i3].addEventListener('click', function () {
              var cid = parseInt(this.dataset.clubId);
              var ctry = this.dataset.country;
              var cname = this.dataset.name;
              var already = false;
              for (var j2 = 0; j2 < StarState.pendingClubTags.length; j2++) {
                if (StarState.pendingClubTags[j2].club_id === cid && StarState.pendingClubTags[j2].country === ctry) { already = true; break; }
              }
              if (!already) {
                StarState.pendingClubTags.push({ club_id: cid, country: ctry, name: cname });

  // ── Data Loading ──
  function loadUnions() {
    apiGet('./api/star_unions.php?action=list&include_members=1').then(function (res) {
      if (!res.success) { renderFrame(); updateEmptyState(); return; }
      var unions = res.unions || [];
      unions.forEach(function (u) {
        u._members = Array.isArray(u._members) ? u._members : [];
      });
      StarState.unions = unions;
      invalidateUnionLayoutCache();
      renderFrame();
      if (StarState.submode === 'union') setTimeout(focusPreferredUnionIfNeeded, 80);
      updateEmptyState();
    }).catch(function () { renderFrame(); updateEmptyState(); });
  }

  function updateEmptyState() {
    var empty = $('emptyState');
    if (StarState.submode === 'personal') {
      if (!StarState.personalClubs.length) {
        empty.style.display = '';
        $('emptyTitle').textContent = '个人星域尚未点亮';
        $('emptyDesc').textContent = '加入同好会后，它们会成为你的星点；也可以先切换到联合星图探索现有高校联合。';

        $('emptyDesc').textContent = '点击右上角创建联合，绑定群组并添加成员同好会，星图会自动生成连接关系。';
      } else {
        empty.style.display = 'none';
      }
    }
    updateObservatoryHud();
  }

  // ── Hex to RGBA ──
  function hexToRgba(hex, alpha) {
    var r = 240, g = 200, b = 96;
    var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if (m) { r = parseInt(m[1], 16); g = parseInt(m[2], 16); b = parseInt(m[3], 16); }
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ── HTML Escape ──
  function esc(text) {
    return String(text || '').replace(/[&<>"']/g, function (ch) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
  }

  // ── Event Bindings ──
  function bindEvents() {
    // Theme
    $('themeBtn').addEventListener('click', function () {
      applyTheme(currentTheme() === 'dark' ? 'light' : 'dark');
      setTimeout(renderFrame, 50);
    });

    // Back
    $('backBtn').addEventListener('click', function () {

    });

    // Submode switch
    document.querySelectorAll('.submode-tab').forEach(function (t) {
      t.addEventListener('click', function () {
        switchSubmode(t.dataset.submode);
      });
    });

    $('zoomOutBtn').addEventListener('click', function () { zoomBy(0.86); });
    $('zoomInBtn').addEventListener('click', function () { zoomBy(1.16); });
    $('resetViewBtn').addEventListener('click', resetView);
    $('focusSelectedBtn').addEventListener('click', focusSelectedTarget);
    $('toggleImmersiveBtn').addEventListener('click', function () {
      document.body.classList.toggle('is-immersive');
      this.textContent = document.body.classList.contains('is-immersive') ? '显示' : '沉浸';
      this.title = document.body.classList.contains('is-immersive') ? '显示辅助面板' : '隐藏辅助面板';
    });

    // ── Drag-to-Pan + Hover ──
    starCanvas.addEventListener('mousedown', function (e) {
      if (e.button !== 0) return;
      var rect = starCanvas.getBoundingClientRect();
      var mx = e.clientX - rect.left;
      var my = e.clientY - rect.top;
      if (StarState.submode === 'union') {
        var dragUnion = hitTestUnion(mx, my);
        if (dragUnion) {
          var startWorld = screenToWorld(mx, my);
          var existingOffset = StarState._draggedUnionOffsets[dragUnion.id] || { x: 0, y: 0 };
          StarState._draggingUnionId = dragUnion.id;
          StarState._draggingUnionStartWorldX = startWorld.x;
          StarState._draggingUnionStartWorldY = startWorld.y;
          StarState._draggingUnionBaseOffsetX = existingOffset.x || 0;
          StarState._draggingUnionBaseOffsetY = existingOffset.y || 0;
          StarState.isDragging = true;
          StarState.hasDragged = false;
          StarState.dragStartX = e.clientX;
          StarState.dragStartY = e.clientY;
          StarState._dragVelX = 0;
          StarState._dragVelY = 0;
          StarState.hoveredUnion = dragUnion;
          starCanvas.style.cursor = 'grabbing';
          hideTooltip();
          e.preventDefault();
          return;
        }
      }
      StarState.isDragging = true;
      StarState.hasDragged = false;
      StarState.dragStartX = e.clientX;
      StarState.dragStartY = e.clientY;
      StarState.dragStartPanX = StarState.panX;
      StarState.dragStartPanY = StarState.panY;
      StarState.targetPanX = StarState.panX;
      StarState.targetPanY = StarState.panY;
      StarState._dragVelX = 0;
      StarState._dragVelY = 0;
      StarState._dragLastX = e.clientX;
      StarState._dragLastY = e.clientY;
      StarState._dragLastTime = performance.now();
      starCanvas.style.cursor = 'grabbing';
      e.preventDefault();
    });

    starCanvas.addEventListener('mousemove', function (e) {
      if (StarState.isDragging) {
        if (StarState._draggingUnionId) {
          var dragRect = starCanvas.getBoundingClientRect();
          var dragWorld = screenToWorld(e.clientX - dragRect.left, e.clientY - dragRect.top);
          var odx = dragWorld.x - StarState._draggingUnionStartWorldX;
          var ody = dragWorld.y - StarState._draggingUnionStartWorldY;
          if (Math.abs(e.clientX - StarState.dragStartX) > 3 || Math.abs(e.clientY - StarState.dragStartY) > 3) StarState.hasDragged = true;
          StarState._draggedUnionOffsets[StarState._draggingUnionId] = {
            x: StarState._draggingUnionBaseOffsetX + odx,
            y: StarState._draggingUnionBaseOffsetY + ody
          };
          invalidateUnionLayoutCache();
          StarState._lastRenderKey = '';
          renderFrame();
          hideTooltip();
          starCanvas.style.cursor = 'grabbing';
          return;
        }
        var dx = e.clientX - StarState.dragStartX;
        var dy = e.clientY - StarState.dragStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) StarState.hasDragged = true;
        StarState.panX = StarState.dragStartPanX + dx;
        StarState.panY = StarState.dragStartPanY + dy;
        StarState.targetPanX = StarState.panX;
        StarState.targetPanY = StarState.panY;
        var now = performance.now();
        var dt = now - StarState._dragLastTime;
        if (dt > 5) {
          StarState._dragVelX = (e.clientX - StarState._dragLastX) / dt * 16;
          StarState._dragVelY = (e.clientY - StarState._dragLastY) / dt * 16;
          StarState._dragLastX = e.clientX;
          StarState._dragLastY = e.clientY;
          StarState._dragLastTime = now;
        }
        hideTooltip();
        return;
      }

      var rect = starCanvas.getBoundingClientRect();
      var mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (StarState.submode === 'personal') {
        var club = hitTestPersonal(mx, my);
        if (club && (!StarState.hoveredStar || StarState.hoveredStar.club_id !== club.club_id)) {
          StarState.hoveredStar = club;
          renderFrame();
          showTooltip(club, e.clientX, e.clientY);
          starCanvas.style.cursor = 'pointer';
        } else if (!club && StarState.hoveredStar) {
          StarState.hoveredStar = null;
          renderFrame();
          hideTooltip();
          starCanvas.style.cursor = 'grab';
        } else if (club) {
          showTooltip(club, e.clientX, e.clientY);
        }
      } else {
        var hoverNow = performance.now();
        if (hoverNow - (StarState._lastUnionHoverTime || 0) < 24) {
          if (StarState.hoveredStar) showTooltip(StarState.hoveredStar, e.clientX, e.clientY);
          return;
        }
        StarState._lastUnionHoverTime = hoverNow;
        var union = hitTestUnion(mx, my);
        var memberClub = hitTestUnionMember(mx, my);
        if (memberClub && (!StarState.hoveredStar || StarState.hoveredStar.club_id !== memberClub.club_id)) {
          StarState.hoveredStar = memberClub;
          StarState.hoveredUnion = null;
          renderFrame();
          showTooltip(memberClub, e.clientX, e.clientY);
          starCanvas.style.cursor = 'pointer';
        } else if (!union && !memberClub && StarState.hoveredStar) {
          StarState.hoveredStar = null;
          StarState.hoveredUnion = null;
          renderFrame();
          hideTooltip();
          starCanvas.style.cursor = 'grab';
        } else if (memberClub) {
          showTooltip(memberClub, e.clientX, e.clientY);
          starCanvas.style.cursor = 'pointer';
        } else if (union) {
          if (!StarState.hoveredUnion || StarState.hoveredUnion.id !== union.id || StarState.hoveredStar) {
            StarState.hoveredUnion = union;
            StarState.hoveredStar = null;
            hideTooltip();
            renderFrame();
          }
          starCanvas.style.cursor = 'pointer';
        } else {
          if (StarState.hoveredUnion) {
            StarState.hoveredUnion = null;
            renderFrame();
          }
          starCanvas.style.cursor = 'grab';
        }
      }
    });

    window.addEventListener('mouseup', function (e) {
      if (!StarState.isDragging) return;
      if (StarState._draggingUnionId) {
        StarState.isDragging = false;
        StarState._draggingUnionId = null;
        StarState._dragVelX = 0;
        StarState._dragVelY = 0;
        StarState._lastRenderKey = '';
        renderFrame();
        starCanvas.style.cursor = StarState.hoveredUnion ? 'pointer' : 'grab';
        return;
      }
      StarState.isDragging = false;
      if (!StarState.hasDragged) { // it was a click, let click handler fire
        StarState._dragVelX = 0;
        StarState._dragVelY = 0;
        return;
      }
      // Apply restrained inertia so the map feels physical without drifting away.
      var inertia = StarState.submode === 'union' ? 1.15 : 2.0;
      StarState.targetPanX = StarState.panX + StarState._dragVelX * inertia;
      StarState.targetPanY = StarState.panY + StarState._dragVelY * inertia;
      StarState._dragVelX = 0;
      StarState._dragVelY = 0;
      starCanvas.style.cursor = StarState.hoveredStar ? 'pointer' : 'grab';
    });

    starCanvas.addEventListener('mouseleave', function () {
      if (StarState.isDragging) StarState.isDragging = false;
      StarState._draggingUnionId = null;
      StarState.hoveredStar = null;
      StarState.hoveredUnion = null;
      renderFrame();
      hideTooltip();
      starCanvas.style.cursor = 'grab';
    });

    starCanvas.addEventListener('touchstart', function (e) {
      markMobileStarInteraction();
      if (e.touches.length === 1) {
        var t = e.touches[0];
        var touchRect = starCanvas.getBoundingClientRect();
        if (StarState.submode === 'union' && !isMobileStarMap()) {
          var touchUnion = hitTestUnion(t.clientX - touchRect.left, t.clientY - touchRect.top);
          if (touchUnion) {
            var touchWorld = screenToWorld(t.clientX - touchRect.left, t.clientY - touchRect.top);
            var touchOffset = StarState._draggedUnionOffsets[touchUnion.id] || { x: 0, y: 0 };
            StarState._touchMode = 'union-drag';
            StarState.isDragging = true;
            StarState.hasDragged = false;
            StarState.dragStartX = t.clientX;
            StarState.dragStartY = t.clientY;
            StarState._draggingUnionId = touchUnion.id;
            StarState._draggingUnionStartWorldX = touchWorld.x;
            StarState._draggingUnionStartWorldY = touchWorld.y;
            StarState._draggingUnionBaseOffsetX = touchOffset.x || 0;
            StarState._draggingUnionBaseOffsetY = touchOffset.y || 0;
            StarState.hoveredUnion = touchUnion;
            return;
          }
        }
        StarState._touchMode = 'pan';
        StarState.isDragging = true;
        StarState.hasDragged = false;
        StarState.dragStartX = t.clientX;
        StarState.dragStartY = t.clientY;
        StarState.dragStartPanX = StarState.panX;
        StarState.dragStartPanY = StarState.panY;
      } else if (e.touches.length === 2) {
        var a = e.touches[0], b = e.touches[1];
        var rect = starCanvas.getBoundingClientRect();
        StarState._touchMode = 'pinch';
        StarState.isDragging = false;
        StarState.hasDragged = true;
        StarState._touchStartDistance = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        StarState._touchStartZoom = StarState.targetZoom;
        StarState._touchStartPanX = StarState.targetPanX;
        StarState._touchStartPanY = StarState.targetPanY;
        StarState._touchCenterX = ((a.clientX + b.clientX) / 2) - rect.left;
        StarState._touchCenterY = ((a.clientY + b.clientY) / 2) - rect.top;
      }
    }, { passive: false });

    starCanvas.addEventListener('touchmove', function (e) {
      if (!StarState._touchMode) return;
      e.preventDefault();
      markMobileStarInteraction();
      if (StarState._touchMode === 'pan' && e.touches.length === 1) {
        var t = e.touches[0];
        var dx = t.clientX - StarState.dragStartX;
        var dy = t.clientY - StarState.dragStartY;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) StarState.hasDragged = true;
        StarState.panX = StarState.dragStartPanX + dx;
        StarState.panY = StarState.dragStartPanY + dy;
        StarState.targetPanX = StarState.panX;
        StarState.targetPanY = StarState.panY;
      } else if (StarState._touchMode === 'union-drag' && e.touches.length === 1) {
        var tu = e.touches[0];
        var uRect = starCanvas.getBoundingClientRect();
        var wpos = screenToWorld(tu.clientX - uRect.left, tu.clientY - uRect.top);
        var udx = wpos.x - StarState._draggingUnionStartWorldX;
        var udy = wpos.y - StarState._draggingUnionStartWorldY;
        if (Math.abs(tu.clientX - StarState.dragStartX) > 4 || Math.abs(tu.clientY - StarState.dragStartY) > 4) StarState.hasDragged = true;
        if (StarState._draggingUnionId) {
          StarState._draggedUnionOffsets[StarState._draggingUnionId] = {
            x: StarState._draggingUnionBaseOffsetX + udx,
            y: StarState._draggingUnionBaseOffsetY + udy
          };
          invalidateUnionLayoutCache();
          StarState._lastRenderKey = '';
          renderFrame();
        }
      } else if (StarState._touchMode === 'pinch' && e.touches.length === 2) {
        var a = e.touches[0], b = e.touches[1];
        var rect = starCanvas.getBoundingClientRect();
        var centerX = ((a.clientX + b.clientX) / 2) - rect.left;
        var centerY = ((a.clientY + b.clientY) / 2) - rect.top;
        var nextDistance = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
        if (!StarState._touchStartDistance) return;
        var nextZoom = Math.max(0.35, Math.min(3.2, StarState._touchStartZoom * (nextDistance / StarState._touchStartDistance)));
        var worldX = (StarState._touchCenterX - StarState._touchStartPanX) / StarState._touchStartZoom;
        var worldY = (StarState._touchCenterY - StarState._touchStartPanY) / StarState._touchStartZoom;
        StarState.targetZoom = nextZoom;
        StarState.zoom = nextZoom;
        StarState.targetPanX = centerX - worldX * nextZoom;
        StarState.targetPanY = centerY - worldY * nextZoom;
        StarState.panX = StarState.targetPanX;
        StarState.panY = StarState.targetPanY;
      }
      hideTooltip();
      if (isMobileStarMap()) requestMobileStarFrame();
      else updateObservatoryHud();
    }, { passive: false });

    starCanvas.addEventListener('touchend', function (e) {
      markMobileStarInteraction();
      if (!e.touches || e.touches.length === 0) {
        StarState._touchMode = null;
        StarState.isDragging = false;
        StarState._draggingUnionId = null;
      }
    });

    starCanvas.addEventListener('click', function (e) {
      if (StarState.hasDragged) { StarState.hasDragged = false; return; }
      var rect = starCanvas.getBoundingClientRect();
      var mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (StarState.submode === 'personal') {
        var club = hitTestPersonal(mx, my);
        if (club) {
          var wClub = screenToWorld(mx, my);
          triggerStarBurst({ x: wClub.x, y: wClub.y, color: '#5fb7d7', radius: 24 });
          setTimeout(function () { openClubDetail(club); }, prefersReducedMotion() ? 0 : 120);
        }
        else {
          StarState.hoveredStar = null;
          hideTooltip();
          updateObservatoryHud();
        }
      } else {
        var memberClub = hitTestUnionMember(mx, my);
        if (memberClub) {
          var wMember = screenToWorld(mx, my);
          triggerStarBurst({ x: wMember.x, y: wMember.y, color: '#5fb7d7', radius: 22 });
          setTimeout(function () { openClubDetail(memberClub); }, prefersReducedMotion() ? 0 : 120);
          return;
        }
        var union = hitTestUnion(mx, my);
        if (union) {
          var positions = StarState._unionPositions || [];
          for (var i = 0; i < positions.length; i++) {
            if (positions[i].union && positions[i].union.id === union.id) {
              focusWorldPoint(positions[i].x, positions[i].y, Math.max(StarState.targetZoom, 0.92));
              triggerStarBurst({ x: positions[i].x, y: positions[i].y, color: union.star_color || '#f0c060', radius: 40 });
              break;
            }
          }
          setTimeout(function () { openDetailPanel(union); }, prefersReducedMotion() ? 0 : 120);
        } else if ($('detailPanel').classList.contains('open')) {
          closeDetailPanel();
        }
      }
    });

    starCanvas.addEventListener('dblclick', function (e) {
      e.preventDefault();
      var rect = starCanvas.getBoundingClientRect();
      var w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
      focusWorldPoint(w.x, w.y, Math.min(3.2, Math.max(1.15, StarState.targetZoom * 1.45)));
    });

    // Detail panel close
    $('detailCloseBtn').addEventListener('click', closeDetailPanel);

    // Create union button
    $('createUnionBtn').addEventListener('click', function () { openEditor(null); });

    // Club detail modal
    $('clubDetailCloseBtn').addEventListener('click', closeClubDetail);
    $('clubDetailOverlay').addEventListener('click', function (e) {
      if (e.target === this) closeClubDetail();
    });
    document.addEventListener('keydown', function (e) {
      var tag = (e.target && e.target.tagName || '').toLowerCase();
      var isTyping = tag === 'input' || tag === 'textarea' || tag === 'select';
      if (e.key === 'Escape') {
        if ($('clubDetailOverlay').style.display !== 'none') closeClubDetail();
        if ($('editorModal').style.display !== 'none') closeEditor();
        if ($('detailPanel').classList.contains('open')) closeDetailPanel();
        return;
      }
      if (isTyping) return;
      if (e.key === '1') switchSubmode('personal');
      if (e.key === '2') switchSubmode('union');
      if (e.key === '0') resetView();
      if (e.key === '+' || e.key === '=') zoomBy(1.16);
      if (e.key === '-' || e.key === '_') zoomBy(0.86);
    });

    // Editor modal
    $('editorModal').addEventListener('click', function (e) {
      if (e.target === this) closeEditor();
    });
    $('edCancelBtn').addEventListener('click', closeEditor);
    $('edSaveBtn').addEventListener('click', saveUnion);
    $('edDeleteBtn').addEventListener('click', function () { deleteUnion(StarState.editingUnionId); });
    // Color swatch click
    document.querySelectorAll('.color-swatch').forEach(function (s) {
      s.addEventListener('click', function () {
        document.querySelectorAll('.color-swatch').forEach(function (x) { x.classList.remove('active'); });
        s.classList.add('active');
      });
    });

    // Close detail panel on outside click (only for union mode)
    document.addEventListener('click', function (e) {
      var panel = $('detailPanel');
      if (!panel.classList.contains('open')) return;
      if (!panel.contains(e.target) && !e.target.closest('#starCanvas')) {
        // Don't auto-close; user must click close button or X
      }
    });

    // Zoom with mouse wheel
    starCanvas.addEventListener('wheel', function (e) {
      e.preventDefault();
      markMobileStarInteraction();
      // Throttle lightly: keep high-resolution trackpads smooth without flooding frames.
      var wheelNow = performance.now();
      if (wheelNow - (StarState._lastWheelTime || 0) < 8) return;
      StarState._lastWheelTime = wheelNow;

      var rect = starCanvas.getBoundingClientRect();
      var mx = e.clientX - rect.left, my = e.clientY - rect.top;
      // Use target values for anchor to prevent drift during rapid scroll
      var worldX = (mx - StarState.targetPanX) / StarState.targetZoom;
      var worldY = (my - StarState.targetPanY) / StarState.targetZoom;
      var newZoom = StarState.targetZoom * Math.exp(-e.deltaY * 0.0018);
      newZoom = Math.max(0.35, Math.min(3.2, newZoom));
      StarState.targetZoom = newZoom;
      StarState.targetPanX = mx - worldX * newZoom;
      StarState.targetPanY = my - worldY * newZoom;
      if (!(isMobileStarMap() && StarState._mobileInteractionActive)) updateObservatoryHud();
      startStarRenderLoop();
    }, { passive: false });

    // Resize
    var resizeTimer = 0;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        resizeParticles();
        resizeStarCanvas();
        renderFrame();
      }, 80);
    });
  }

  // ── Init ──
  async function init() {
    initThemePreference();

    // Check auth
    var auth = await apiGet('./api/auth.php?action=me&_=' + Date.now()).catch(function () { return null; });
    if (!auth || !auth.logged_in) {
      window.location.replace('./login.html?redirect=star_map.html');
      return;
    }
    StarState.user = auth.user;
    StarState.memberships = auth.memberships || [];

    // Init canvases
    initParticles();
    initStarCanvas();

    // Load club data
    var clubs = await loadClubData();
    StarState.clubLookup = buildClubLookup(clubs);

    // Resolve personal clubs
    resolvePersonalClubs();

    // Bind events
    bindEvents();
    setupStarSearch();
    setupClubSearch();
    setupBoundSearch();
    bindSystemThemePreference();

    // Initial render first; union data can be hydrated after the page is usable.
    StarState._initialPaintAt = performance.now();
    StarState._deferHeavyPaint = true;
    renderFrame();
    updateEmptyState();

    // Hide canvas loading flash
    document.body.style.opacity = '1';
    completeInitialStarPaintSoon();
    scheduleStarIdleTask(loadUnions, 650);
  }

  // Start
  document.body.style.opacity = '0';
  init();
})();
</script>
</body>
</html>
