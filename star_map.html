<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#090909" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f4f1ec" media="(prefers-color-scheme: light)">
<title>星图观测台 - VNFest</title>
<script>
(function() {
  var root = document.documentElement;
  var saved = null;
  try { saved = localStorage.getItem('themePreference'); } catch (e) {}
  var systemDark = false;
  try {
    systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  } catch (e) {}
  root.setAttribute('data-theme', saved === 'light' || saved === 'dark' ? saved : (systemDark ? 'dark' : 'light'));
  root.style.colorScheme = root.getAttribute('data-theme');
})();
</script>
<style>
/* ── Theme Variables ── */
:root {
  --bg: #090909;
  --surface: rgba(20,21,25,0.94);
  --surface2: rgba(28,29,34,0.92);
  --surface3: rgba(39,40,46,0.9);
  --border: rgba(255,255,255,0.09);
  --border-strong: rgba(255,255,255,0.16);
  --text: #f7f1ee;
  --muted: #b9aaa4;
  --soft: #7c716d;
  --primary: #e74c3c;
  --primary-dim: #bd382b;
  --primary-soft: rgba(231,76,60,0.14);
  --accent: #d99a3a;
  --accent-cool: #5fb7d7;
  --success: #4fb985;
  --glass-bg: rgba(18,17,16,0.84);
  --glass-border: rgba(255,255,255,0.13);
  --input-bg: rgba(255,255,255,0.055);
  --shadow: 0 28px 80px rgba(0,0,0,0.42);
  --radius: 8px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  /* cosmic */
  --star-gold: #f0c060;
  --star-white: #e8e0f0;
  --star-blue: #88bbee;
  --star-purple: #c8a0e0;
  --constellation-line: rgba(240,220,180,0.28);
  --nebula: rgba(80,60,180,0.06);
  color-scheme: dark;
}
:root[data-theme='light'] {
  --bg: #f4f1ec;
  --surface: rgba(255,255,255,0.94);
  --surface2: rgba(248,245,240,0.96);
  --surface3: rgba(238,233,226,0.96);
  --border: rgba(69,42,32,0.12);
  --border-strong: rgba(69,42,32,0.20);
  --text: #211b18;
  --muted: #705f57;
  --soft: #9b8d87;
  --primary: #e74c3c;
  --primary-dim: #c23d30;
  --primary-soft: rgba(231,76,60,0.10);
  --accent: #b77925;
  --accent-cool: #287c9a;
  --success: #258a5c;
  --glass-bg: rgba(255,255,255,0.88);
  --glass-border: rgba(69,42,32,0.12);
  --input-bg: rgba(69,42,32,0.045);
  --shadow: 0 28px 70px rgba(75,48,35,0.12);
  --star-gold: #c88820;
  --star-white: #b8a8c0;
  --star-blue: #487aaa;
  --star-purple: #9060b0;
  --constellation-line: rgba(160,120,60,0.20);
  --nebula: rgba(120,100,200,0.03);
  color-scheme: light;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme='light']) {
    --bg: #090909; --surface: rgba(20,21,25,0.94); --surface2: rgba(28,29,34,0.92); --surface3: rgba(39,40,46,0.9);
    --border: rgba(255,255,255,0.09); --border-strong: rgba(255,255,255,0.16);
    --text: #f7f1ee; --muted: #b9aaa4; --soft: #7c716d;
    --primary: #e74c3c; --primary-dim: #bd382b; --primary-soft: rgba(231,76,60,0.14);
    --accent: #d99a3a; --accent-cool: #5fb7d7; --success: #4fb985;
    --glass-bg: rgba(18,17,16,0.84); --glass-border: rgba(255,255,255,0.13);
    --input-bg: rgba(255,255,255,0.055); --shadow: 0 28px 80px rgba(0,0,0,0.42);
    --star-gold: #f0c060; --star-white: #e8e0f0; --star-blue: #88bbee; --star-purple: #c8a0e0;
    --constellation-line: rgba(240,220,180,0.28); --nebula: rgba(80,60,180,0.06);
    color-scheme: dark;
  }
}

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
}
body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
}
body::before {
  z-index: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(0deg, rgba(255,255,255,0.028) 1px, transparent 1px),
    linear-gradient(135deg, rgba(231,76,60,0.08), transparent 34%),
    linear-gradient(315deg, rgba(95,183,215,0.10), transparent 38%),
    var(--bg);
  background-size: 92px 92px, 92px 92px, 100% 100%, 100% 100%, auto;
}
body::after {
  z-index: 2;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.52), transparent 18%, transparent 74%, rgba(0,0,0,0.45)),
    linear-gradient(90deg, rgba(0,0,0,0.42), transparent 22%, transparent 76%, rgba(0,0,0,0.34));
}
:root[data-theme='light'] body::before {
  background:
    linear-gradient(90deg, rgba(86,62,42,0.055) 1px, transparent 1px),
    linear-gradient(0deg, rgba(86,62,42,0.045) 1px, transparent 1px),
    radial-gradient(circle at 18% 16%, rgba(231,76,60,0.12), transparent 30%),
    radial-gradient(circle at 82% 22%, rgba(40,124,154,0.12), transparent 34%),
    linear-gradient(180deg, #fbf7ef, #efe8dc);
  background-size: 92px 92px, 92px 92px, 100% 100%, 100% 100%, auto;
}
:root[data-theme='light'] body::after {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.62), transparent 18%, transparent 78%, rgba(104,74,44,0.08)),
    linear-gradient(90deg, rgba(104,74,44,0.08), transparent 24%, transparent 76%, rgba(104,74,44,0.06));
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { border-radius: 8px; background: linear-gradient(180deg, var(--primary), rgba(231,76,60,0.5)); }

/* ── Particle Canvas ── */
#particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.deep-space-vignette {
  position: fixed;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 42%, transparent 0, transparent 48%, rgba(0,0,0,0.24) 78%, rgba(0,0,0,0.48) 100%),
    linear-gradient(90deg, rgba(0,0,0,0.20), transparent 18%, transparent 82%, rgba(0,0,0,0.18));
  mix-blend-mode: multiply;
  opacity: 0.72;
}
:root[data-theme='light'] .deep-space-vignette {
  background:
    radial-gradient(circle at 50% 42%, transparent 0, transparent 52%, rgba(108,78,45,0.08) 78%, rgba(108,78,45,0.18) 100%),
    linear-gradient(90deg, rgba(108,78,45,0.08), transparent 20%, transparent 80%, rgba(108,78,45,0.08));
  opacity: 0.58;
}

/* ── Topbar ── */
.starmap-topbar {
  position: fixed; top: 18px; left: 22px; right: 22px; z-index: 12;
  display: flex; align-items: center; gap: 12px;
  padding: 8px;
  background: var(--glass-bg);
  background: color-mix(in srgb, var(--glass-bg) 88%, transparent);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid var(--glass-border);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  box-shadow: 0 20px 70px rgba(0,0,0,0.34);
}
.topbar-back {
  display: flex; align-items: center; gap: 6px;
  min-height: 36px;
  padding: 7px 14px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: rgba(255,255,255,0.045);
  color: var(--text); font-size: 13px; font-family: inherit;
  cursor: pointer; white-space: nowrap;
  transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
}
.topbar-back:hover { border-color: var(--primary); background: var(--surface3); transform: translateY(-1px); }
.topbar-back-icon { font-size: 16px; }

.submode-switch {
  display: flex; align-items: center; gap: 0;
  background: rgba(255,255,255,0.055); border: 1px solid var(--border); border-radius: 8px; padding: 3px;
  flex-shrink: 0;
}
.submode-tab {
  min-height: 32px;
  padding: 6px 16px; border: none; border-radius: 6px;
  font-size: 12px; font-family: inherit; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  background: transparent; color: var(--muted);
  transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
}
.submode-tab.active {
  background: linear-gradient(135deg, rgba(231,76,60,0.95), rgba(217,154,58,0.92));
  color: #fff;
  box-shadow: 0 8px 22px rgba(231,76,60,0.22);
}
.submode-tab:not(.active):hover { color: var(--text); }

.topbar-spacer { flex: 1; }

.star-search {
  position: relative;
  flex: 0 1 320px;
  min-width: 180px;
  max-width: 360px;
}
.star-search-input {
  width: 100%;
  height: 36px;
  padding: 0 34px 0 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.055);
  color: var(--text);
  font: 500 12px "Noto Sans SC", sans-serif;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}
.star-search-input:focus {
  border-color: var(--accent-cool);
  background: var(--input-bg);
  box-shadow: 0 0 0 3px rgba(95,183,215,0.10);
}
.star-search-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  width: 24px;
  height: 24px;
  transform: translateY(-50%);
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: none;
}
.star-search.has-value .star-search-clear { display: block; }
.star-search-results {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  max-height: 300px;
  overflow: auto;
  padding: 6px;
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  background: color-mix(in srgb, var(--glass-bg) 94%, transparent);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: none;
}
.star-search-results.visible { display: block; }
.star-search-result {
  width: 100%;
  padding: 8px 10px;
  border: 0;
  border-radius: 7px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.star-search-result:hover,
.star-search-result:focus-visible {
  outline: none;
  background: var(--surface3);
}
.star-search-result strong {
  display: block;
  font-size: 12px;
  line-height: 1.35;
}
.star-search-result span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 10px;
}
.star-search-empty {
  padding: 10px;
  color: var(--muted);
  font-size: 12px;
}

.topbar-theme-btn {
  width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px;
  background: rgba(255,255,255,0.045); color: var(--text); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
}
.topbar-theme-btn:hover { border-color: var(--primary); background: var(--surface3); transform: translateY(-1px); }

.topbar-create-btn {
  min-height: 36px;
  padding: 8px 16px; border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius);
  background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  transition: filter 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  box-shadow: 0 10px 26px rgba(231,76,60,0.22);
}
.topbar-create-btn:hover { filter: brightness(1.06); transform: translateY(-1px); box-shadow: 0 14px 34px rgba(231,76,60,0.28); }

/* ── Star Canvas ── */
#starCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3;
  cursor: grab;
  touch-action: none;
}

/* ── Empty State ── */
.empty-state {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; z-index: 2; pointer-events: none;
}
.empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.7; }
.empty-state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty-state-desc { font-size: 13px; color: var(--muted); max-width: 320px; line-height: 1.6; }

/* ── Detail Panel ── */
.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 90vw; z-index: 20;
  background: var(--glass-bg);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-left: 1px solid var(--glass-border);
  box-shadow: -8px 0 40px rgba(0,0,0,0.3);
  transform: translateX(100%); transition: transform 0.35s var(--ease);
  display: flex; flex-direction: column; overflow-y: auto;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.detail-panel-title { font-size: 16px; font-weight: 700; }
.detail-panel-close {
  width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%;
  background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.detail-panel-body { padding: 20px; flex: 1; }
.detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.7; }
.detail-section-title {
  font-size: 11px; font-weight: 800; letter-spacing: 0.5px; color: var(--soft);
  text-transform: uppercase; margin-bottom: 10px; margin-top: 16px;
}
.member-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.member-item {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 8px 12px; border-radius: 6px; background: var(--surface3);
  font-size: 13px;
}
.member-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.member-item-school { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.member-remove-btn {
  width: 26px; height: 26px; border: none; border-radius: 50%;
  background: transparent; color: var(--soft); font-size: 14px; cursor: pointer;
  flex-shrink: 0; transition: color 0.15s ease, background 0.15s ease;
}
.member-remove-btn:hover { color: var(--primary); background: var(--primary-soft); }
.detail-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.detail-action-btn {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit;
  cursor: pointer; transition: border-color 0.2s ease;
}
.detail-action-btn:hover { border-color: var(--primary); }
.detail-action-btn.danger { color: var(--primary); }
.detail-action-btn.danger:hover { background: var(--primary-soft); border-color: var(--primary); }

/* ── Modal Overlay ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 30;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
}
.modal-card {
  width: 460px; max-width: 92vw; max-height: 85vh; overflow-y: auto;
  background: var(--glass-bg);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 12px; box-shadow: var(--shadow);
  padding: 24px;
}
.modal-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 9px 13px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--input-bg); color: var(--text);
  font-size: 13px; font-family: inherit;
  transition: border-color 0.2s ease;
}
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-select { cursor: pointer; }

.club-search-wrap { position: relative; margin-bottom: 10px; }
.club-search-results {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 5;
  max-height: 180px; overflow-y: auto;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; box-shadow: var(--shadow);
  display: none;
}
.club-search-results.visible { display: block; }
.club-search-item {
  padding: 8px 12px; cursor: pointer; font-size: 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s ease;
}
.club-search-item:last-child { border-bottom: none; }
.club-search-item:hover { background: var(--surface3); }
.club-search-item .cs-school { color: var(--muted); font-size: 11px; }

.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.tag-item {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  background: var(--surface3); font-size: 12px;
}
.tag-remove {
  width: 18px; height: 18px; border: none; border-radius: 50%;
  background: transparent; color: var(--soft); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s ease;
}
.tag-remove:hover { color: var(--primary); }

/* color picker */
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-swatch {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: var(--text); box-shadow: 0 0 12px currentColor; }

/* search mode toggle */
.search-mode-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface3); color: var(--muted); font-size: 11px; font-family: inherit;
  cursor: pointer; transition: all 0.2s ease;
}
.search-mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* bound tag */
.bound-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  background: var(--surface3); font-size: 12px; border: 1px solid var(--border);
}
.bound-tag .tag-remove { cursor: pointer; color: var(--soft); }
.bound-tag .tag-remove:hover { color: var(--primary); }

.modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.modal-btn {
  padding: 9px 20px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface2); color: var(--text); font-size: 13px; font-family: inherit;
  cursor: pointer; transition: border-color 0.2s ease;
}
.modal-btn:hover { border-color: var(--primary); }
.modal-btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.modal-btn.primary:hover { background: var(--primary-dim); }
.modal-btn.danger { color: var(--primary); }

/* ── Tooltip ── */
.star-tooltip {
  position: fixed; z-index: 15; pointer-events: none;
  background: var(--glass-bg);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 12px 16px; max-width: 260px;
  font-size: 12px; line-height: 1.6;
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.star-tooltip.visible { opacity: 1; transform: translateY(0); }
.star-tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
.star-tooltip .tt-school { color: var(--muted); }
.star-tooltip .tt-province { color: var(--soft); font-size: 11px; }

/* ── Club Detail Modal ── */
.club-detail-overlay {
  position: fixed; inset: 0; z-index: 30;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
}
.club-detail-card {
  position: relative;
  width: min(92vw, 520px); max-height: 82vh;
  background: var(--glass-bg);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 14px; box-shadow: var(--shadow);
  overflow: hidden;
  animation: cdFadeIn 0.28s var(--ease);
}
@keyframes cdFadeIn {
  from { opacity: 0; transform: translateY(16px) scale(0.94); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.club-detail-close {
  position: absolute; top: 10px; right: 10px; z-index: 2;
  width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 50%;
  background: var(--surface2); color: var(--text); font-size: 20px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s ease, background 0.2s ease;
}
.club-detail-close:hover { border-color: var(--primary); background: var(--primary-soft); }
.club-detail-scroll {
  max-height: 82vh; overflow-y: auto; padding: 22px 22px 28px;
}
/* Header */
.cd-header { display: flex; gap: 16px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.cd-avatar {
  width: 72px; height: 72px; border-radius: 16px; flex-shrink: 0;
  background: var(--surface3); display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--primary); overflow: hidden;
  border: 1px solid var(--border); box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.cd-avatar img { width: 100%; height: 100%; object-fit: cover; }
.cd-header-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.cd-name { font-size: 18px; font-weight: 700; line-height: 1.3; word-break: break-all; }
.cd-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.cd-chip {
  padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface3); color: var(--muted);
}
.cd-chip.verified { border-color: var(--success); color: var(--success); }
.cd-chip.primary { border-color: var(--primary); color: var(--primary); }
/* Sections */
.cd-section { margin-bottom: 16px; }
.cd-section-title {
  font-size: 11px; font-weight: 800; letter-spacing: 0.5px; color: var(--soft);
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.cd-section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
.cd-description { font-size: 13px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
.cd-contact {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: var(--radius); background: var(--surface3);
  font-size: 13px; font-family: monospace; word-break: break-all;
}
.cd-copy-btn {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface2); color: var(--text); font-size: 11px; font-family: inherit;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: border-color 0.2s ease;
}
.cd-copy-btn:hover { border-color: var(--primary); }
.cd-copy-btn.copied { border-color: var(--success); color: var(--success); }
.cd-footer { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 11px; color: var(--soft); }

/* Immersive observatory layer */
.starmap-stage-frame {
  position: fixed;
  inset: 92px 24px 86px;
  z-index: 4;
  pointer-events: none;
  border: 1px solid rgba(255,255,255,0.075);
  border-radius: 8px;
  box-shadow:
    inset 0 0 0 1px rgba(231,76,60,0.05),
    inset 0 0 90px rgba(95,183,215,0.045);
}
.starmap-stage-frame::before,
.starmap-stage-frame::after {
  content: "";
  position: absolute;
  width: 46px;
  height: 46px;
  border-color: color-mix(in srgb, var(--accent) 50%, transparent);
}
.starmap-stage-frame::before {
  left: -1px;
  top: -1px;
  border-left: 1px solid;
  border-top: 1px solid;
}
.starmap-stage-frame::after {
  right: -1px;
  bottom: -1px;
  border-right: 1px solid;
  border-bottom: 1px solid;
}
.starmap-brandplate,
.starmap-hud,
.starmap-dock,
.starmap-shortcuts {
  position: fixed;
  z-index: 11;
  background: var(--glass-bg);
  background: color-mix(in srgb, var(--glass-bg) 88%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  box-shadow: 0 18px 60px rgba(0,0,0,0.30);
}
.starmap-brandplate {
  left: 24px;
  top: 86px;
  width: min(320px, calc(100vw - 48px));
  padding: 16px;
  pointer-events: none;
}
.brand-kicker {

  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.brand-title {
  font-size: 22px;
  line-height: 1.15;
  font-weight: 800;
  letter-spacing: 0;
  text-wrap: pretty;
}
.brand-desc {
  margin-top: 10px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.7;
}
.brand-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 14px;
}
.brand-metric {
  padding: 9px 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
}
.metric-value {
  display: block;
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
}
.metric-label {
  display: block;
  margin-top: 2px;

}
.starmap-hud {
  right: 24px;
  top: 86px;
  width: 260px;
  padding: 14px;
  pointer-events: none;
}
.hud-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.hud-row:last-child { border-bottom: none; }
.hud-label { color: var(--muted); }
.hud-value { color: var(--text); font-weight: 700; text-align: right; }
.hud-signal {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.hud-signal::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 12px var(--success);
}
.starmap-dock {
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
}
.dock-btn {
  min-width: 38px;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.045);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
}
.dock-btn:hover,
.dock-btn:focus-visible {
  outline: none;
  border-color: var(--accent);
  background: var(--surface3);
  transform: translateY(-1px);
}
.dock-btn.primary {
  color: #fff;
  border-color: rgba(255,255,255,0.14);
  background: linear-gradient(135deg, var(--primary), var(--accent));
}
.dock-separator {
  width: 1px;
  height: 28px;
  background: var(--border);
}
.starmap-shortcuts {
  left: 24px;
  bottom: 20px;
  width: min(330px, calc(100vw - 48px));
  padding: 12px 14px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.7;
  pointer-events: none;
}
.shortcut-title {
  color: var(--text);
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 4px;
}
.shortcut-keys {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.keycap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 22px;
  padding: 0 7px;
  border: 1px solid var(--border);
  border-bottom-color: var(--border-strong);
  border-radius: 5px;
  background: rgba(255,255,255,0.055);
  color: var(--text);
  font-size: 10px;
  font-weight: 800;
}
.immersive-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.is-immersive .starmap-brandplate,
.is-immersive .starmap-hud,
.is-immersive .starmap-shortcuts {
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
}
.starmap-brandplate,
.starmap-hud,
.starmap-shortcuts {
  transition: opacity 0.24s ease, transform 0.24s ease;
}
