// ====== 企划枢纽 ======
const projectTypeLabels = { publication: '刊物企划', activity: '活动企划', content: '内容征集', recruit: '协力招募', other: '其他企划' };
const projectStatusLabels = { draft: '草稿', collecting: '征集中', ongoing: '进行中', completed: '已完成', archived: '已归档' };
const projectItemTypeLabels = { submission: '投稿', registration: '报名', collaboration: '协力', survey: '问卷', voting: '投票', other: '其他' };
const projectParticipationStatusLabels = { submitted: '待审核', reviewing: '审核中', accepted: '已通过', rejected: '已拒绝', withdrawn: '已撤回' };
const projectHubState = {
  projects: [],
  items: [],
  participations: [],
  selectedId: null,
  typeFilter: 'all',
  statusFilter: 'all',
  loadedAt: 0,
  request: null
};

function projectClubKey(club) {
  if (!club) return '';
  const id = Number(club.id ?? club.club_id ?? 0);
  const country = club.country || club.club_country || 'china';
  return id > 0 ? country + ':' + id : '';
}

function currentProjectClub() {
  if (!selectedClubId || selectedClubId <= 0) return null;
  return { id: selectedClubId, country: selectedCountry, name: getClubName(selectedClubId, selectedCountry) };
}

function optionClubFromKey(key) {
  const raw = String(key || '');
  const parts = raw.includes('|') ? raw.split('|') : raw.split(':');
  const id = raw.includes('|') ? Number(parts[0] || 0) : Number(parts[1] || 0);
  const country = raw.includes('|') ? (parts[1] || 'china') : (parts[0] || 'china');
  if (!id) return null;
  return { id, country, name: getClubName(id, country) };
}

function projectIsOrganizer(project) {
  const organizer = project.organizer_club || {};
  return Number(organizer.id) === Number(selectedClubId) && (organizer.country || 'china') === selectedCountry;
}

function projectHasParticipantClub(project) {
  return (project.participant_clubs || []).some(club => Number(club.id) === Number(selectedClubId) && (club.country || 'china') === selectedCountry);
}

function projectRelatedToSelectedClub(project) {
  return !project.deleted_at && (projectIsOrganizer(project) || projectHasParticipantClub(project));
}

function projectItems(projectId) {
  return projectHubState.items.filter(item => Number(item.project_id) === Number(projectId) && !item.deleted_at);
}

function projectParticipations(projectId, includeWithdrawn) {
  return projectHubState.participations.filter(row => Number(row.project_id) === Number(projectId) && (includeWithdrawn || row.status !== 'withdrawn'));
}

function projectPendingParticipations(projectId) {
  return projectParticipations(projectId, false).filter(row => ['submitted', 'reviewing'].includes(row.status || 'submitted'));
}

function projectSyncLabel(project) {
  if ((project.project_type || '') !== 'activity') return '非活动企划';
  if (!project.event_date && !project.deadline) return '未同步：缺少日期';
  return project.calendar_event_id ? ('日历 #' + Number(project.calendar_event_id)) : '等待同步';
}

async function loadProjectHubForManager(force = false, silent = false) {
  const now = Date.now();
  if (!force && projectHubState.projects.length && now - projectHubState.loadedAt < 45000) {
    return;
  }
  if (!force && projectHubState.request) {
    await projectHubState.request;
    return;
  }
  projectHubState.request = (async function() {
  try {
    const [projectsResp, itemsResp, partsResp] = await Promise.all([
      fetch('../api/projects.php?include_deleted=1', { credentials: 'same-origin', cache: 'no-store' }),
      fetch('../api/project_items.php?include_deleted=1', { credentials: 'same-origin', cache: 'no-store' }),
      fetch('../api/project_participations.php?include_withdrawn=1', { credentials: 'same-origin', cache: 'no-store' })
    ]);
    const projectsData = await projectsResp.json();
    const itemsData = await itemsResp.json();
    const partsData = await partsResp.json();
    projectHubState.projects = projectsData.projects || [];
    projectHubState.items = itemsData.items || [];
    projectHubState.participations = partsData.participations || [];
    projectHubState.loadedAt = Date.now();
  } catch {
    projectHubState.projects = [];
    projectHubState.items = [];
    projectHubState.participations = [];
    if (!silent) showToast('企划枢纽加载失败', 'error');
  } finally {
    projectHubState.request = null;
  }
  })();
  await projectHubState.request;
}

function filteredProjectHubRows() {
  return projectHubState.projects.filter(project => {
    if (!projectRelatedToSelectedClub(project)) return false;
    if (projectHubState.typeFilter !== 'all' && project.project_type !== projectHubState.typeFilter) return false;
    if (projectHubState.statusFilter !== 'all' && project.status !== projectHubState.statusFilter) return false;
    return true;
  });
}

async function renderProjects(refresh = true) {
  const container = document.getElementById('listContainer');
  if (!selectedClubId || selectedClubId <= 0) {
    container.innerHTML = '<div class="empty">请先在上方选择一个同好会，再进入企划枢纽。</div>';
    return;
  }
  if (refresh) {
    container.innerHTML = '<div class="empty"><span class="loading-spinner"></span>企划枢纽加载中...</div>';
    await loadProjectHubForManager(false);
  }

  const rows = filteredProjectHubRows();
  if (rows.length && !rows.some(project => Number(project.id) === Number(projectHubState.selectedId))) {
    projectHubState.selectedId = Number(rows[0].id);
  }
  if (!rows.length) projectHubState.selectedId = null;

  const selected = projectHubState.projects.find(project => Number(project.id) === Number(projectHubState.selectedId)) || null;
  const pendingTotal = rows.reduce((sum, project) => sum + projectPendingParticipations(project.id).length, 0);
  const jointTotal = rows.filter(project => (project.participant_clubs || []).length > 0).length;
  const syncWarnTotal = rows.filter(project => project.project_type === 'activity' && !project.calendar_event_id).length;
  const clubName = getClubName(selectedClubId, selectedCountry);

  container.innerHTML = `
    <div class="project-hub">
      <div class="project-hub-head">
        <div>
          <div class="project-hub-title">企划枢纽</div>
          <div class="project-hub-sub">${escapeHtml(clubName)} · 普通企划、活动调控、联合同好会协作</div>
        </div>
        <div class="project-hub-tools">
          <button class="btn btn-primary btn-sm" onclick="openProjectForm()">新建企划</button>
          <button class="btn btn-glass btn-sm" onclick="renderProjects(true)">刷新</button>
        </div>
      </div>
      <div class="project-hub-kpis">
        <div class="project-hub-kpi"><strong>${rows.length}</strong><span>关联企划</span></div>
        <div class="project-hub-kpi"><strong>${rows.filter(project => project.project_type === 'activity').length}</strong><span>活动企划</span></div>
        <div class="project-hub-kpi"><strong>${pendingTotal}</strong><span>待审核</span></div>
        <div class="project-hub-kpi"><strong>${jointTotal}</strong><span>联合企划 · ${syncWarnTotal} 个同步提示</span></div>
      </div>
      <div class="project-hub-layout">
        <div class="project-hub-panel">
          <div class="project-hub-filter-row">
            <select id="projectTypeFilter" class="project-hub-select" onchange="setProjectFilter('type', this.value)">
              ${projectSelectOptions(projectTypeLabels, projectHubState.typeFilter, '全部类型')}
            </select>
            <select id="projectStatusFilter" class="project-hub-select" onchange="setProjectFilter('status', this.value)">
              ${projectSelectOptions(projectStatusLabels, projectHubState.statusFilter, '全部状态')}
            </select>
          </div>
          <div class="project-list-stack">
            ${rows.length ? rows.map(renderProjectCard).join('') : '<div class="empty" style="padding:24px;">该同好会暂未关联企划。</div>'}
          </div>
        </div>
        <div class="project-hub-panel">
          ${selected ? renderProjectDetail(selected) : '<div class="empty" style="padding:42px;">选择或新建一个企划开始调控。</div>'}
        </div>
      </div>
    </div>
  `;
}

function projectSelectOptions(labels, selected, allLabel) {
  const rows = ['<option value="all">' + allLabel + '</option>'];
  Object.keys(labels).forEach(key => rows.push('<option value="' + key + '"' + (selected === key ? ' selected' : '') + '>' + labels[key] + '</option>'));
  return rows.join('');
}

function renderProjectCard(project) {
  const items = projectItems(project.id);
  const pending = projectPendingParticipations(project.id);
  const organizer = project.organizer_club || {};
  const roleLabel = projectIsOrganizer(project) ? '发起组织' : '联合参加';
  return `<button class="project-hub-card ${Number(project.id) === Number(projectHubState.selectedId) ? 'active' : ''}" onclick="selectProjectHub(${Number(project.id)})">
    <div class="project-card-top">
      <div>
        <div class="project-card-title">${escapeHtml(project.title || '未命名企划')}</div>
        <div class="project-card-meta">${escapeHtml(projectTypeLabels[project.project_type] || project.project_type || '企划')} · ${escapeHtml(projectStatusLabels[project.status] || project.status || '未知')}</div>
      </div>
      <span class="project-chip primary">${roleLabel}</span>
    </div>
    <div class="project-chip-row">
      <span class="project-chip">${escapeHtml(organizer.name || '未绑定发起组织')}</span>
      <span class="project-chip">联合 ${(project.participant_clubs || []).length}</span>
      <span class="project-chip">参与项 ${items.length}</span>
      ${pending.length ? `<span class="project-chip warn">待审 ${pending.length}</span>` : ''}
    </div>
    <div class="project-muted" style="margin-top:8px;">${escapeHtml(projectSyncLabel(project))}</div>
  </button>`;
}

  const canManage = projectIsOrganizer(project);

  const reviews = projectParticipations(project.id, true);

  const organizer = project.organizer_club || {};
  return `
    <div class="project-detail-head">
      <div>
        <div class="project-hub-title">${escapeHtml(project.title || '未命名企划')}</div>
        <div class="project-hub-sub">${escapeHtml(projectTypeLabels[project.project_type] || project.project_type || '企划')} · ${escapeHtml(projectStatusLabels[project.status] || project.status || '未知')}</div>
      </div>
      <div class="project-hub-tools">
        ${canManage ? `<button class="btn btn-glass btn-sm" onclick="openProjectForm(${Number(project.id)})">编辑企划</button>
        <button class="btn btn-reject btn-sm" onclick="deleteProjectHub(${Number(project.id)})">删除</button>` : '<span class="project-chip">联合参加视图</span>'}
      </div>
    </div>
    ${project.cover_image ? `<div class="project-poster-frame"><img src="${escapeHtml(projectMediaUrl(project.cover_image))}" alt="企划宣传图" onerror="this.style.display='none'"></div>` : '<div class="project-poster-frame empty">暂无宣传图</div>'}
    <div class="project-detail-grid">

      <div class="project-info-cell"><span>日历同步</span><strong>${escapeHtml(projectSyncLabel(project))}</strong></div>

      <div class="project-info-cell"><span>截止日期</span><strong>${escapeHtml(project.deadline || '未设置')}</strong></div>
    </div>
    <div class="project-section">
      <div class="project-section-title">联合参加同好会</div>
      <div class="project-org-frame">

          <span class="project-org-label">发起组织</span>

}

function renderProjectReviewRow(row, canManage) {
  const status = row.status || 'submitted';
  const attachments = row.attachments && Array.isArray(row.attachments) ? row.attachments : [];
  const attachHtml = attachments.length ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">${attachments.map(f =>
    `<a href="${escapeHtml(projectMediaUrl(f.download_url || f.url || ''))}" target="_blank" class="file-download-link">📎 ${escapeHtml(f.name || '下载文件')}</a>`
  ).join('')}</div>` : '';
  return `<div class="project-review-row">
    <div>
      <div class="project-card-title">${escapeHtml(row.display_name || '匿名参与者')}</div>
      <div class="project-muted">${escapeHtml(projectParticipationStatusLabels[status] || status)} · ${escapeHtml(row.participant_type === 'club' ? '同好会参与' : '个人参与')} · ${escapeHtml(row.created_at || '')}</div>
      <div class="project-muted" style="margin-top:6px;white-space:pre-wrap;">${escapeHtml(row.content || '')}</div>

      ${row.review_note ? `<div class="project-muted" style="margin-top:6px;">审核备注：${escapeHtml(row.review_note)}</div>` : ''}
    </div>
    ${canManage && ['submitted', 'reviewing'].includes(status) ? `<div class="project-hub-tools">
      <button class="btn btn-approve btn-sm" onclick="reviewProjectParticipation(${Number(row.id)}, 'accepted')">通过</button>
      <button class="btn btn-reject btn-sm" onclick="reviewProjectParticipation(${Number(row.id)}, 'rejected')">拒绝</button>
    </div>` : ''}
  </div>`;
}

function projectMediaUrl(url) {
  url = String(url || '').trim();
  if (!url) return '';
  if (/^(https?:)?\/\//i.test(url) || /^data:/i.test(url) || url.startsWith('../') || url.startsWith('/')) return url;
  return '../' + url;
}

async function uploadProjectPoster(projectId) {
  const input = document.getElementById('phCoverFile');
  const status = document.getElementById('phCoverStatus');
  const file = input?.files?.[0];
  if (!file) return;
  const allowed = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
  if (!allowed.includes(file.type)) {
    if (status) status.textContent = '仅支持 JPEG / PNG / GIF / WebP。';
    input.value = '';
    return;
  }
  if (file.size > 2 * 1024 * 1024) {
    if (status) status.textContent = '图片不能超过 2MB。';
    input.value = '';
    return;
  }
  const form = new FormData();
  form.append('id', 'project_' + (projectId || Date.now()));
  form.append('country', selectedCountry || 'china');
  form.append('image', file);
  if (status) status.textContent = '上传中...';
  try {
    const r = await fetch('../api/club_avatar.php?scope=event', { method: 'POST', credentials: 'same-origin', body: form });
    const data = await r.json();
    if (!data.success || !data.image_url) {
      throw new Error(data.message || '上传失败');
    }
    setProjectPosterPreview(data.image_url);
    if (status) status.textContent = '宣传图已上传，保存后同步。';
  } catch (error) {
    if (status) status.textContent = error.message || '上传失败';
  } finally {
    input.value = '';
  }
}

async function saveProjectHub(projectId) {
  const title = document.getElementById('phTitle').value.trim();
  if (!title) {
    showToast('请填写企划名称', 'error');
    return;
  }
  const organizer = currentProjectClub();
  const organizerKey = projectClubKey(organizer);
  const isJoint = document.querySelector('input[name="phIsJoint"]:checked')?.value === '1';
  const selectedParticipants = isJoint ? getProjectJointSelectedClubs().filter(club => projectClubKey(club) !== organizerKey) : [];
  const participantMap = {};
  selectedParticipants.forEach(club => { participantMap[projectClubKey(club)] = club; });
  if (isJoint && Object.keys(participantMap).length < 1) {
    showProjectClubError('联合企划至少需要选择一个联合参加同好会');
    return;
  }
  const payload = {
    title,
    project_type: document.getElementById('phType').value,
    status: document.getElementById('phStatus').value,
    organizer_club: organizer,
    participant_clubs: Object.values(participantMap),
    is_joint: isJoint && Object.keys(participantMap).length > 0,
    deadline: document.getElementById('phDeadline').value,
    event_date: document.getElementById('phEventDate').value,
    event_date_end: document.getElementById('phEventEnd').value,
    cover_image: document.getElementById('phCoverImage')?.value.trim() || '',
    summary: document.getElementById('phSummary').value.trim(),
    description: document.getElementById('phDescription').value.trim(),
    results_description: document.getElementById('phResultsDescription').value.trim(),
    results_link: document.getElementById('phResultsLink').value.trim()
  };
  if (projectId) payload.id = Number(projectId);

  try {
    const r = await fetch('../api/projects.php', {
      method: projectId ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!data.success) {
      showToast(data.message || '保存失败', 'error');
      return;
    }
    projectHubState.selectedId = Number(data.project?.id || projectId);
    showToast(data.message || '已保存', 'success');
    projectHubState.loadedAt = 0;
    await renderProjects(true);
  } catch {
    showToast('网络错误', 'error');
  }
}

async function renderCodes() {
  const container = document.getElementById('listContainer');
  if (!selectedClubId || selectedClubId <= 0) {
    container.innerHTML = '<div class="empty">👆 请先在上方选择一个同好会</div>';
    return;
  }

  let codes = [];
  try {
    const r = await fetch(`../api/club_codes.php?action=list&club_id=${selectedClubId}&country=${selectedCountry}`, { credentials: 'same-origin' });
    const data = await r.json();
    if (data.success) codes = data.codes || [];
  } catch {}

  let html = '';

  // Generate form
  html += `<div class="section-card">
    <div class="section-title">🔑 生成新绑定码</div>
    <div class="section-sub">生成后可将此码分享给想要加入同好会的成员，他们输入码即可直接加入</div>
    <div class="form-row">
      <div class="form-group" style="max-width:160px;">
        <label>使用次数上限</label>
        <input type="number" id="codeMaxUses" class="form-input" value="50" min="1" max="999">
        <span class="form-hint">1–999，达到上限后自动失效</span>
      </div>
      <div class="form-group" style="max-width:200px;">
        <label>过期时间（可选）</label>
        <input type="datetime-local" id="codeExpiresAt" class="form-input">
        <span class="form-hint">留空为永不过期</span>
      </div>
      <button class="btn btn-primary" style="height:38px;" onclick="generateCode()">生成绑定码</button>
    </div>
  </div>`;

  // Codes list
  html += `<div class="section-card">
    <div class="section-title">📋 已生成绑定码 (${codes.length})</div>`;

  if (codes.length === 0) {
    html += '<div style="text-align:center;padding:32px;color:var(--text-secondary);font-size:14px;">暂无绑定码</div>';
  } else {
    html += '<div class="item-list">';
    codes.forEach(c => {
      const status = !c.is_active ? 'disabled' : c.is_expired ? 'expired' : c.is_full ? 'full' : 'active';
      const statusLabels = { active: '启用', disabled: '已禁用', expired: '已过期', full: '已满' };
      const badgeClass = 'badge-' + status;
      html += `<div class="item-row">
        <div class="col col-code" style="flex:0 0 140px;">${escapeHtml(c.code)}</div>
        <div class="col col-sm"><span class="item-meta">使用</span><strong>${c.use_count}</strong> / ${c.max_uses}</div>
        <div class="col col-sm"><span class="item-meta">过期</span><span style="font-size:12px;">${c.expires_at ? formatDate(c.expires_at) : '—'}</span></div>
        <div class="col col-xs"><span class="badge ${badgeClass}">● ${statusLabels[status]}</span></div>
        <div class="col col-actions">
          <button class="btn btn-sm btn-ghost" onclick="copyCode('${c.code}')" title="复制">📋</button>
          ${status === 'active' ? `<button class="btn btn-sm btn-danger" onclick="revokeCode(${c.id})">禁用</button>` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<div class="section-sub" style="margin-top:12px;margin-bottom:0;">💡 绑定码区分大小写，生成后请妥善保管</div>`;
  html += '</div>';

  container.innerHTML = html;
}

async function generateCode() {
  const maxUses = parseInt(document.getElementById('codeMaxUses')?.value) || 50;
  const expiresAtInput = document.getElementById('codeExpiresAt');
  const expiresAt = expiresAtInput ? expiresAtInput.value : '';

  if (maxUses < 1 || maxUses > 999) {
    showToast('使用次数需在 1-999 之间', 'error');
    return;
  }

  try {
    const r = await fetch('../api/club_codes.php?action=generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        club_id: selectedClubId,
        country: selectedCountry,
        max_uses: maxUses,
        expires_at: expiresAt ? expiresAt.replace('T', ' ') + ':00' : null
      })
    });
    const data = await r.json();
    if (data.success) {
      showToast('✅ 绑定码已生成: ' + data.code.code, 'success');
      renderCodes();
    } else {
      showToast(data.message || '生成失败', 'error');
    }
  } catch { showToast('网络错误', 'error'); }
}

async function revokeCode(codeId) {
  if (!confirm('确定禁用此绑定码？已生成的码将无法使用。')) return;
  try {
    const r = await fetch('../api/club_codes.php?action=revoke', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ code_id: codeId })
    });
    const data = await r.json();
    if (data.success) {
      showToast('✅ 已禁用', 'success');
      renderCodes();
    } else {
      showToast(data.message || '操作失败', 'error');
    }
  } catch { showToast('网络错误', 'error'); }
}

function copyCode(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => {
      showToast('📋 已复制: ' + code, 'success');
    }).catch(() => {
      showToast('复制失败，请手动复制', 'error');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 已复制: ' + code, 'success');
  }
}

// ====== Recommendation Board ======

let recSearchResults = [];
let recHasSearched = false;
let recData = [];
let moeKingData = null;
let moeKingSearchResults = [];
let moeKingHasSearched = false;

async function renderRecommendations() {
  const container = document.getElementById('listContainer');
  if (!selectedClubId || selectedClubId <= 0) {
    container.innerHTML = '<div class="empty">👆 请先在上方选择一个同好会</div>';
    return;
  }

  const savedSearch = document.getElementById('recSearchInput')?.value || '';

  // Load current recommendations from server
  try {
    const r = await fetch(`../api/club_recommendations.php?action=list&club_id=${selectedClubId}&country=${selectedCountry}`, { credentials: 'same-origin' });
    const data = await r.json();
    recData = data.success ? (data.data || []) : [];
  } catch { recData = []; }
  try {
    const r = await fetch(`../api/club_moe_king.php?action=get&club_id=${selectedClubId}&country=${selectedCountry}`, { credentials: 'same-origin' });
    const data = await r.json();
    moeKingData = data.success ? data.data : null;
  } catch { moeKingData = null; }

  let html = '<div class="rec-layout">';

  // Left: Search panel
  html += `<div class="section-card">
    <div class="section-title">🔍 搜索 Bangumi</div>
    <div class="search-area">
      <div class="search-input-wrap">
        <input type="text" id="recSearchInput" class="form-input" placeholder="搜索游戏名称…" style="min-width:0;flex:1;max-width:200px;" onkeydown="if(event.key==='Enter') searchBangumi()">
        <button class="btn btn-primary" onclick="searchBangumi()">搜索</button>
      </div>
      <div class="search-results" id="recSearchResults">`;

  if (recSearchResults.length === 0) {
    html += '<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">' +
      (recHasSearched ? '未找到相关结果' : '输入关键词搜索 Bangumi 上的游戏作品') +
      '</div>';
  } else {
    recSearchResults.forEach(item => {
      const alreadyAdded = recData.some(r => r.bangumi_id === item.bangumi_id);
      const title = item.title_cn || item.title;
      const rating = item.rating ? '评分 ' + item.rating : '';
      const date = item.air_date || item.date || '';
      html += `<div class="search-item">
        <div class="thumb">${item.image_url ? `<img src="${escapeHtml(item.image_url)}" alt="" onerror="this.style.display='none'">` : '🎮'}</div>
        <div class="item-info">
          <div class="item-title">${escapeHtml(title)}</div>
          <div class="item-sub">${rating}${rating && date ? ' · ' : ''}${escapeHtml(date)}</div>
        </div>`;
      if (alreadyAdded) {
        html += '<span style="font-size:11px;color:var(--text-muted);flex-shrink:0;">已添加</span>';
      } else {
        html += `<button class="add-btn" onclick="addRecommendation(${item.bangumi_id})">+ 添加</button>`;
      }
      html += '</div>';
    });
  }

  html += `</div></div></div>`; // close search-results, search-area, card

  // Right: Current 12-slot recommendation list
  const filledCount = recData.length;
  html += `<div class="section-card">
    <div class="section-title">⭐ 当前推荐榜 <span style="font-size:12px;color:var(--text-muted);font-weight:400;">(${filledCount} / 12)</span></div>
    <div class="section-sub">点击右上角 × 移除条目</div>
    <div class="rec-list">`;

  recData.forEach((rec, idx) => {
    html += `<div class="rec-card">
      <div class="cover">
        ${rec.image_url ? `<img src="${escapeHtml(rec.image_url)}" alt="" onerror="this.style.display='none'">` : `<span>#${idx + 1}</span>`}
      </div>
      <div class="info">
        <div class="title">${escapeHtml(rec.title)}</div>
        ${rec.rating ? `<div class="rating">⭐ ${rec.rating}</div>` : ''}
      </div>
      <button class="remove-btn" onclick="removeRecommendation(${rec.id})" title="移除">×</button>
    </div>`;
  });

  // Empty placeholders for remaining slots
  for (let i = filledCount; i < 12; i++) {
    html += `<div class="rec-card rec-card-empty">
      <div class="cover" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;font-weight:500;">空缺</div>
      <div class="info" style="text-align:center;padding:8px;">
        <div class="title" style="color:var(--text-muted);font-size:10px;">第 ${i + 1} 位</div>
      </div>
    </div>`;
  }

  html += `</div></div></div>`; // close rec-list, card, rec-layout

  html += `<div class="section-card moe-king-admin">
    <div class="section-title">萌王 <span style="font-size:12px;color:var(--text-muted);font-weight:400;">每个同好会 1 位 Bangumi 角色</span></div>
    <div class="search-area">
      <div class="search-input-wrap">
        <input type="text" id="moeKingSearchInput" class="form-input" placeholder="搜索 Bangumi 角色" style="min-width:0;flex:1;max-width:260px;" onkeydown="if(event.key==='Enter') searchMoeKing()">
        <button class="btn btn-primary" onclick="searchMoeKing()">搜索角色</button>
      </div>
      <div class="current-moe-king">`;
  if (moeKingData) {
    const title = moeKingData.name_cn || moeKingData.name;
    html += `<div class="search-item">
      <div class="thumb">${moeKingData.image_url ? `<img src="${escapeHtml(moeKingData.image_url)}" alt="">` : '王'}</div>
      <div class="item-info">
        <div class="item-title">${escapeHtml(title)}</div>
        <div class="item-sub">当前萌王 · #${escapeHtml(String(moeKingData.character_id))}</div>
      </div>
      <button class="remove-btn" onclick="removeMoeKing()" title="移除">×</button>
    </div>`;
  } else {
    html += '<div style="color:var(--text-muted);font-size:13px;padding:10px 0;">暂未设置萌王</div>';
  }
  html += `</div><div class="search-results" id="moeKingSearchResults">`;
  if (!moeKingSearchResults.length) {
    html += '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">' +
      (moeKingHasSearched ? '未找到相关角色' : '输入角色名，从 Bangumi 角色库中选择一位萌王') +
      '</div>';
  } else {
    moeKingSearchResults.forEach(item => {
      const title = item.name_cn || item.name || ('角色 #' + item.character_id);
      html += `<div class="search-item">
        <div class="thumb">${item.image_url ? `<img src="${escapeHtml(item.image_url)}" alt="">` : '王'}</div>
        <div class="item-info">
          <div class="item-title">${escapeHtml(title)}</div>
          <div class="item-sub">${escapeHtml((item.summary || '').slice(0, 60))}</div>
        </div>
        <button class="add-btn" onclick="setMoeKing(${item.character_id})">设为萌王</button>
      </div>`;
    });
  }
  html += `</div></div></div>`;

  container.innerHTML = html;

  // Restore search input value after re-render
  const restoredInput = document.getElementById('recSearchInput');
  if (restoredInput) restoredInput.value = savedSearch;
}

async function searchMoeKing() {
  const input = document.getElementById('moeKingSearchInput');
  const keyword = input ? input.value.trim() : '';
  if (!keyword) return;
  moeKingHasSearched = true;
  const resultsDiv = document.getElementById('moeKingSearchResults');
  if (resultsDiv) resultsDiv.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">搜索中...</div>';
  try {
    const r = await fetch(`../api/bangumi_proxy.php?action=search_character&keyword=${encodeURIComponent(keyword)}`);
    const data = await r.json();
    moeKingSearchResults = data.success ? (data.data || []) : [];
  } catch { moeKingSearchResults = []; }
  await renderRecommendations();
  const restored = document.getElementById('moeKingSearchInput');
  if (restored) restored.value = keyword;
}

async function setMoeKing(characterId) {
  const item = moeKingSearchResults.find(r => Number(r.character_id) === Number(characterId));
  if (!item) return showToast('找不到该角色信息，请重新搜索', 'error');
  try {
    const r = await fetch('../api/club_moe_king.php?action=set', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        club_id: selectedClubId,
        country: selectedCountry,
        character_id: item.character_id,
        name: item.name || '',
        name_cn: item.name_cn || '',
        image_url: item.image_url || '',
        summary: item.summary || ''
      })
    });
    const data = await r.json();
    if (data.success) {
      showToast('萌王已更新', 'success');
      await renderRecommendations();
    } else {
      showToast(data.message || '设置失败', 'error');
    }
  } catch { showToast('网络错误', 'error'); }
}

async function removeMoeKing() {
  if (!confirm('确定移除当前萌王？')) return;
  try {
    const r = await fetch('../api/club_moe_king.php?action=remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ club_id: selectedClubId, country: selectedCountry })
    });
    const data = await r.json();
    if (data.success) {
      showToast('萌王已移除', 'success');
      moeKingData = null;
      await renderRecommendations();
    } else {
      showToast(data.message || '移除失败', 'error');
    }
  } catch { showToast('网络错误', 'error'); }
}

async function searchBangumi() {
  const input = document.getElementById('recSearchInput');
  const keyword = input ? input.value.trim() : '';
  if (!keyword) return;

  recHasSearched = true;
  const resultsDiv = document.getElementById('recSearchResults');
  if (resultsDiv) {
    resultsDiv.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px;">搜索中…</div>';
  }

  try {
    const r = await fetch(`../api/bangumi_proxy.php?action=search&keyword=${encodeURIComponent(keyword)}`);
    const data = await r.json();
    recSearchResults = data.success ? (data.data || []) : [];
  } catch { recSearchResults = []; }

  await renderRecommendations();
}

async function addRecommendation(bangumiId) {
  const item = recSearchResults.find(r => r.bangumi_id === bangumiId);
  if (!item) {
    showToast('找不到该条目信息，请重新搜索', 'error');
    return;
  }

  // Bangumi 搜索 API 不再返回评分，从条目详情获取
  let rating = item.rating || 0;
  try {
    const detailResp = await fetch(`../api/bangumi_proxy.php?action=get&id=${bangumiId}`);
    const detailData = await detailResp.json();
    if (detailData.success && detailData.data) {
      const d = detailData.data;
      const s = d.rating?.score || d.score || 0;
      if (s > 0) rating = s;
    }
  } catch (e) { /* use search result rating */ }

  try {
    const r = await fetch('../api/club_recommendations.php?action=add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        club_id: selectedClubId,
        country: selectedCountry,
        bangumi_id: bangumiId,
        title: item.title_cn || item.title,
        image_url: item.image_url || '',
        rating: rating,
        summary: item.summary || ''
      })
    });
    const data = await r.json();
    if (data.success) {
      showToast('✅ 已添加到推荐榜', 'success');
      await renderRecommendations();
    } else {
      showToast(data.message || '添加失败', 'error');
    }
  } catch { showToast('网络错误', 'error'); }
}

async function removeRecommendation(id) {
  if (!confirm('确定从推荐榜移除？')) return;
  try {
    const r = await fetch('../api/club_recommendations.php?action=remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ id })
    });
    const data = await r.json();
    if (data.success) {
      showToast('✅ 已移除', 'success');
      await renderRecommendations();
    } else {
      showToast(data.message || '移除失败', 'error');
    }
  } catch { showToast('网络错误', 'error'); }
}

// ====== Tab ======
function switchTab(tab) {
  if (tab === 'users') {
    if (!isSuperAdminUser()) {
      showToast('仅超级管理员可用', 'error');
      return;
    }
  }
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderList(tab);
}

// ====== Utilities ======
function statusText(status) {
  return status === 'active' || status === 'approved' ? '✅ 已通过' : status === 'rejected' ? '❌ 已拒绝' : '⏳ 待审核';
}

function applyRoleText(role) {
  return role === 'external' ? '外交成员（IEM）' : role === 'representative' ? '负责人' : role === 'manager' ? '管理员' : '成员';
}

function joinMethodText(method) {
  return method === 'external_exchange' ? '外校成员交流申请' : method === 'school_code' ? '本校成员申请（有绑定码）' : '本校成员申请加入（未有绑定码）';
}

// ====== Event Listeners ======
document.getElementById('userEditModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeUserEditModal();
});

document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});

// ====== Start ======
init();
</script>
<script src="../js/page-background.js" data-picker="compact"></script>
  <script>
  (function() {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    var html = document.documentElement;
    function updateIcon() {
      var isDark = html.getAttribute('data-theme') === 'dark';
      btn.querySelector('.icon-sun').style.display = isDark ? 'none' : '';
      btn.querySelector('.icon-moon').style.display = isDark ? '' : 'none';
    }
    updateIcon();
    btn.addEventListener('click', function() {
      var next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('themePreference', next);
      updateIcon();
    });
  })();
  </script>
