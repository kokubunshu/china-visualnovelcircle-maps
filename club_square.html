<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>同好会广场 - VNFest</title>
  <link rel="stylesheet" href="./css/vote-common.css">
  <link rel="stylesheet" href="./css/club-square.css">
</head>
<body>
  <main class="shell">
    <!-- 导航栏 -->
    <header class="topbar">
      <div class="brand">
        <strong>同好会广场</strong>
      </div>
      <div class="actions">
        <a class="btn" href="./index.html?guest=1">返回地图</a>
        <a class="btn" href="./user.html">用户中心</a>
        <a class="btn primary" href="./admin/club_project_manager.html">负责人管理</a>
        <button class="btn theme-toggle" id="themeToggle" title="切换明亮/暗色模式" aria-label="切换明亮/暗色模式">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- 标题区 -->
    <section class="hero">
      <h1>同好会广场</h1>
      <p class="hero-sub">同好会大型企划活动入口 — 萌战角色评选 &amp; 十二器作品投票</p>
    </section>

    <!-- 两大入口卡片 -->
    <section class="gateway">
      <a class="gateway-card moe" href="./moe/index.html">
        <div class="gateway-icon">
          <svg width="44" height="44" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <path d="M24 4L29.6 17.2L44 19.6L33.2 29.6L35.6 44L24 36.8L12.4 44L14.8 29.6L4 19.6L18.4 17.2L24 4Z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.8"/>
            <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.3"/>
          </svg>
        </div>
        <div class="gateway-body">
          <h2>萌 战</h2>
          <p class="gateway-desc">同好会角色人气投票活动 — 提名并投票选出年度最受欢迎的角色</p>
          <div class="gateway-stats" id="moeStats">加载中…</div>
        </div>
        <span class="gateway-enter">进入活动</span>
      </a>

      <a class="gateway-card twelve" href="./twelve/index.html">
        <div class="gateway-icon">
          <svg width="44" height="44" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <rect x="8" y="8" width="32" height="32" rx="4" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.8"/>
            <rect x="16" y="16" width="16" height="16" rx="2" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.4"/>
            <line x1="24" y1="4" x2="24" y2="14" stroke="currentColor" stroke-width="1" opacity="0.5"/>
            <line x1="24" y1="34" x2="24" y2="44" stroke="currentColor" stroke-width="1" opacity="0.5"/>
            <line x1="4" y1="24" x2="14" y2="24" stroke="currentColor" stroke-width="1" opacity="0.5"/>
            <line x1="34" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          </svg>
        </div>
        <div class="gateway-body">
          <h2>十二器</h2>
          <p class="gateway-desc">年度 Galgame 作品评选活动 — 提名并投票选出年度优秀视觉小说作品</p>
          <div class="gateway-stats" id="twelveStats">加载中…</div>
        </div>
        <span class="gateway-enter">进入活动</span>
      </a>
    </section>

    <!-- 正在进行中的活动 -->
    <section class="ongoing">
      <div class="ongoing-head">
        <span class="ongoing-bar"></span>
        <h3>正在进行中的活动</h3>
      </div>
      <div class="ongoing-list" id="ongoingList">
        <div class="ongoing-empty">加载中…</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="./js/vote-common.js"></script>
  <script>
  (function () {
    'use strict';
    var $ = $vote, api = apiVote, esc = escVote;

    /* ---- 主题切换 ---- */
    var themeBtn = $('themeToggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function () {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('themePreference', next);
      });
    }

    /* ---- 加载数据 ---- */
    var runningProjects = [];

    function loadAll() {
      Promise.all([
        api('./api/vote_projects.php?action=list&project_type=moe&status=running'),
        api('./api/vote_projects.php?action=list&project_type=twelve&status=running')
      ]).then(function (results) {
        var allRunning = [];
        var moeTotal = 0, twelveTotal = 0;
        var moeRunning = 0, twelveRunning = 0;

        results.forEach(function (r) {
          if (!r.success || !r.data) return;
          r.data.forEach(function (p) {
            if (p.status === 'running') {
              allRunning.push(p);
              if (p.project_type === 'moe') moeRunning++;
              else twelveRunning++;
            }
          });
        });

        runningProjects = allRunning;

        // 更新卡片统计（需要总数，另发请求）
        updateStats();

        // 渲染活动列表
        renderOngoing();
      }).catch(function (e) {
        console.error('loadAll failed', e);
        updateStats();
        renderOngoing();
      });
    }

    function updateStats() {
      ['moe', 'twelve'].forEach(function (type) {
        api('./api/vote_projects.php?action=list&project_type=' + type).then(function (data) {
          if (!data.success) return;
          var items = data.data || [];
          var running = items.filter(function (i) { return i.status === 'running'; }).length;
          var total = items.length;
          var el = $(type === 'moe' ? 'moeStats' : 'twelveStats');
          if (!el) return;
          var parts = [];
          if (running > 0) parts.push(running + ' 场进行中');
          if (total > 0) parts.push('共 ' + total + ' 场企划');
          el.textContent = parts.join(' · ') || '暂无企划';
        }).catch(function () {
          var el = $(type === 'moe' ? 'moeStats' : 'twelveStats');
          if (el) el.textContent = '加载失败';
        });
      });
    }

    function renderOngoing() {
      var list = $('ongoingList');
      if (!list) return;

      if (!runningProjects.length) {
        list.innerHTML = '<div class="ongoing-empty">暂无进行中的活动</div>';
        return;
      }

      list.innerHTML = runningProjects.map(function (p) {
        var type = p.project_type;
        var label = type === 'moe' ? '萌战' : '十二器';
        var href = type === 'moe' ? './moe/index.html' : './twelve/index.html';
        var title = esc(p.title || '未命名企划');
        var club = p.club_id ? '同好会 #' + Number(p.club_id) : '';

        return '<a class="ongoing-item ' + type + '" href="' + href + '">' +
          '<span class="ongoing-tag">' + label + '</span>' +
          '<span class="ongoing-info">' +
            '<span class="ongoing-title">' + title + '</span>' +
            '<span class="ongoing-meta">' + club + '</span>' +
          '</span>' +
          '<span class="ongoing-status">进行中</span>' +
          '<svg class="ongoing-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' +
        '</a>';
      }).join('');
    }

    loadAll();
  })();
  </script>
</body>
</html>
