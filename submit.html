<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>提交同好会信息 - 全国视觉小说同好会地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            /* 默认渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* 预留自定义壁纸接口 - 可通过JS动态设置 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 0.3s ease;
            position: relative;
        }
        
        /* 壁纸遮罩层 - 保证文字可读性 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 毛玻璃卡片效果 */
        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 36px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .form-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        
        .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        
        .optional {
            color: #999;
            font-weight: normal;
            font-size: 12px;
            margin-left: 8px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #9b59b6;
            background: white;
            box-shadow: 0 0 0 4px rgba(155, 89, 182, 0.15);
            transform: translateY(-1px);
        }
        
        input:hover, select:hover, textarea:hover {
            border-color: #c9a8e0;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        select {
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }
        
        .radio-group {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 40px;
            transition: all 0.2s ease;
        }
        
        .radio-option:hover {
            background: rgba(155, 89, 182, 0.1);
            transform: translateY(-1px);
        }
        
        .radio-option input {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: #9b59b6;
        }
        
        .radio-option label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(155, 89, 182, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .success-msg {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
            border-left: 4px solid #28a745;
            animation: slideIn 0.3s ease;
        }
        
        .error-msg {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
            border-left: 4px solid #dc3545;
            animation: slideIn 0.3s ease;
        }
        
        .info-box {
            background: rgba(0, 0, 0, 0.05);
            padding: 14px;
            border-radius: 16px;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        
        .info-box a {
            color: #9b59b6;
            text-decoration: none;
            font-weight: 500;
        }
        
        .info-box a:hover {
            text-decoration: underline;
        }
        
        small {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            color: #999;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 加载状态 */
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            right: 20px;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }
            .form-card {
                padding: 24px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .radio-group {
                gap: 12px;
            }
            .radio-option {
                padding: 6px 12px;
                font-size: 13px;
            }
        }
        
        /* ========== 壁纸自定义接口预留 ========== */
        /* 使用方法：通过 JS 设置 body 的 style.background */
        /* 示例：document.body.style.background = "url('your-image.jpg') center/cover fixed"; */
        /* 或者设置渐变色：document.body.style.background = "linear-gradient(135deg, #xxx, #xxx)"; */
        
        /* 预设壁纸主题类 */
        body.theme-default {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body.theme-dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        body.theme-ocean {
            background: linear-gradient(135deg, #006994 0%, #004e6e 100%);
        }
        
        body.theme-sunset {
            background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
        }
        
        body.theme-forest {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>
                📝 提交同好会信息
            </h1>
            <p class="subtitle">你的贡献将帮助更多同好找到组织 ✨</p>
            
            <div id="successMsg" class="success-msg">
                ✅ 提交成功！感谢你的贡献，我们会尽快审核。
            </div>
            <div id="errorMsg" class="error-msg">
                ❌ 提交失败，请稍后重试或联系管理员。
            </div>
            
            <form id="submitForm">
                <div class="form-group">
                    <label>学校/组织名称 <span class="required">*</span></label>
                    <input type="text" id="clubName" required placeholder="例：北京大学视觉小说同好会">
                </div>
                
                <!-- 国家选择 -->
                <div class="form-group">
                    <label>所属国家 <span class="required">*</span></label>
                    <select id="country" required>
                        <option value="china">🇨🇳 中国</option>
                        <option value="japan">🇯🇵 日本</option>
                        <option value="overseas">🌍 海外</option>
                    </select>
                </div>
                
                <!-- 中国省份选择 -->
                <div class="form-group" id="provinceGroup">
                    <label>省份 <span class="required">*</span></label>
                    <select id="province" required>
                        <option value="">请选择省份</option>
                        <optgroup label="直辖市">
                            <option>北京</option><option>上海</option><option>天津</option><option>重庆</option>
                        </optgroup>
                        <optgroup label="省份">
                            <option>广东</option><option>江苏</option><option>浙江</option><option>四川</option>
                            <option>湖北</option><option>湖南</option><option>安徽</option><option>福建</option>
                            <option>山东</option><option>河南</option><option>河北</option><option>陕西</option>
                            <option>辽宁</option><option>吉林</option><option>黑龙江</option><option>江西</option>
                            <option>广西</option><option>海南</option><option>山西</option><option>云南</option>
                            <option>贵州</option><option>甘肃</option><option>青海</option><option>台湾</option>
                        </optgroup>
                        <optgroup label="自治区">
                            <option>内蒙古</option><option>新疆</option><option>宁夏</option><option>西藏</option>
                        </optgroup>
                        <optgroup label="特别行政区">
                            <option>香港</option><option>澳门</option>
                        </optgroup>
                    </select>
                </div>
                
                <!-- 日本都道府县选择 -->
                <div class="form-group" id="prefectureGroup" style="display: none;">
                    <label>都道府县 <span class="required">*</span></label>
                    <select id="prefecture">
                        <option value="">请选择都道府县</option>
                        <optgroup label="北海道・東北">
                            <option>北海道</option><option>青森県</option><option>岩手県</option>
                            <option>宮城県</option><option>秋田県</option><option>山形県</option>
                            <option>福島県</option>
                        </optgroup>
                        <optgroup label="関東">
                            <option>東京都</option><option>神奈川県</option><option>埼玉県</option>
                            <option>千葉県</option><option>茨城県</option><option>栃木県</option>
                            <option>群馬県</option>
                        </optgroup>
                        <optgroup label="中部">
                            <option>愛知県</option><option>静岡県</option><option>岐阜県</option>
                            <option>長野県</option><option>新潟県</option><option>富山県</option>
                            <option>石川県</option><option>福井県</option><option>山梨県</option>
                        </optgroup>
                        <optgroup label="関西・近畿">
                            <option>大阪府</option><option>京都府</option><option>兵庫県</option>
                            <option>奈良県</option><option>滋賀県</option><option>和歌山県</option>
                            <option>三重県</option>
                        </optgroup>
                        <optgroup label="中国・四国">
                            <option>広島県</option><option>岡山県</option><option>山口県</option>
                            <option>島根県</option><option>鳥取県</option><option>香川県</option>
                            <option>徳島県</option><option>愛媛県</option><option>高知県</option>
                        </optgroup>
                        <optgroup label="九州・沖縄">
                            <option>福岡県</option><option>佐賀県</option><option>長崎県</option>
                            <option>熊本県</option><option>大分県</option><option>宮崎県</option>
                            <option>鹿児島県</option><option>沖縄県</option>
                        </optgroup>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>群号/联系方式 <span class="required">*</span></label>
                    <input type="text" id="contact" required placeholder="例：123456789 或 https://discord.gg/xxx">
                    <small>QQ群、微信群、Discord、Telegram 等均可</small>
                </div>
                
                <div class="form-group">
                    <label>组织类型 <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="clubType" value="school" checked> 高校同好会
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="clubType" value="region"> 地区高校联合
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="clubType" value="vnfest"> 视觉小说学园祭
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>成立时间 <span class="optional">(可选)</span></label>
                    <input type="date" id="createdAt">
                </div>
                
                <div class="form-group">
                    <label>群简介/备注 <span class="optional">(可选)</span></label>
                    <textarea id="remark" placeholder="介绍一下你的同好会，比如日常活动、入群要求等..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>你的联系方式 <span class="optional">(可选)</span></label>
                    <input type="text" id="submitter" placeholder="QQ/微信/邮箱，审核通过后可能联系你">
                    <small>仅用于审核沟通，不会公开</small>
                </div>
                
                <button type="submit" id="submitBtn">✉️ 提交信息</button>
            </form>
            
            <div class="info-box">
                ⭐ 提交后，管理员会尽快审核
            </div>
        </div>
    </div>
    
    <script src="./js/app-core.js"></script>
    <script>
        // ========== 壁纸自定义接口 ==========
        // 预留壁纸切换接口，可通过以下方式自定义背景
        window.WallpaperAPI = {
            // 设置自定义壁纸（图片URL）
            setImage: function(imageUrl) {
                document.body.style.background = `url('${imageUrl}') center/cover fixed`;
                document.body.style.backgroundBlendMode = 'overlay';
            },
            // 设置渐变色
            setGradient: function(gradient) {
                document.body.style.background = gradient;
            },
            // 重置为默认
            reset: function() {
                document.body.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 100%)";
            },
            // 应用预设主题
            setTheme: function(themeName) {
                const themes = {
                    default: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
                    dark: "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)",
                    ocean: "linear-gradient(135deg, #006994 0%, #004e6e 100%)",
                    sunset: "linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%)",
                    forest: "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)"
                };
                if (themes[themeName]) {
                    document.body.style.background = themes[themeName];
                }
            }
        };
        
        // 示例：从URL参数读取壁纸配置
        const urlParams = new URLSearchParams(window.location.search);
        const wallpaper = urlParams.get('wallpaper');
        if (wallpaper) {
            if (wallpaper.startsWith('http')) {
                WallpaperAPI.setImage(wallpaper);
            } else {
                WallpaperAPI.setTheme(wallpaper);
            }
        }
        
        // 国家切换逻辑
        const countrySelect = document.getElementById('country');
        const provinceGroup = document.getElementById('provinceGroup');
        const prefectureGroup = document.getElementById('prefectureGroup');
        const provinceSelect = document.getElementById('province');
        const prefectureSelect = document.getElementById('prefecture');

        function renderSubmitPrefectureSelect(selectedValue = '') {
            if (!prefectureSelect || !Array.isArray(window.JAPAN_PREFECTURES)) return;
            const selectedKey = Utils.normalizeJapanPrefecture(selectedValue);
            const groups = new Map();
            window.JAPAN_PREFECTURES.forEach((item) => {
                if (!groups.has(item.regionZh)) groups.set(item.regionZh, []);
                groups.get(item.regionZh).push(item);
            });
            prefectureSelect.innerHTML = '<option value="">请选择都道府县</option>' +
                Array.from(groups.entries()).map(([region, items]) =>
                    '<optgroup label="' + Utils.escapeHTML(region) + '">' +
                    items.map((item) => {
                        const selected = item.jaName === selectedKey ? ' selected' : '';
                        return '<option value="' + Utils.escapeHTML(item.jaName) + '"' + selected + '>' + Utils.escapeHTML(item.zhName) + '</option>';
                    }).join('') +
                    '</optgroup>'
                ).join('');
        }

        renderSubmitPrefectureSelect(prefectureSelect.value);
        
        function toggleCountryFields() {
            const val = countrySelect.value;
            if (val === 'japan') {
                provinceGroup.style.display = 'none';
                prefectureGroup.style.display = 'block';
                provinceSelect.required = false;
                prefectureSelect.required = true;
            } else if (val === 'overseas') {
                provinceGroup.style.display = 'none';
                prefectureGroup.style.display = 'none';
                provinceSelect.required = false;
                prefectureSelect.required = false;
            } else {
                provinceGroup.style.display = 'block';
                prefectureGroup.style.display = 'none';
                provinceSelect.required = true;
                prefectureSelect.required = false;
            }
        }
        
        countrySelect.addEventListener('change', toggleCountryFields);
        toggleCountryFields();
        
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let clubType = '';
            document.querySelectorAll('input[name="clubType"]').forEach(radio => {
                if (radio.checked) clubType = radio.value;
            });
            
            const country = countrySelect.value;
            
            let region = '';
            if (country === 'japan') {
                region = Utils.normalizeJapanPrefecture(prefectureSelect.value);
                if (!region) {
                    alert('请选择都道府县');
                    return;
                }
            } else if (country === 'overseas') {
                region = '海外';
            } else {
                region = provinceSelect.value;
                if (!region) {
                    alert('请选择省份');
                    return;
                }
            }

            const data = {
                name: document.getElementById('clubName').value.trim(),
                country: country,
                province: country === 'china' ? region : country === 'overseas' ? region : '',
                prefecture: country === 'japan' ? region : '',
                info: document.getElementById('contact').value.trim(),
                type: clubType,
                created_at: document.getElementById('createdAt').value || '',
                remark: document.getElementById('remark').value.trim(),
                submitter: document.getElementById('submitter').value.trim(),
                timestamp: new Date().toISOString(),
                status: 'pending'
            };
            
            if (!data.name) {
                alert('请填写组织名称');
                return;
            }
            if (!data.info) {
                alert('请填写联系方式');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = '提交中...';
            btn.classList.add('btn-loading');
            btn.disabled = true;
            
            try {
    // 发送到服务器
    const response = await fetch('./api/submit.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    });
    
    const result = await response.json();
    
    if (result.success) {
        console.log('提交成功：', data);
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('submitForm').reset();
        document.querySelector('input[name="clubType"][value="school"]').checked = true;
        countrySelect.value = 'china';
        toggleCountryFields();
        
        setTimeout(() => {
            document.getElementById('successMsg').style.display = 'none';
        }, 4000);
    } else {
        throw new Error(result.message || '提交失败');
    }
    
} catch (error) {
    console.error('提交失败：', error);
    document.getElementById('errorMsg').style.display = 'block';
    setTimeout(() => {
        document.getElementById('errorMsg').style.display = 'none';
    }, 4000);
}
        });
    </script>
<script src="js/page-background.js" data-picker="compact"></script>
</body>
</html>
