<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>提交同好会信息 - 全国视觉小说同好会地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-card {
            background: white;
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        
        .optional {
            color: #999;
            font-weight: normal;
            font-size: 12px;
            margin-left: 8px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: #fafafa;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #9b59b6;
            background: white;
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 90px;
        }
        
        select {
            background: white;
            cursor: pointer;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .radio-option input {
            width: auto;
            margin: 0;
            transform: scale(1.1);
        }
        
        .radio-option label {
            margin: 0;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(155, 89, 182, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #28a745;
        }
        
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #dc3545;
        }
        
        .info-box {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .info-box a {
            color: #9b59b6;
            text-decoration: none;
        }
        
        @media (max-width: 480px) {
            .form-card {
                padding: 24px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>
                📝 提交同好会信息
            </h1>
            <p class="subtitle">你的贡献将帮助更多同好找到组织 ✨</p>
            
            <div id="successMsg" class="success-msg">
                ✅ 提交成功！感谢你的贡献，我们会尽快审核。
            </div>
            <div id="errorMsg" class="error-msg">
                ❌ 提交失败，请稍后重试或联系管理员。
            </div>
            
            <form id="submitForm">
                <div class="form-group">
                    <label>学校/组织名称 <span class="required">*</span></label>
                    <input type="text" id="clubName" required placeholder="例：北京大学视觉小说同好会">
                </div>
                
                <div class="form-group">
                    <label>省份 <span class="required">*</span></label>
                    <select id="province" required>
                        <option value="">请选择省份</option>
                        <optgroup label="直辖市">
                            <option>北京</option><option>上海</option><option>天津</option><option>重庆</option>
                        </optgroup>
                        <optgroup label="省份">
                            <option>广东</option><option>江苏</option><option>浙江</option><option>四川</option>
                            <option>湖北</option><option>湖南</option><option>安徽</option><option>福建</option>
                            <option>山东</option><option>河南</option><option>河北</option><option>陕西</option>
                            <option>辽宁</option><option>吉林</option><option>黑龙江</option><option>江西</option>
                            <option>广西</option><option>海南</option><option>山西</option><option>云南</option>
                            <option>贵州</option><option>甘肃</option><option>青海</option><option>台湾</option>
                        </optgroup>
                        <optgroup label="自治区">
                            <option>内蒙古</option><option>新疆</option><option>宁夏</option><option>西藏</option>
                            <option>广西</option>
                        </optgroup>
                        <optgroup label="特别行政区">
                            <option>香港</option><option>澳门</option>
                        </optgroup>
                        <optgroup label="其他">
                            <option>海外</option>
                        </optgroup>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>群号/联系方式 <span class="required">*</span></label>
                    <input type="text" id="contact" required placeholder="例：123456789 或 https://discord.gg/xxx">
                    <small style="color:#999; font-size:12px;">QQ群、微信群、Discord、Telegram 等均可</small>
                </div>
                
                <div class="form-group">
                    <label>组织类型 <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="clubType" value="school" checked> 高校同好会
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="clubType" value="region"> 地区高校联合
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="clubType" value="vnfest"> 视觉小说学园祭
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>成立时间 <span class="optional">(可选)</span></label>
                    <input type="date" id="createdAt" placeholder="YYYY-MM-DD">
                </div>
                
                <div class="form-group">
                    <label>群简介/备注 <span class="optional">(可选)</span></label>
                    <textarea id="remark" placeholder="介绍一下你的同好会，比如日常活动、入群要求等..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>你的联系方式 <span class="optional">(可选)</span></label>
                    <input type="text" id="submitter" placeholder="QQ/微信/邮箱，审核通过后可能联系你">
                    <small style="color:#999; font-size:12px;">仅用于审核沟通，不会公开</small>
                </div>
                
                <button type="submit" id="submitBtn">✉️ 提交信息</button>
            </form>
            
            <div class="info-box">
                ⭐ 提交后，管理员会尽快审核<br>
            </div>
        </div>
    </div>
    
    <script>
        // 提交地址（根据你的服务器配置）
        // 方式1：直接保存到本地 JSON（需要后端支持）
        // 方式2：发送邮件通知（需要后端支持）
        // 方式3：保存到腾讯文档/Google Sheets（需要 webhook）
        
        // 目前临时方案：保存提交记录到 localStorage，并发送到管理员邮箱（需要后端）
        // 对于纯静态网站，推荐使用 Formspree 或 Tally 等服务
        
        const SUBMIT_API = './submit_api.php';  // 如果有后端接口
        
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 获取选中的类型
            let clubType = '';
            document.querySelectorAll('input[name="clubType"]').forEach(radio => {
                if (radio.checked) clubType = radio.value;
            });
            
            // 收集数据
            const data = {
                name: document.getElementById('clubName').value.trim(),
                province: document.getElementById('province').value,
                info: document.getElementById('contact').value.trim(),
                type: clubType,
                created_at: document.getElementById('createdAt').value || '',
                remark: document.getElementById('remark').value.trim(),
                submitter: document.getElementById('submitter').value.trim(),
                timestamp: new Date().toISOString(),
                status: 'pending'
            };
            
            // 验证
            if (!data.name) {
                alert('请填写组织名称');
                return;
            }
            if (!data.province) {
                alert('请选择省份');
                return;
            }
            if (!data.info) {
                alert('请填写联系方式');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = '提交中...';
            btn.disabled = true;
            
            try {
                // 方案A：如果有后端接口
                // const response = await fetch(SUBMIT_API, {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify(data)
                // });
                
                // 方案B：保存到 localStorage（仅用于测试，数据不会保留）
                let submissions = JSON.parse(localStorage.getItem('club_submissions') || '[]');
                submissions.push(data);
                localStorage.setItem('club_submissions', JSON.stringify(submissions));
                
                // 方案C：模拟延迟
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                console.log('提交的数据：', data);
                
                // 显示成功
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('submitForm').reset();
                document.querySelector('input[name="clubType"][value="school"]').checked = true;
                
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 4000);
                
            } catch (error) {
                console.error('提交失败：', error);
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 4000);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
