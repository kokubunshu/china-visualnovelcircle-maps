<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug 反馈与功能建议 - VNFest 同好会地图</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 40px 18px;
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f6f8fb 0%, #e9eef7 100%);
      color: #20242c;
    }
    .page { width: min(720px, 100%); margin: 0 auto; }
    .card {
      background: #fff;
      border: 1px solid rgba(40, 52, 76, 0.08);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(38, 48, 72, 0.14);
      padding: 30px;
    }
    h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 0; }
    .subtitle { color: #667085; line-height: 1.7; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .hint { display: block; color: #8a94a6; font-size: 12px; margin-top: 6px; line-height: 1.5; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d8dee9;
      border-radius: 10px;
      background: #fbfcff;
      padding: 12px 13px;
      font: inherit;
      color: #20242c;
      transition: border-color .16s, box-shadow .16s, background .16s;
    }
    textarea { min-height: 160px; resize: vertical; line-height: 1.65; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3d6bdc;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(61, 107, 220, .12);
    }
    .required { color: #d92d20; }
    .actions { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
    button, .back-link {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    button { background: #244ec9; color: #fff; flex: 1; }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .back-link { color: #41506a; background: #eef2f8; }
    .message {
      display: none;
      margin-bottom: 18px;
      border-radius: 10px;
      padding: 12px 14px;
      line-height: 1.5;
      font-size: 14px;
    }
    .message.success { background: #ecfdf3; color: #067647; border: 1px solid #abefc6; }
    .message.error { background: #fef3f2; color: #b42318; border: 1px solid #fecdca; }
    @media (max-width: 640px) {
      body { padding: 22px 12px; }
      .card { padding: 22px 18px; border-radius: 14px; }
      .grid { grid-template-columns: 1fr; gap: 0; }
      .actions { flex-direction: column; align-items: stretch; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Bug 反馈与功能建议</h1>
      <p class="subtitle">遇到显示错误、移动端问题、数据异常，或有想要的新功能，都可以在这里提交。信息会同步到后台审核中心，方便维护者集中查看。</p>

      <div id="successMsg" class="message success">提交成功，感谢你的反馈！</div>
      <div id="errorMsg" class="message error">提交失败，请稍后再试。</div>

      <form id="feedbackForm">
        <div class="grid">
          <div class="field">
            <label for="type">反馈类型 <span class="required">*</span></label>
            <select id="type" required>
              <option value="bug">Bug 反馈</option>
              <option value="feature">功能建议</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div class="field">
            <label for="contact">联系方式</label>
            <input id="contact" type="text" maxlength="120" placeholder="QQ / 邮箱 / Discord，可选">
          </div>
        </div>

        <div class="field">
          <label for="title">标题 <span class="required">*</span></label>
          <input id="title" type="text" maxlength="120" required placeholder="一句话描述问题或建议">
        </div>

        <div class="field">
          <label for="content">详细说明 <span class="required">*</span></label>
          <textarea id="content" maxlength="3000" required placeholder="请描述复现步骤、期望效果、实际现象，或你希望新增的功能场景。"></textarea>
          <span class="hint">如果是 Bug，建议写清楚设备、浏览器/客户端、发生在哪个页面。</span>
        </div>

        <div class="grid">
          <div class="field">
            <label for="pageUrl">相关页面</label>
            <input id="pageUrl" type="url" maxlength="500" placeholder="https://...，可选">
          </div>
          <div class="field">
            <label for="device">设备环境</label>
            <input id="device" type="text" maxlength="200" placeholder="例如 Android / Windows 客户端 / iPhone">
          </div>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">提交反馈</button>
          <a class="back-link" href="./index.html">返回地图</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    function showMessage(el, text) {
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4200);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      successMsg.style.display = 'none';
      errorMsg.style.display = 'none';

      const payload = {
        type: document.getElementById('type').value,
        title: document.getElementById('title').value.trim(),
        content: document.getElementById('content').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        page_url: document.getElementById('pageUrl').value.trim(),
        device: document.getElementById('device').value.trim(),
      };

      if (!payload.title || !payload.content) {
        showMessage(errorMsg, '请填写标题和详细说明。');
        return;
      }

      const oldText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      try {
        const response = await fetch('./api/feedback.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!result.success) throw new Error(result.message || '提交失败');
        form.reset();
        showMessage(successMsg, '提交成功，感谢你的反馈！');
      } catch (error) {
        showMessage(errorMsg, error.message || '提交失败，请稍后再试。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = oldText;
      }
    });
  </script>
<script src="js/page-background.js" data-picker="compact"></script>
</body>
</html>
