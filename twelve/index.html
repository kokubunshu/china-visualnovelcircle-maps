<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>十二器 - VNFest</title>
  <link rel="stylesheet" href="../css/vote-common.css">
  <link rel="stylesheet" href="../css/twelve-contest.css?v=20260601-flow8">
</head>
<body>
  <div class="tw-topbar">
    <div class="tw-topbar-left">
      <div class="tw-logo">12</div>
      <span class="tw-logo-text">十二器投票</span>
    </div>
    <a class="tw-topbar-link" href="../club_square.html">同好会广场</a>
    <button id="themeToggle" title="切换明亮/暗色模式" aria-label="切换明亮/暗色模式" style="background:none;border:none;cursor:pointer;padding:0 8px;color:inherit;font-size:16px;">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="tw-hero">
    <h1>发现十二器投票</h1>
    <p>各同好会举办的 Galgame 作品人气投票</p>
  </div>

  <div class="tw-chips" id="twChips">
    <span class="tw-chip active" data-status="running">进行中</span>
    <span class="tw-chip" data-status="published">即将开始</span>
    <span class="tw-chip" data-status="ended">已结束</span>
  </div>

  <div class="tw-card-list" id="twCardList">
    <div class="tw-loading">加载中...</div>
  </div>

  <button class="tw-load-more" id="twLoadMore" style="display:none;">加载更多</button>

  <div class="tw-stats">
    <div class="tw-stat"><span class="tw-stat-num" id="twStatRunning">-</span><span class="tw-stat-label">进行中</span></div>
    <div class="tw-stat"><span class="tw-stat-num" id="twStatTotal">-</span><span class="tw-stat-label">已举办</span></div>
    <div class="tw-stat"><span class="tw-stat-num" id="twStatClubs">-</span><span class="tw-stat-label">同好会</span></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../js/vote-common.js"></script>
  <script src="../js/twelve-contest.js?v=20260601-flow8"></script>
  <script>
  (function() {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    var html = document.documentElement;
    function updateIcon() {
      var isDark = html.getAttribute('data-theme') === 'dark';
      btn.querySelector('.icon-sun').style.display = isDark ? 'none' : '';
      btn.querySelector('.icon-moon').style.display = isDark ? '' : 'none';
    }
    updateIcon();
    btn.addEventListener('click', function() {
      var next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('themePreference', next);
      updateIcon();
    });
  })();
  </script>
</body>
</html>
